function todayISO(){ try{ return new Date().toISOString().slice(0,10); }catch(e){ return "today"; } }
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ============================================================
   PRODUCT MATCHING — turn typed text into a known product.
   exact -> alias/contains -> category keyword -> unavailable
   ============================================================ */
const ALIASES={ "milk":"milk","cheese":"cheese","cheddar":"cheese","bread":"bread","loaf":"bread","eggs":"eggs","egg":"eggs",
  "chicken":"chicken_breast","chicken breast":"chicken_breast","breast":"chicken_breast","thigh":"chicken_thighs","thighs":"chicken_thighs",
  "beef":"mince","mince":"mince","tuna":"tuna","rice":"rice","pasta":"pasta","spaghetti":"pasta","oats":"oats","porridge":"oats",
  "cereal":"cereal","apple":"apples","apples":"apples","banana":"bananas","bananas":"bananas","potato":"potatoes","potatoes":"potatoes",
  "frozen veg":"frozen_veg","vegetables":"frozen_veg","veg":"frozen_veg","yoghurt":"yoghurt","yogurt":"yoghurt","coffee":"coffee",
  "toilet paper":"toilet_paper","toilet":"toilet_paper" };
function matchProduct(text){
  const t=String(text||"").trim().toLowerCase(); if(!t) return {match:null,kind:"empty"};
  for(const id of PRODUCT_ORDER){ if(PRODUCTS[id].name.toLowerCase()===t) return {match:id,kind:"exact"}; }
  if(ALIASES[t]) return {match:ALIASES[t],kind:"exact"};
  for(const key in ALIASES){ if(t.includes(key)||key.includes(t)) return {match:ALIASES[key],kind:"alias"}; }
  for(const id of PRODUCT_ORDER){ if(PRODUCTS[id].name.toLowerCase().includes(t)) return {match:id,kind:"contains"}; }
  for(const id of PRODUCT_ORDER){ if(PRODUCTS[id].cat.toLowerCase()===t) return {match:id,kind:"category"}; }
  return {match:null,kind:"unavailable"};
}

/* ============================================================
   PRICE RESOLUTION — manual/CSV > live provider > demo
   Returns {price, source, lastUpdated} or null (not stocked).
   ============================================================ */
function brandKey(store){
  const s=((store.brand||store.name)||"").toLowerCase();
  if(s.includes("aldi")) return "aldi";
  if(s.includes("coles")) return "coles";
  if(s.includes("woolworth")||s==="ww") return "ww";
  if(s.includes("iga")) return "iga";
  return "other";
}
function demoPriceFor(bk,itemId){
  const p=PRODUCTS[itemId]; if(!p) return null;
  if(p.demoPrices[bk]!=null) return p.demoPrices[bk];
  if(bk==="other"){ const vals=Object.values(p.demoPrices).filter(v=>v!=null); if(!vals.length) return null; return Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*1.06*100)/100; }
  return null; // brand genuinely doesn't stock it (demo)
}
function resolvePrice(store,itemId){
  const ov=appState.priceOverrides[store.id+"|"+itemId];
  if(ov && ov.price!=null) return { price:n0(ov.price), source:ov.source||"manual", lastUpdated:ov.lastUpdated||"" };
  const bk=brandKey(store);
  const live=dataProviders[brandKey2provider(bk)]; // live adapter (returns null until connected)
  // live providers are async; we only use them if synchronously cached (not in this build) -> fall through to demo
  const d=demoPriceFor(bk,itemId);
  if(d!=null) return { price:d, source:"demo", lastUpdated:"sample" };
  return null;
}
function brandKey2provider(bk){ return bk==="ww"?"woolworths":(bk==="coles"?"coles":(bk==="aldi"?"aldi":(bk==="iga"?"iga":"fallbackDemo"))); }
function cheapestPrice(itemId){ let m=null; appState.stores.forEach(st=>{ const r=resolvePrice(st,itemId); if(r&&(m==null||r.price<m)) m=r.price; }); return m; }

/* ============================================================
   LOCATION & TRAVEL ENGINE
   ============================================================ */
function fuelCost(distanceKm){ const s=appState.settings; return safeDiv(distanceKm*2,100)*n0(s.litres)*n0(s.fuelPrice); }   // round trip
function travelMinutesFor(distanceKm){ return Math.max(1,Math.round(safeDiv(distanceKm,40)*60)); }                          // ~40 km/h urban estimate
function timeCost(distanceKm){ const s=appState.settings; return safeDiv(travelMinutesFor(distanceKm)*2,60)*n0(s.hourly); } // round trip

function haversineKm(la1,lo1,la2,lo2){ const R=6371,r=d=>d*Math.PI/180; const dLa=r(la2-la1),dLo=r(lo2-lo1);
  const a=Math.sin(dLa/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(dLo/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }
function relForBrand(bk){ return {coles:86,ww:88,aldi:80,iga:74,other:75}[bk]||75; }

async function geocodeSuburb(q){
  const url="https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=au&q="+encodeURIComponent(q);
  const resp=await fetch(url,{headers:{"Accept":"application/json"}});
  if(!resp.ok) throw new Error("geocode HTTP "+resp.status);
  const j=await resp.json();
  if(!j.length) return null;
  return { lat:parseFloat(j[0].lat), lng:parseFloat(j[0].lon), label:j[0].display_name };
}

/* Pull real supermarkets near (lat,lng) and turn them into comparison stores */
async function fetchStoresNear(lat,lng){
  const q='[out:json][timeout:25];(node["shop"="supermarket"](around:50000,'+lat+','+lng+');way["shop"="supermarket"](around:50000,'+lat+','+lng+');relation["shop"="supermarket"](around:50000,'+lat+','+lng+'););out center 80;';
  const endpoints=["https://overpass-api.de/api/interpreter","https://overpass.kumi.systems/api/interpreter"];
  let data=null;
  for(const url of endpoints){ try{ const r=await fetch(url,{method:"POST",body:"data="+encodeURIComponent(q)}); if(r.ok){ data=await r.json(); break; } }catch(e){} }
  if(!data) return null;
  const raw=(data.elements||[]).map(el=>{ const p=el.type==="node"?{lat:el.lat,lng:el.lon}:(el.center?{lat:el.center.lat,lng:el.center.lon}:null);
    if(!p) return null; const t=el.tags||{}; const name=t.name||t.brand||"Supermarket";
    const addr=[t["addr:housenumber"],t["addr:street"],t["addr:suburb"]||t["addr:city"]].filter(Boolean).join(" ");
    return { name, brand:t.brand||name, address:addr, lat:p.lat, lng:p.lng, dist:haversineKm(lat,lng,p.lat,p.lng) };
  }).filter(Boolean).filter(p=>p.dist<=50).sort((a,b)=>a.dist-b.dist);
  const seen=[]; return raw.filter(p=>{ const dup=seen.some(s=>s.name===p.name && haversineKm(s.lat,s.lng,p.lat,p.lng)<0.12); if(!dup) seen.push(p); return !dup; });
}
/* Build the comparison store set (one nearest branch per major brand + a couple of others) */
function buildComparisonStores(found){
  const pick=[]; const usedBrand={};
  for(const f of found){ const bk=brandKey(f); if(bk!=="other" && !usedBrand[bk]){ usedBrand[bk]=true; pick.push(f); } if(pick.length>=4) break; }
  for(const f of found){ if(pick.length>=6) break; if(!pick.includes(f)) pick.push(f); }
  return pick.map((f,i)=>{ const bk=brandKey(f); return {
    id:"osm_"+i+"_"+bk, name:f.name, brand:f.brand||f.name, lat:f.lat, lng:f.lng,
    distanceKm:Math.round(f.dist*10)/10, reliability:relForBrand(bk), demo:false }; });
}

/* ============================================================
   ENGINES — all read appState; write into appState.computed
   ============================================================ */
function computeStoresList(){
  const s=appState.settings;
  const results=appState.stores.map(st=>{
    let basket=0, elsewhere=0, unitSum=0, unitCount=0, protein=0, calories=0, wasteSum=0, counted=0; const missing=[];
    appState.list.forEach(li=>{ const it=PRODUCTS[li.id]; if(!it) return; const qty=Math.max(0,n0(li.qty));
      const r=resolvePrice(st,li.id);
      if(!r){ missing.push(it.name); const alt=cheapestPrice(li.id); if(alt!=null) elsewhere+=alt*qty; return; }
      basket+=r.price*qty; unitSum+=safeDiv(r.price,it.ua); unitCount++;
      protein+=n0(it.protein)*qty; calories+=n0(it.calories)*qty;
      wasteSum+=(it.waste==="high"?25:it.waste==="med"?12:3); counted++;
    });
    const fullBasket=basket+elsewhere;
    const fuel=fuelCost(st.distanceKm), time=timeCost(st.distanceKm);
    const missingPenalty=missing.length>0?12*missing.length:0;     // friction cost of an incomplete shop
    const realCost=fullBasket+fuel+time-n0(s.discounts);
    return { st, basket, elsewhere, fullBasket, fuel, time, travelCost:fuel+time, realCost, missingPenalty,
      travelMinutes:travelMinutesFor(st.distanceKm),
      avgUnit:safeDiv(unitSum,unitCount), protein, calories,
      proteinPerDollar:safeDiv(protein,fullBasket), avgWaste:safeDiv(wasteSum,counted),
      missing, itemsCount:appState.list.length-missing.length, outOfRange:st.distanceKm>n0(s.maxDist) };
  });
  const valid=results.filter(r=>r.itemsCount>0);
  const minTravelCost=valid.length?Math.min(...valid.map(r=>r.travelCost)):0;
  results.forEach(r=>{ if(r.missing.length>0){ r.secondTrip=minTravelCost; r.realCost+=minTravelCost; } else r.secondTrip=0; });
  const arr=f=>valid.map(f).filter(v=>isFinite(v));
  const min=a=>a.length?Math.min(...a):0, max=a=>a.length?Math.max(...a):0;
  const minReal=min(arr(r=>r.realCost)), minUnit=min(arr(r=>r.avgUnit).filter(v=>v>0)),
        minTravel=min(arr(r=>r.travelCost)), minTime=min(arr(r=>r.travelMinutes)),
        maxPPD=max(arr(r=>r.proteinPerDollar)), minWaste=min(arr(r=>r.avgWaste)), maxWaste=max(arr(r=>r.avgWaste));
  const w=MODE_WEIGHTS[appState.mode]||MODE_WEIGHTS.balanced;
  results.forEach(r=>{
    const priceScore=clamp(safeDiv(minReal,r.realCost)*100,0,100);
    const unitScore=r.avgUnit>0?clamp(safeDiv(minUnit,r.avgUnit)*100,0,100):0;
    const travelScore=r.travelCost>0?clamp(safeDiv(minTravel,r.travelCost)*100,0,100):100;
    const nutritionScore=maxPPD>0?clamp(safeDiv(r.proteinPerDollar,maxPPD)*100,0,100):0;
    const wasteScore=maxWaste>minWaste?clamp(100-safeDiv(r.avgWaste-minWaste,maxWaste-minWaste)*100,0,100):100;
    const timeScore=r.travelMinutes>0?clamp(safeDiv(minTime,r.travelMinutes)*100,0,100):100;
    const relScore=r.st.reliability;
    r.scores={priceScore,unitScore,travelScore,nutritionScore,wasteScore,timeScore,relScore};
    r.score=Math.round(priceScore*w.price+unitScore*w.unit+travelScore*w.travel+nutritionScore*w.nutrition+wasteScore*w.waste+timeScore*w.time+relScore*w.reliability);
    r.score=clamp(r.score-(r.missing.length*3),0,100);
    if(r.itemsCount===0) r.score=0;
  });
  const ranked=results.slice().sort((a,b)=>{ const ar=(a.outOfRange||a.itemsCount===0)?1:0,br=(b.outOfRange||b.itemsCount===0)?1:0;
    if(ar!==br) return ar-br; if(b.score!==a.score) return b.score-a.score; return a.realCost-b.realCost; });
  ranked.forEach((r,i)=>r.rank=i);
  return { results, ranked };
}
function computeSplit(){
  const s=appState.settings; const single=appState.computed.stores.ranked[0];
  const perItem=appState.list.map(li=>{ let best=null; appState.stores.forEach(st=>{ const r=resolvePrice(st,li.id); if(r&&(best==null||r.price<best.price)) best={storeId:st.id,price:r.price,store:st}; }); return {li,it:PRODUCTS[li.id],best}; });
  const visitedIds=[...new Set(perItem.filter(x=>x.best).map(x=>x.best.storeId))].filter(id=>{ const st=appState.stores.find(s2=>s2.id===id); return st && st.distanceKm<=n0(s.maxDist); });
  const multiBasket=perItem.reduce((a,x)=>a+(x.best?x.best.price*Math.max(0,n0(x.li.qty)):0),0);
  const multiTravel=visitedIds.reduce((a,id)=>{ const st=appState.stores.find(s2=>s2.id===id); return a+fuelCost(st.distanceKm)+timeCost(st.distanceKm); },0);
  const multiReal=multiBasket+multiTravel-n0(s.discounts);
  const basketSaving=(single?single.basket:0)-multiBasket;
  const extraTravel=multiTravel-(single?single.travelCost:0);
  const netSaving=(single?single.realCost:0)-multiReal;
  const worthIt=visitedIds.length>1 && netSaving>0;
  return { perItem, visited:visitedIds, multiBasket, multiTravel, multiReal, single, basketSaving, extraTravel, netSaving, worthIt };
}
function computeSwaps(){
  const out=[];
  appState.list.forEach(li=>{ const it=PRODUCTS[li.id]; if(!it||!it.swap) return; const qty=Math.max(0,n0(li.qty));
    if(it.swap.to){ const to=PRODUCTS[it.swap.to]; if(!to) return; const from=cheapestPrice(li.id), toP=cheapestPrice(it.swap.to);
      if(from==null||toP==null) return; const saving=(from-toP)*qty; out.push({fromName:it.name,toName:to.name,note:it.swap.note,saving});
    } else { const from=cheapestPrice(li.id); const saving=from!=null?from*qty*0.35:0; out.push({fromName:it.name,toName:"larger / value pack",note:it.swap.note,saving}); }
  });
  return out.filter(x=>x.saving>0.01).sort((a,b)=>b.saving-a.saving);
}
function computeMeals(){
  return MEALS.map(m=>{ let cost=0,protein=0,calories=0,ok=true;
    m.comp.forEach(([id,serves])=>{ const p=cheapestPrice(id); if(p==null){ok=false;return;} cost+=safeDiv(p,serves); protein+=safeDiv(n0(PRODUCTS[id].protein),serves); calories+=safeDiv(n0(PRODUCTS[id].calories),serves); });
    return { name:m.name, prep:m.prep, waste:m.waste, ok, costPerServe:cost, protein, calories, proteinPerDollar:safeDiv(protein,cost) };
  }).sort((a,b)=>b.proteinPerDollar-a.proteinPerDollar);
}
function computeWaste(){
  const tips=[]; const counts={};
  appState.list.forEach(li=>{ counts[li.id]=(counts[li.id]||0)+1; });
  appState.list.forEach(li=>{ const it=PRODUCTS[li.id]; if(!it) return; const qty=Math.max(0,n0(li.qty));
    const reasons=[]; let risk=it.waste;
    if(it.waste==="high") reasons.push("spoils quickly");
    else if(it.waste==="med"&&it.perish) reasons.push("perishable");
    if(qty>=3 && it.perish){ reasons.push("large quantity for a perishable"); risk="high"; }
    const low=cheapestPrice(li.id); const perServe=it.serves>0&&low!=null?safeDiv(low,it.serves):0;
    if(perServe>1.2) reasons.push("expensive per serve ("+money(perServe)+")");
    if(!reasons.length) return;
    let advice; if(it.cat==="Produce") advice="Buy only what you'll eat in ~5 days, or switch to frozen.";
    else if(li.id==="bread") advice="Freeze half the loaf the day you buy it.";
    else if(it.cat==="Meat") advice="Portion and freeze on the day — thaw as needed.";
    else if(it.cat==="Dairy") advice="Buy the size you'll finish before the use-by date.";
    else advice="Store cool, use first, or buy a smaller pack.";
    tips.push({ name:it.name, risk, reasons, advice });
  });
  return tips.sort((a,b)=>(b.risk==="high"?1:0)-(a.risk==="high"?1:0));
}
function computeReport(){
  const ranked=appState.computed.stores.ranked; const best=ranked[0];
  const inrange=ranked.filter(r=>!r.outOfRange&&r.itemsCount>0); const worst=inrange.slice(-1)[0]||best;
  const split=appState.computed.split, swaps=appState.computed.swaps;
  const storeSaving=best?Math.max(0,worst.realCost-best.realCost):0;
  const swapSaving=swaps.reduce((a,x)=>a+x.saving,0);
  const splitSaving=split.worthIt?Math.max(0,split.netSaving):0;
  const weeklySaving=storeSaving+swapSaving+splitSaving;
  const overBudget=best?best.realCost-n0(appState.settings.budget):0;
  let worstItem=null;
  appState.list.forEach(li=>{ const it=PRODUCTS[li.id]; const here=best?resolvePrice(best.st,li.id):null; const low=cheapestPrice(li.id);
    if(!here||low==null) return; const gap=(here.price-low)*Math.max(0,n0(li.qty)); if(!worstItem||gap>worstItem.total) worstItem={name:it.name,total:gap}; });
  const bestSwap=swaps[0];
  const nextAction = splitSaving>0 ? `Do a quick second stop — splitting stores nets ${money(splitSaving)} this week.`
    : bestSwap ? `Swap ${bestSwap.fromName} for ${bestSwap.toName} to save ${money(bestSwap.saving)}.`
    : best ? `Stick with ${best.st.name} — you're already on the smartest option.` : "Add items to build your plan.";
  return { best, worst, weeklySaving, storeSaving, swapSaving, splitSaving, overBudget, worstItem, bestSwap, nextAction, missing:best?best.missing:[] };
}

/* one pass: recompute everything into appState.computed */
function recompute(){
  appState.computed.stores=computeStoresList();
  appState.computed.split=computeSplit();
  appState.computed.swaps=computeSwaps();
  appState.computed.meals=computeMeals();
  appState.computed.waste=computeWaste();
  appState.computed.report=computeReport();
}

/* ============================================================
   RENDERING — every renderer reads appState.computed
   ============================================================ */
function colourForScore(v){ return v>=75?"var(--best)":v>=55?"var(--okay)":"var(--bad)"; }
function srcBadge(src){ const m={demo:["src-demo","demo"],manual:["src-manual","your price"],csv:["src-csv","csv"],live:["src-live","live"]}[src]||["src-demo","demo"]; return `<span class="src-badge ${m[0]}">${m[1]}</span>`; }
function badgeForRank(r){ if(r.outOfRange) return '<span class="badge b-mute">Beyond max distance</span>'; if(r.rank===0) return '<span class="badge b-best">● Best value</span>'; if(r.rank===1) return '<span class="badge b-okay">● Good</span>'; return '<span class="badge b-bad">● Expensive</span>'; }
function basketPriceSource(){ // dominant source across the basket for the best store
  const best=appState.computed.stores.ranked[0]; if(!best) return "demo"; const counts={};
  appState.list.forEach(li=>{ const r=resolvePrice(best.st,li.id); if(r) counts[r.source]=(counts[r.source]||0)+1; });
  return (counts.manual||counts.csv)?(counts.csv>=counts.manual?"csv":"manual"):"demo";
}

function renderHero(){
  const el=document.getElementById("heroBody"); if(!el) return; const s=appState.settings;
  const comp=appState.computed.stores; const best=comp.ranked[0];
  if(!appState.list.length || !best || best.itemsCount===0){
    el.innerHTML='<div class="lead">Best decision<button class="qbtn" data-help="rec">?</button></div><h2>Add items to begin</h2><div class="why">Your smartest food decision appears here once your shopping list has items.</div>'; return;
  }
  const inrange=comp.ranked.filter(r=>!r.outOfRange&&r.itemsCount>0);
  const worst=inrange.slice(-1)[0]||best; const saved=Math.max(0,worst.realCost-best.realCost);
  const perPerson=safeDiv(best.realCost,s.house); const overBudget=best.realCost-n0(s.budget);
  let why=`<b>${escapeHtml(best.st.name)}</b> wins on your “${appState.mode}” priorities — basket ${money(best.fullBasket)}, plus ${money(best.fuel)} fuel and ${money(best.time)} time for the ${best.st.distanceKm} km round trip. `;
  const cheapShelf=inrange.slice().sort((a,b)=>a.fullBasket-b.fullBasket)[0];
  if(cheapShelf && cheapShelf.st.id!==best.st.id){ const gap=cheapShelf.realCost-best.realCost;
    if(gap>0) why+=`${escapeHtml(cheapShelf.st.name)}'s shelf prices look cheaper (${money(cheapShelf.fullBasket)}), but its ${cheapShelf.st.distanceKm} km trip adds ${money(cheapShelf.fuel+cheapShelf.time)} — making ${escapeHtml(best.st.name)} about ${money(gap)} cheaper in real terms. `; }
  why+=appState.computed.split.worthIt?`Splitting stores would save a further ${money(appState.computed.split.netSaving)} after travel. `:`Chasing specials across stores isn't worth the extra travel this week. `;
  const srcNote = appState.storesSource==="live-location" ? "" : ' <span class="src-badge src-demo" style="vertical-align:baseline">demo stores</span>';
  const budgetLine=overBudget>0?`<span class="badge b-okay" style="margin-left:6px">${money(overBudget)} over budget</span>`:`<span class="badge b-best" style="margin-left:6px">${money(-overBudget)} under budget</span>`;
  el.innerHTML=`
    <div class="lead">Smartest decision this week<button class="qbtn" data-help="rec">?</button></div>
    <h2>Shop ${escapeHtml(best.st.name)} — real cost ${money(best.realCost)} ${budgetLine}</h2>
    <div class="why">${why}${srcNote}</div>
    <div class="hero-stats">
      <div class="hero-stat"><div class="k">Real cost</div><div class="v num">${money(best.realCost)}</div></div>
      <div class="hero-stat"><div class="k">vs worst option</div><div class="v num" style="color:#7EE3BE">${money(saved)} saved</div></div>
      <div class="hero-stat"><div class="k">Per person</div><div class="v num">${money(perPerson)}</div></div>
      <div class="hero-stat"><div class="k">Decision score</div><div class="v num">${best.score}/100</div></div>
    </div>`;
}
function renderStores(){

function renderSplit(){
  const el=document.getElementById("splitBody");
  if(!appState.list.length){ el.innerHTML='<div class="empty">Add items to compare single-store vs multi-store shopping.</div>'; return; }
  const sp=appState.computed.split; if(!sp.single){ el.innerHTML='<div class="empty">No in-range store stocks your list yet.</div>'; return; }
  const rows=sp.perItem.map(x=>{ if(!x.best) return `<tr><td>${escapeHtml(x.it.name)}</td><td>—</td><td class="r">not stocked</td></tr>`;
    return `<tr><td>${escapeHtml(x.it.name)}</td><td>${escapeHtml(x.best.store.name)}</td><td class="r num">${money(x.best.price*Math.max(0,n0(x.li.qty)))}</td></tr>`; }).join("");
  const verdict=sp.worthIt
    ? `<div class="note good">${ico("check")}<div><b>Worth splitting.</b> Buying each item at its cheapest store across ${sp.visited.length} shops costs ${money(sp.multiReal)} all-in — ${money(sp.netSaving)} less than a single trip to ${escapeHtml(sp.single.st.name)}, even after ${money(Math.max(0,sp.extraTravel))} extra travel.</div></div>`
    : `<div class="note warn">${ico("alert")}<div><b>Not worth splitting. Stick to one trip.</b> Chasing specials would shave ${money(Math.max(0,sp.basketSaving))} off the basket but add ${money(Math.max(0,sp.extraTravel))} of fuel and time. Stay with ${escapeHtml(sp.single.st.name)}.</div></div>`;
  el.innerHTML=`<div class="grid g-2" style="margin-bottom:14px">
      <div class="hero-stat" style="background:var(--surface);border:1px solid var(--line)"><div class="k muted">Single store — ${escapeHtml(sp.single.st.name)}</div><div class="v num" style="color:var(--navy)">${money(sp.single.realCost)}</div><div class="tiny muted">basket ${money(sp.single.basket)} + travel ${money(sp.single.travelCost)}</div></div>
      <div class="hero-stat" style="background:var(--surface);border:1px solid var(--line)"><div class="k muted">Split across ${sp.visited.length} stores</div><div class="v num" style="color:var(--navy)">${money(sp.multiReal)}</div><div class="tiny muted">basket ${money(sp.multiBasket)} + travel ${money(sp.multiTravel)}</div></div>
    </div>${verdict}
    <table style="margin-top:14px"><thead><tr><th>Item</th><th>Cheapest at</th><th class="r">Line cost</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function renderSwaps(){

  const total=sw.reduce((a,x)=>a+x.saving,0);
  el.innerHTML=`<div class="note good" style="margin-bottom:6px">${ico("check")}<div>Swapping the items below could save about <b>${money(total)}</b> on this shop without losing the meal.</div></div>
    ${sw.map(x=>`<div class="line"><div><b>${escapeHtml(x.fromName)}</b> <span class="swap-arrow">→</span> <b>${escapeHtml(x.toName)}</b><div class="tiny muted" style="max-width:560px">${escapeHtml(x.note||"")}</div></div><div class="pill" style="background:var(--best-bg);color:var(--best)">save ${money(x.saving)}</div></div>`).join("")}`;
}

function publishFoodSavings(){
  try{
    const ranked=(appState.computed&&appState.computed.stores&&appState.computed.stores.ranked)||[];
    const best=ranked[0];
    const inr=ranked.filter(r=>!r.outOfRange && r.itemsCount>0);
    const worst=inr.length?inr[inr.length-1]:best;
    const spend=best?Math.round(best.realCost):0;
    const save=(best&&worst)?Math.max(0,Math.round(worst.realCost-best.realCost)):0;
    localStorage.setItem("hmgood:foodsavings", JSON.stringify({ weeklySpend:spend, weeklySaving:save, annualSaving:save*52, store:(best&&best.st)?best.st.name:"", budget:n0(appState.settings.budget), updatedAt:Date.now() }));
  }catch(e){}
}

  document.querySelectorAll(".fb-tab").forEach(t=>t.classList.toggle("on",t.getAttribute("data-tab")===name));

  if(name==="nearby" && typeof foodMap!=="undefined" && foodMap){ setTimeout(()=>{ try{ foodMap.invalidateSize(); }catch(e){} },60); }
  setTimeout(postHeight,60);
}
function topSwapWithIds(){
  const dismissed=appState._swapDismiss||{};
  for(const li of appState.list){ const it=PRODUCTS[li.id]; if(!it||!it.swap||!it.swap.to||dismissed[li.id]) continue;
    const to=PRODUCTS[it.swap.to]; if(!to) continue; const fromP=cheapestPrice(li.id), toP=cheapestPrice(it.swap.to);
    if(fromP==null||toP==null) continue; const qty=Math.max(0,n0(li.qty)); const saving=(fromP-toP)*qty;
    if(saving>0.01) return {fromId:li.id,toId:it.swap.to,fromName:it.name,toName:to.name,fromPrice:fromP*qty,toPrice:toP*qty,saving};
  }
  return null;
}
function estWasteWeekly(){ let est=0;
  appState.list.forEach(li=>{ const it=PRODUCTS[li.id]; if(!it) return; const low=cheapestPrice(li.id); if(low==null) return;
    const qty=Math.max(0,n0(li.qty)); const f=it.waste==="high"?0.22:(it.waste==="med"&&it.perish?0.10:0); est+=low*qty*f; });
  return Math.round(est);
}
function foodAcceptSwap(fromId,toId){ const i=appState.list.findIndex(x=>x.id===fromId); if(i<0) return; const qty=appState.list[i].qty;
  if(appState.list.some(x=>x.id===toId)){ appState.list.splice(i,1); } else { appState.list[i]={id:toId,qty:qty}; } renderAll(); }
function foodDismissSwap(fromId){ appState._swapDismiss=appState._swapDismiss||{}; appState._swapDismiss[fromId]=1; renderToday(); }

/* ---- CSV import / export ---- */
function importCSV(file){
  const reader=new FileReader();
  reader.onload=()=>{ try{ const text=String(reader.result||""); const lines=text.split(/\r?\n/).filter(l=>l.trim());
    let added=0, skipped=0, start=0;
    if(lines[0] && /store/i.test(lines[0]) && /item/i.test(lines[0])) start=1;
    for(let i=start;i<lines.length;i++){ const parts=lines[i].split(",").map(s=>s.trim()); if(parts.length<3) { skipped++; continue; }
      const [storeName,itemName,priceStr]=parts; const price=parseFloat(String(priceStr).replace(/[^0-9.]/g,""));
      if(!isFinite(price)){ skipped++; continue; }
      const store=appState.stores.find(st=>st.name.toLowerCase()===storeName.toLowerCase()) || appState.stores.find(st=>brandKey(st)===brandKey({name:storeName}));
      const m=matchProduct(itemName);
      if(!store||!m.match){ skipped++; continue; }
      appState.priceOverrides[store.id+"|"+m.match]={price,source:"csv",lastUpdated:todayISO()}; added++; }
    document.getElementById("matchNote").textContent="";
    locStatus(`CSV imported: ${added} price${added===1?"":"s"} applied${skipped?`, ${skipped} row(s) skipped`:""}.`);
    renderAll();
  }catch(err){ locStatus("Couldn't read that CSV — check the format."); } };
  reader.readAsText(file);
}
function downloadFile(name,text,type){ try{ const blob=new Blob([text],{type:type||"text/plain"}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500); }catch(e){ locStatus("Download blocked by the browser."); } }
function exportPriceTemplate(){ let csv="store,item,price\n";
  appState.stores.forEach(st=>appState.list.forEach(li=>{ const r=resolvePrice(st,li.id); csv+=`${st.name},${PRODUCTS[li.id].name},${r?r.price.toFixed(2):""}\n`; }));
  downloadFile("food-prices-template.csv",csv,"text/csv"); }
function exportReport(){ const rep=appState.computed.report; if(!rep.best){ return; } const s=appState.settings;
  let t=`SMART FOOD SAVINGS — WEEKLY REPORT (${todayISO()})\n`;
  t+=`Area: ${s.suburb} · Household: ${s.house} · Mode: ${appState.mode}\n`;
  t+=`Stores: ${appState.storesSource==="live-location"?"real (OpenStreetMap)":"demo"} · Prices: ${basketPriceSource()}\n\n`;
  t+=`Best store: ${rep.best.st.name} (${rep.best.st.distanceKm} km)\n`;
  t+=`Basket: ${money(rep.best.basket)} | Fuel: ${money(rep.best.fuel)} | Time: ${money(rep.best.time)}\n`;
  t+=`REAL COST: ${money(rep.best.realCost)}  (${rep.overBudget>0?money(rep.overBudget)+" over":money(-rep.overBudget)+" under"} budget)\n`;
  t+=`Saving vs worst option: ${money(rep.storeSaving)}\n`;
  t+=`Estimated total weekly saving: ${money(rep.weeklySaving)}\n\n`;
  t+=`Missing at best store: ${rep.missing.length?rep.missing.join(", "):"none"}\n`;
  t+=`Best swap: ${rep.bestSwap?`${rep.bestSwap.fromName} → ${rep.bestSwap.toName} (save ${money(rep.bestSwap.saving)})`:"none"}\n`;
  t+=`Worst-value item: ${rep.worstItem?`${rep.worstItem.name} (${money(rep.worstItem.total)} above best)`:"none"}\n\n`;
  t+=`Shopping list:\n`; appState.list.forEach(li=>{ const low=cheapestPrice(li.id); t+=`  - ${PRODUCTS[li.id].name} ×${n0(li.qty)} (from ${low!=null?money(low):"n/a"})\n`; });
  t+=`\nNext action: ${rep.nextAction}\n`;
  downloadFile("weekly-food-report.txt",t,"text/plain"); }

async function updateStoresForSuburb(){
  const q=(document.getElementById("s_suburb").value||"").trim(); if(!q){ locStatus("Enter a suburb or postcode first."); return; }
  appState.settings.suburb=q; saveState();
  locStatus("Finding "+q+"…");
  try{ const g=await geocodeSuburb(q+", Australia");
    if(!g){ locStatus("Couldn't find that suburb/postcode. Showing demo stores."); return; }
    appState.settings.lat=g.lat; appState.settings.lng=g.lng;
    if(foodMap){ setUserLocation(g.lat,g.lng,"Your area",true); }   // also drives the map + comparison
    else { await applyLocation(g.lat,g.lng); }
  }catch(e){ locStatus("Location lookup failed (offline?). Showing demo stores."); }
}
async function applyLocation(lat,lng){
  locStatus("Loading real stores near you…");
  const found=await fetchStoresNear(lat,lng);
  if(!found||!found.length){ locStatus("No supermarkets found nearby — keeping demo stores."); return found; }
  appState.stores=buildComparisonStores(found); appState.storesSource="live-location";
  locStatus(`Loaded ${appState.stores.length} real store${appState.stores.length===1?"":"s"} near you.`);
  renderAll();
  return found;
}

<script>
/* ---------- utilities ---------- */
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid=()=>'id'+Math.random().toString(36).slice(2,10);
const money=(n,dec)=>{const v=Number(n)||0;const opts={style:'currency',currency:State.d.settings.currency||'AUD',minimumFractionDigits:dec==null?0:dec,maximumFractionDigits:dec==null?0:dec};return new Intl.NumberFormat('en-AU',opts).format(v)};
const money2=n=>money(n,2);
const r2=n=>Math.round((Number(n)||0)*100)/100; /* money-safe 2dp rounding — every engine amount and balance goes through this */
const pct=n=>(Math.round((Number(n)||0)*10)/10)+'%';
/* Calendar dates are LOCAL — never derive them via toISOString (UTC), which
   shifts anything before 10am AEST onto the previous day. */
const parseD=s=>{if(s instanceof Date)return new Date(s.getTime());const m=String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);return m?new Date(+m[1],+m[2]-1,+m[3]):new Date(s)};
const dstr=d=>{const x=(d instanceof Date)?d:parseD(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')};
const today=()=>dstr(new Date());
const addDays=(d,n)=>{const x=parseD(d);x.setDate(x.getDate()+n);return dstr(x)};
/* addFreq — advance a date by one billing period. Weekly/fortnightly are pure
   day maths. Monthly/quarterly/yearly land on the same day-of-month in the
   target month, CLAMPED to that month's last day: Jan 31 + 1 month = Feb 28
   (29 in a leap year), never Mar 2/3. Raw setMonth from day 29–31 would skip. */
const FREQ_MONTHS={monthly:1,quarterly:3,yearly:12};
function addFreq(d,freq){
  if(freq==='weekly')return addDays(d,7);
  if(freq==='fortnightly')return addDays(d,14);
  const m=FREQ_MONTHS[freq]||1;
  const x=parseD(d);
  const t=new Date(x.getFullYear(),x.getMonth()+m,1);
  const last=new Date(t.getFullYear(),t.getMonth()+1,0).getDate();
  t.setDate(Math.min(x.getDate(),last));
  return dstr(t);
}
/* Month arithmetic anchored to day 1 — setMonth from a day-29/30/31 date skips months */
const monthsAhead=m=>{const n=new Date();return new Date(n.getFullYear(),n.getMonth()+m,1)};
const monthKey=d=>String(d).slice(0,7);
const fmtDate=d=>{if(!d)return'—';const x=parseD(d);return x.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:x.getFullYear()===new Date().getFullYear()?undefined:'numeric'})};
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
function toast(msg){
  const t=document.createElement('div');t.className='toast';
  t.innerHTML='<span class="ti">'+ic('check')+'</span>'+esc(msg);
  $('#toasts').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),320)},2600);
}

/* ---------- seed data (demo — fully editable, persists to localStorage) ---------- */
function seedData(){
  /* The app starts empty — every record is the user's own. */
  return {
    v:4,
    profile:{name:'',initial:'U'},
    settings:{currency:'AUD',strategy:'avalanche',extraPayment:0,emergencyMonths:3,budgetSystem:'50/30/20',lastExport:''},
    accounts:[],transactions:[],budgets:[],goals:[],debts:[],holdings:[],assets:[],bills:[],documents:[],
    recurrences:[],recurLog:null,
    dismissed:[],snapshots:[]
  };
}

/* ---------- state store ---------- */
const State={
  key:'pfos_state',
  d:null,
  load(){
    try{
      const raw=localStorage.getItem(this.key);
      if(raw){
        this.d=JSON.parse(raw);
        /* One-time cleanup: earlier builds seeded example data. Wipe it only
           if the unmistakable demo fingerprint is present — real user data
           entered from scratch can never match this. */
        const demo=(this.d.v||0)<3
          &&(this.d.accounts||[]).some(a=>a.id==='ac1'&&a.name==='Everyday Account')
          &&(this.d.transactions||[]).some(t=>t.desc==='Salary — Acme Pty Ltd');
        if(demo){this.d=seedData();this.save();}
        /* safe in-load defaults for fields added after v3 — never wipes */
        if(!this.d.settings)this.d.settings={currency:'AUD',strategy:'avalanche',extraPayment:0,emergencyMonths:3,budgetSystem:'50/30/20'};
        if(this.d.settings.lastExport==null)this.d.settings.lastExport='';
        if(!Array.isArray(this.d.bills))this.d.bills=[];
        /* Phase 2 (v4): recurring transaction templates + posting log.
           Fingerprint-safe and idempotent — only fills what is missing. */
        if(!Array.isArray(this.d.recurrences))this.d.recurrences=[];
        if(this.d.recurLog===undefined)this.d.recurLog=null;
        if((this.d.v||0)<4){this.d.v=4;this.save();}
        return;
      }
    }catch(e){}
    this.d=seedData();this.save();
  },
  saveFailed:false,
  save(){
    try{
      localStorage.setItem(this.key,JSON.stringify(this.d));
      this.saveFailed=false;
    }catch(e){
      /* storage full / blocked — keep the in-memory state, warn once per
         session, and let Settings show a persistent banner */
      this.saveFailed=true;
      if(!this._warnedSave){this._warnedSave=true;try{toast('Saving to this device failed — export a backup from Settings now')}catch(_e){}}
    }
  },
  reset(){this.d=seedData();this.save()}
};

/* ---------- computation engines (Volumes 7–14) ---------- */
const Calc={
  monthTx(offset){
    const d=monthsAhead(-(offset||0));
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    return State.d.transactions.filter(t=>monthKey(t.date)===key);
  },
  spendByCat(offset){
    const map={};
    this.monthTx(offset).forEach(t=>{if(t.amount<0&&t.category!=='Savings Transfer')map[t.category]=(map[t.category]||0)+Math.abs(t.amount)});
    return map;
  },
  monthIncome(offset){return this.monthTx(offset).filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0)},
  monthSpend(offset){return this.monthTx(offset).filter(t=>t.amount<0&&t.category!=='Savings Transfer').reduce((s,t)=>s+Math.abs(t.amount),0)},
  monthSaved(offset){return this.monthTx(offset).filter(t=>t.amount<0&&t.category==='Savings Transfer').reduce((s,t)=>s+Math.abs(t.amount),0)},
  avgMonthlyIncome(){const a=this.monthIncome(1),b=this.monthIncome(0);return a>0?a:(b||0)},
  avgMonthlyExpenses(){const a=this.monthSpend(1),b=this.monthSpend(0);return a>0?a:(b||0)},
  cashOnHand(){return State.d.accounts.filter(a=>a.type==='transaction'||a.type==='savings').reduce((s,a)=>s+Math.max(0,a.balance),0)},
  savingsTotal(){return State.d.accounts.filter(a=>a.type==='savings').reduce((s,a)=>s+Math.max(0,a.balance),0)},
  debtTotal(){return State.d.debts.reduce((s,d)=>s+d.balance,0)},
  portfolioValue(){return State.d.holdings.reduce((s,h)=>s+h.units*h.price,0)},
  portfolioCost(){return State.d.holdings.reduce((s,h)=>s+h.units*h.cost,0)},
  assetsTotal(){
    const acct=State.d.accounts.filter(a=>a.type!=='credit'&&a.type!=='loan'&&a.type!=='investment').reduce((s,a)=>s+Math.max(0,a.balance),0);
    const other=State.d.assets.reduce((s,a)=>s+a.value,0);
    return acct+other+this.portfolioValue();
  },
  netWorth(){return this.assetsTotal()-this.debtTotal()},
  monthlyBills(){
    const f={weekly:52/12,fortnightly:26/12,monthly:1,quarterly:1/3,yearly:1/12};
    return State.d.bills.reduce((s,b)=>s+b.amount*(f[b.freq]||1),0);
  },
  minDebtPayments(){return State.d.debts.reduce((s,d)=>s+d.min,0)},
  essentialMonthly(){return this.monthlyBills()+(this.spendByCat(1)['Groceries']||this.spendByCat(0)['Groceries']||0)+this.minDebtPayments()},
  plannedSavings(){return State.d.budgets.filter(b=>b.category==='Savings Transfer').reduce((s,b)=>s+b.limit,0)},
  safeToSpend(){
    const income=this.avgMonthlyIncome();
    const committed=this.monthlyBills()+this.minDebtPayments()+State.d.settings.extraPayment+this.plannedSavings();
    const discretionary=Math.max(0,income-committed);
    const now=new Date();const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    const elapsed=now.getDate()/dim;
    const spend=this.spendByCat(0);
    const discSpent=['Dining','Shopping','Subscriptions'].reduce((s,c)=>s+(spend[c]||0),0);
    return Math.max(0,discretionary-Math.max(0,discSpent-discretionary*elapsed*0.4));
  },
  runwayMonths(){
    const e=this.essentialMonthly();
    return e>0?this.cashOnHand()/e:0;
  },
  savingsRate(){
    const inc=this.avgMonthlyIncome();if(!inc)return 0;
    const saved=this.monthSaved(0)||this.monthSaved(1);
    return clamp(saved/inc*100,0,100);
  },
  utilisation(){
    const cards=State.d.debts.filter(d=>d.limit);
    if(!cards.length)return 0;
    const used=cards.reduce((s,d)=>s+d.balance,0),lim=cards.reduce((s,d)=>s+d.limit,0);
    return lim?used/lim*100:0;
  },
  dti(){
    const inc=this.avgMonthlyIncome();
    return inc?this.minDebtPayments()/inc*100:0;
  },
  budgetAdherence(){
    const spend=this.spendByCat(0);let over=0,n=0;
    State.d.budgets.forEach(b=>{if(b.group==='savings')return;n++;const s=spend[b.category]||0;if(s>b.limit)over++});
    return n?(1-over/n)*100:100;
  },
  subscriptions(){
    const subs={};
    State.d.transactions.filter(t=>t.category==='Subscriptions'&&t.amount<0).forEach(t=>{
      const k=t.merchant;if(!subs[k])subs[k]={merchant:k,amount:Math.abs(t.amount),count:0,last:t.date};
      subs[k].count++;if(t.date>subs[k].last)subs[k].last=t.date;
    });
    return Object.values(subs).sort((a,b)=>b.amount-a.amount);
  },
  /* Financial Health Score — six weighted pillars (Volume 14) */
  healthScore(){
    const p=[];
    const buf=clamp(this.savingsTotal()/(this.essentialMonthly()*State.d.settings.emergencyMonths||1)*100,0,100);
    p.push({key:'Emergency buffer',score:buf,w:.22,detail:money(this.savingsTotal())+' saved vs '+money(this.essentialMonthly()*State.d.settings.emergencyMonths)+' target ('+State.d.settings.emergencyMonths+' months of essentials)'});
    const dti=this.dti();
    p.push({key:'Debt pressure',score:clamp(100-dti*2.4,0,100),w:.20,detail:pct(dti)+' of income goes to minimum repayments'});
    const sr=this.savingsRate();
    p.push({key:'Savings rate',score:clamp(sr*5,0,100),w:.18,detail:pct(sr)+' of income saved this month (20%+ is excellent)'});
    const ut=this.utilisation();
    p.push({key:'Credit utilisation',score:clamp(100-ut*1.6,0,100),w:.15,detail:pct(ut)+' of credit limits in use (under 30% is healthy)'});
    const ba=this.budgetAdherence();
    p.push({key:'Budget discipline',score:ba,w:.15,detail:Math.round(ba)+'% of budget categories on track this month'});
    const types=new Set(State.d.holdings.filter(h=>h.type!=='Cash').map(h=>h.type)).size+(this.savingsTotal()>0?1:0)+(State.d.accounts.some(a=>a.type==='super')?1:0);
    p.push({key:'Diversification',score:clamp(types*22,0,100),w:.10,detail:types+' distinct asset classes across portfolio, super and savings'});
    const total=Math.round(p.reduce((s,x)=>s+x.score*x.w,0));
    return {total,pillars:p,band:total>=75?'Strong':total>=55?'Stable':total>=35?'Strained':'At Risk'};
  },
  /* Debt payoff simulator (Volume 11) */
  simulateDebts(strategy,extra){
    let debts=State.d.debts.map(d=>({...d})).filter(d=>d.balance>0);
    const order=()=>{debts.sort((a,b)=>strategy==='snowball'?a.balance-b.balance:b.rate-a.rate)};
    let months=0,interestPaid=0;const timeline=[];const payoff={};
    const totalStart=debts.reduce((s,d)=>s+d.balance,0);
    while(debts.some(d=>d.balance>0)&&months<600){
      months++;order();
      let pool=extra;
      debts.forEach(d=>{
        if(d.balance<=0)return;
        const int=d.balance*(d.rate/100/12);interestPaid+=int;d.balance+=int;
        const pay=Math.min(d.balance,d.min);d.balance-=pay;
      });
      for(const d of debts){if(d.balance<=0)continue;const pay=Math.min(d.balance,pool);d.balance-=pay;pool-=pay;if(pool<=0)break}
      debts.forEach(d=>{if(d.balance<=0.01&&!payoff[d.id]){d.balance=0;payoff[d.id]=months}});
      timeline.push(debts.reduce((s,d)=>s+Math.max(0,d.balance),0));
    }
    return {months,interestPaid,timeline,payoff,totalStart};
  },
  /* 12-month cash flow forecast (Volume 9) */
  forecast(adj){
    adj=adj||{income:0,expenses:0,oneOff:0,oneOffMonth:1};
    const inc=this.avgMonthlyIncome()+Number(adj.income||0);
    const exp=this.avgMonthlyExpenses()+Number(adj.expenses||0);
    let cash=this.cashOnHand();const pts=[cash];
    for(let m=1;m<=12;m++){cash+=inc-exp;if(m===Number(adj.oneOffMonth))cash-=Number(adj.oneOff||0);pts.push(cash)}
    return pts;
  },
  goalForecast(g){
    const active=State.d.goals.filter(x=>!x.linked&&x.saved<x.target).length||1;
    const monthly=this.plannedSavings()/active;
    const remaining=g.target-g.saved;
    if(remaining<=0)return {done:true,months:0,monthly};
    const months=monthly>0?Math.ceil(remaining/monthly):999;
    const eta=monthsAhead(months);
    const onTrack=!g.deadline||eta<=parseD(g.deadline);
    return {done:false,months,eta:dstr(eta),onTrack,monthly};
  },
  upcomingBills(days){
    const lim=addDays(today(),days||14);
    return State.d.bills.filter(b=>b.nextDue<=lim).sort((a,b)=>a.nextDue.localeCompare(b.nextDue));
  }
};

/* ---------- insight engine (Volumes 15 & 17) ---------- */
const Brain={
  insights(){
    const out=[];const push=(id,sev,title,body,view)=>{if(!State.d.dismissed.includes(id))out.push({id,sev,title,body,view})};
    /* empty book: guide instead of alerting on missing data */
    if(!State.d.accounts.length&&!State.d.debts.length&&!State.d.transactions.length){
      push('start-accounts','info','Add your accounts to get started','Add your bank accounts, cards and loans — every module builds from them.','accounts');
      push('start-debts','info','List your debts','Add each debt with its balance, rate and minimum payment to unlock the payoff planner.','debt');
      return out;
    }
    const hs=Calc.healthScore();
    const highRate=State.d.debts.filter(d=>d.rate>=15&&d.balance>0).sort((a,b)=>b.rate-a.rate)[0];
    if(highRate)push('hi-rate-'+highRate.id,'bad','Attack the '+highRate.name+' first',
      'It charges '+pct(highRate.rate)+' interest — roughly '+money(highRate.balance*highRate.rate/100/12,0)+' a month. Every extra dollar here beats any savings account.','debt');
    const ut=Calc.utilisation();
    if(ut>50)push('util','warn','Credit utilisation is '+Math.round(ut)+'%','Above 30% drags on your credit score. Getting total card balances under '+money(State.d.debts.filter(d=>d.limit).reduce((s,d)=>s+d.limit,0)*0.3)+' would help.','debt');
    const subs=Calc.subscriptions();const subTotal=subs.reduce((s,x)=>s+x.amount,0);
    if(subs.length>=3)push('subs','info',subs.length+' active subscriptions found','They cost about '+money(subTotal,0)+' a month ('+money(subTotal*12,0)+' a year). Worth a cull?','transactions');
    const ef=State.d.goals.find(g=>g.name==='Emergency Fund');
    if(ef&&ef.saved<ef.target*0.5)push('ef','warn','Emergency fund below halfway','You have '+money(Calc.savingsTotal())+' against a '+money(ef.target)+' target — about '+(Calc.runwayMonths()).toFixed(1)+' months of runway if income stopped.','savings');
    const spend=Calc.spendByCat(0);
    State.d.budgets.forEach(b=>{
      const s=spend[b.category]||0;
      if(b.group!=='savings'&&s>b.limit)push('over-'+b.id,'warn',b.category+' is over budget','Spent '+money(s)+' of the '+money(b.limit)+' limit this month ('+Math.round(s/b.limit*100)+'%).','budgets');
    });
    Calc.upcomingBills(7).filter(b=>!b.autopay).forEach(b=>push('bill-'+b.id+b.nextDue,'warn',b.name+' due '+fmtDate(b.nextDue),money(b.amount,0)+' is not on autopay — pay it manually or set up a transfer.','dashboard'));
    /* recurring-engine visibility — every automatic posting is listed here, nothing is silent */
    const rl=State.d.recurLog;
    if(rl&&rl.items&&rl.items.length&&addDays(rl.date,3)>=today())
      push('recur-post-'+rl.date,'info','Posted '+rl.items.length+' recurring transaction'+(rl.items.length===1?'':'s')+(rl.date===today()?' today':' on '+fmtDate(rl.date)),
        rl.items.slice(0,8).map(i=>i.desc+' '+money2(i.amount)+' ('+fmtDate(i.date)+')').join(' · ')+(rl.items.length>8?' · +'+(rl.items.length-8)+' more':'')+'. Manage schedules on the Transactions page.','transactions');
    if(rl&&rl.bills&&rl.bills.length&&addDays(rl.date,3)>=today())
      push('recur-bills-'+rl.date,'info','Autopay due dates advanced: '+rl.bills.join(', '),'These bills passed their due date and are paid by your bank automatically, so only the due date moved — no transaction was added here.','cashflow');
    if(rl&&rl.warnings&&rl.warnings.length&&addDays(rl.date,7)>=today())
      push('recur-cap-'+rl.date,'warn','Recurring catch-up hit the 24-posting safety cap','These schedules were too far behind and were capped: '+rl.warnings.join(', ')+'. Check their next date and frequency on the Transactions page — the remainder posts on the next open.','transactions');
    if(Calc.savingsRate()>=15)push('sr-good','good','Strong savings rate this month','You are putting away '+pct(Calc.savingsRate())+' of income. Keep the automatic transfers running.','savings');
    const sim=Calc.simulateDebts(State.d.settings.strategy,State.d.settings.extraPayment);
    const simMin=Calc.simulateDebts(State.d.settings.strategy,0);
    if(State.d.settings.extraPayment>0&&sim.months<simMin.months)
      push('extra','good','Your extra '+money(State.d.settings.extraPayment,0)+'/month is working','It makes you debt-free '+(simMin.months-sim.months)+' months sooner and saves '+money(simMin.interestPaid-sim.interestPaid,0)+' in interest.','debt');
    if(hs.total<55)push('hs','warn','Financial health is '+hs.band.toLowerCase()+' ('+hs.total+'/100)','The weakest pillar is "'+hs.pillars.slice().sort((a,b)=>a.score-b.score)[0].key+'". Open the Health module for the fix list.','health');
    /* backup nudge — meaningful book, no recent export */
    if(State.d.transactions.length>=20){
      const le=State.d.settings.lastExport;
      if(!le||addDays(le,30)<today())
        push('backup-nudge','info','Back up your data','You have '+State.d.transactions.length+' transactions stored only on this device'+(le?', and the last backup was '+fmtDate(le):', and no backup has ever been exported')+'. Export one from Settings.','settings');
    }
    const sevRank={bad:0,warn:1,info:2,good:3};
    return out.sort((a,b)=>sevRank[a.sev]-sevRank[b.sev]);
  },
  priorities(){return this.insights().filter(i=>i.sev!=='good').slice(0,4)}
};

/* ---------- SVG chart helpers ---------- */
const Chart={
  line(pts,opts){
    opts=opts||{};const w=opts.w||560,h=opts.h||150,pad=10;
    if(!pts.length)return'';
    const min=Math.min(...pts,0),max=Math.max(...pts,1);
    const X=i=>pad+i*(w-2*pad)/Math.max(1,pts.length-1);
    const Y=v=>h-pad-(v-min)*(h-2*pad)/Math.max(1,(max-min)||1);
    const path=pts.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
    const area=path+' L'+X(pts.length-1).toFixed(1)+' '+(h-pad)+' L'+X(0).toFixed(1)+' '+(h-pad)+' Z';
    const zero=min<0?'<line x1="'+pad+'" x2="'+(w-pad)+'" y1="'+Y(0).toFixed(1)+'" y2="'+Y(0).toFixed(1)+'" stroke="#B3271E" stroke-dasharray="4 4" stroke-width="1"/>':'';
    const col=opts.color||'#2CD5C4';
    return '<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;display:block">'+
      '<path d="'+area+'" fill="'+col+'" opacity=".12"/>'+zero+
      '<path d="'+path+'" fill="none" stroke="'+col+'" stroke-width="2.2" stroke-linecap="round"/>'+
      pts.map((v,i)=>'<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(v).toFixed(1)+'" r="2.4" fill="'+col+'"/>').join('')+'</svg>';

  hbars(items){ // items: {label, value, color}

  },
  donut(items,size){
    size=size||120;const total=items.reduce((s,i)=>s+i.value,0)||1;const r=size/2-10,c=size/2;
    let acc=0;const CIRC=2*Math.PI*r;

      acc+=frac;return el;
    }).join('');
    return '<svg viewBox="0 0 '+size+' '+size+'" style="width:'+size+'px;height:'+size+'px">'+segs+'</svg>';
  },
  ring(score,color){
    const r=46,C=2*Math.PI*r,frac=clamp(score,0,100)/100;
    return '<svg width="110" height="110" viewBox="0 0 110 110" style="transform:rotate(-90deg)">'+
      '<circle cx="55" cy="55" r="'+r+'" fill="none" stroke="var(--line2)" stroke-width="9"/>'+

/* ============================================================
   RECURRING ENGINE (Phase 2)
   postTransaction() is THE single write-path for creating an
   applied transaction — TxView's create path, the recurring
   engine and bill mark-as-paid all use it, so the applied:true
   balance symmetry contract lives in exactly one place.
   ============================================================ */
function postTransaction(tx){
  const t={id:uid(),recurring:false,applied:true,...tx};
  t.amount=r2(t.amount);
  State.d.transactions.unshift(t);
  const acc=State.d.accounts.find(a=>a.id===t.accountId);
  if(acc)acc.balance=r2(Number(acc.balance)+t.amount);
  State.d.transactions.sort((a,b)=>b.date.localeCompare(a.date));
  return t;
}
const Recur={
  CAP:24, /* max catch-up postings per recurrence per run — beyond this a warning is raised */
  _day:null,
  /* Post every due occurrence (nextDate <= today) of every active recurrence,
     multiple periods if the app was closed a while, and advance autopay bills
     whose nextDue has PASSED (no transaction — the user's bank paid those).
     Idempotent per day: after a run every nextDate is in the future, so a
     second call the same day posts nothing. */
  run(){
    const t=today();
    const items=[],warnings=[],bills=[];
    let changed=false;
    (State.d.recurrences||[]).forEach(r=>{
      if(!r.active||!r.nextDate)return;
      let n=0;
      while(r.nextDate<=t&&n<this.CAP){
        const tx=postTransaction({date:r.nextDate,desc:r.desc,merchant:r.merchant||'',category:r.category||'Other',amount:r.amount,accountId:r.accountId,recurring:true});
        items.push({desc:tx.desc,date:tx.date,amount:tx.amount});
        r.nextDate=addFreq(r.nextDate,r.freq);
        n++;changed=true;
      }
      if(n>=this.CAP&&r.nextDate<=t)warnings.push(r.desc);
    });
    (State.d.bills||[]).forEach(b=>{
      if(!b.autopay||!b.nextDue)return;
      let n=0;
      while(b.nextDue<t&&n<this.CAP){b.nextDue=addFreq(b.nextDue,b.freq);n++;changed=true;}
      if(n)bills.push(b.name);
    });
    if(changed){
      /* persist a log of what happened so Brain/Alerts can list it — nothing posts silently */
      if(items.length||warnings.length||bills.length){
        const log=(State.d.recurLog&&State.d.recurLog.date===t)?State.d.recurLog:{date:t,items:[],warnings:[],bills:[]};
        log.items=(log.items||[]).concat(items);
        log.warnings=[...new Set((log.warnings||[]).concat(warnings))];
        log.bills=[...new Set((log.bills||[]).concat(bills))];
        State.d.recurLog=log;
      }
      State.save();
    }
    return {items,warnings,bills};
  },
  notify(rep){
    if(rep.items.length)toast('Posted '+rep.items.length+' recurring transaction'+(rep.items.length===1?'':'s'));
    if(rep.bills.length)toast(rep.bills.length+' autopay bill'+(rep.bills.length===1?'':'s')+' advanced — paid by your bank, no transaction added');
    if(rep.warnings.length)toast('Recurring catch-up stopped at '+this.CAP+' postings — see Alerts');
  },
  runAndNotify(){this._day=today();const rep=this.run();this.notify(rep);return rep;},
  /* called at the top of renderRoute — re-runs the engine once per calendar day */
  dayTick(){if(this._day!==today())this.runAndNotify();}
};
</script>

        {name:'Transport',spent:Math.round(cat(['Transport']))},
        {name:'Subscriptions',spent:Math.round(cat(['Subscriptions']))},
        {name:'Utilities',spent:Math.round(cat(['Utilities','Insurance']))},
        {name:'Lifestyle',spent:Math.round(cat(['Dining','Shopping','Entertainment','Health']))}
      ]
    },
    debts:State.d.debts.filter(d=>d.balance>0).map(d=>({name:d.name,balance:d.balance,rate:d.rate,min:d.min})),
    goals:State.d.goals.filter(g=>!g.linked).map(g=>({name:g.name,saved:g.saved,target:g.target})),
    summary:{emergencyFund:Calc.savingsTotal()},
    accounts:[]
  };
}

const svClamp = (v,lo=0,hi=100)=> Math.max(lo, Math.min(hi, isFinite(v)?v:lo));
const svRound = v => Math.round(isFinite(v)?v:0);

/* ---- model parameters (assumptions, not results — all results are user×model) ---- */
const SV_INDUSTRY = {
  "Healthcare":           {stability:88, automation:20, recession:25, demand:90, wageGrowth:60},
  "Education":            {stability:80, automation:25, recession:30, demand:75, wageGrowth:45},
  "Government / Public":  {stability:90, automation:30, recession:20, demand:70, wageGrowth:40},
  "IT / Technology":      {stability:70, automation:45, recession:55, demand:85, wageGrowth:82},
  "Finance / Banking":    {stability:68, automation:52, recession:60, demand:70, wageGrowth:72},
  "Construction":         {stability:60, automation:35, recession:70, demand:72, wageGrowth:55},
  "Trades / Skilled":     {stability:76, automation:22, recession:50, demand:82, wageGrowth:60},
  "Retail":               {stability:45, automation:65, recession:65, demand:55, wageGrowth:30},
  "Hospitality":          {stability:40, automation:55, recession:80, demand:55, wageGrowth:30},
  "Manufacturing":        {stability:55, automation:72, recession:65, demand:55, wageGrowth:42},
  "Transport / Logistics":{stability:58, automation:62, recession:60, demand:66, wageGrowth:42},
  "Mining / Resources":   {stability:60, automation:50, recession:75, demand:66, wageGrowth:78},
  "Agriculture":          {stability:62, automation:45, recession:55, demand:60, wageGrowth:40},
  "Professional Services":{stability:70, automation:40, recession:55, demand:72, wageGrowth:66},
  "Arts / Media":         {stability:40, automation:50, recession:72, demand:50, wageGrowth:45},
  "Other":                {stability:60, automation:45, recession:55, demand:60, wageGrowth:50},
};
const SV_EMP  = {"Full-time":0.90,"Part-time":0.70,"Contract":0.60,"Casual":0.45,"Self-employed":0.55,"Unemployed":0.15};
const SV_RTOL = {"Low":0.30,"Medium":0.60,"High":0.90};

const Solver = {
  tab:"overview",
  _seeded:false,
  LSKEY:"hmgood:solver:profile",
  profile:{
    /* identity */
    name:"", age:0, occupation:"", industry:"Other", location:"",
    employment:"Full-time", deps:0, education:"Bachelor", skills:"",
    goal:"", risk:"Medium",
    /* financial reality (all monthly unless a balance) */
    income:0, housing:0, debt:0, debtRate:0, savings:0,
    expenses:0, invest:0, emerg:0, insurance:0, transport:0,
    food:0, subs:0,
    /* projection assumptions + wizard completion */
    invRate:8, extra:0, _complete:false,
  },

  /* persist the user's inputs so they survive reloads/navigation */
  save(){ try{ localStorage.setItem(this.LSKEY, JSON.stringify(this.profile)); }catch(e){} },

  /* first open: prefer a saved profile; otherwise seed from the user's real budget/debts/savings */
  seed(){
    if(this._seeded) return; this._seeded=true;
    try{ const saved=localStorage.getItem(this.LSKEY); if(saved){ Object.assign(this.profile, JSON.parse(saved)); return; } }catch(e){}
    try{
      const cat = n => { const c=(DB.budget.categories||[]).find(x=>x.name===n); return c?c.spent:0; };
      const p=this.profile;
      p.income = (DB.budget&&DB.budget.income)||p.income;
      p.housing= cat("Housing & Rent")||p.housing;
      p.food   = cat("Groceries")||p.food;
      p.transport = cat("Transport")||p.transport;
      p.subs   = cat("Subscriptions")||p.subs;
      p.expenses = (cat("Utilities")+cat("Lifestyle"))||p.expenses;
      const bal = sum(DB.debts,d=>d.balance);
      if(bal>0){ p.debt=bal; p.debtRate = svRound(sum(DB.debts,d=>d.balance*d.rate)/bal); }
      p.emerg  = (DB.summary&&DB.summary.emergencyFund)||p.emerg;
      p.savings= Math.max(0, sum(DB.goals,g=>g.saved) - (p.emerg||0));
      if(DB.user&&DB.user.name&&!p.name) p.name = DB.user.name;
    }catch(e){}
  },

  /* =========================================================
     THE CENTRAL ENGINE  —  profile in, every result out
     ========================================================= */
  compute(){
    const p=this.profile;
    const num=v=>Math.max(0,+v||0);
    const ind = SV_INDUSTRY[p.industry] || SV_INDUSTRY.Other;
    const empS = SV_EMP[p.employment] ?? 0.6;
    const riskTol = SV_RTOL[p.risk] ?? 0.6;

    const income=num(p.income), housing=num(p.housing), other=num(p.expenses),
          ins=num(p.insurance), trans=num(p.transport), food=num(p.food), subs=num(p.subs),
          debt=num(p.debt), dRate=num(p.debtRate)/100, savings=num(p.savings),
          invest=num(p.invest), emerg=num(p.emerg), deps=num(p.deps), age=num(p.age)||30;

    // estimated minimum monthly debt servicing (interest + ~0.5%/mo principal, realistic)
    const minDebt = debt>0 ? Math.max(40, debt*(dRate/12) + debt*0.005) : 0;
    const essential = housing+food+trans+ins+minDebt+other*0.6;          // survival spend
    const totalOut  = housing+food+trans+ins+subs+other+minDebt;         // full outflow
    const surplus   = income-totalOut;
    const savingsRate = income>0 ? surplus/income : 0;
    const dtiM      = income>0 ? minDebt/income : 0;                     // monthly debt-to-income
    const dtiTotal  = income>0 ? debt/(income*12) : (debt>0?2:0);        // debt to annual income
    const housingRatio = income>0 ? housing/income : (housing>0?1:0);
    const liquid    = savings+emerg;
    const runway    = essential>0 ? liquid/essential : (liquid>0?12:0);  // months with no income
    const netWorth  = savings+invest+emerg-debt;
    const expReturn = 0.04 + riskTol*0.06;                               // 4%–10% by risk appetite

    /* ---- stability score (higher = safer) ---- */
    let stab=0;
    stab += svClamp(runway/6,0,1)*26;
    stab += surplus>0 ? svClamp(savingsRate/0.2,0,1)*18 : -10;
    stab += housingRatio<=0.3 ? 14 : svClamp(1-(housingRatio-0.3)/0.35,0,1)*14;
    stab += dtiM<=0.10 ? 12 : svClamp(1-(dtiM-0.10)/0.35,0,1)*12;
    stab += empS*15;
    stab += (ind.stability/100)*15;
    const stability = svRound(svClamp(stab));

    /* ---- financial pressure score (higher = worse) ---- */
    let pres=0;
    pres += surplus<0 ? 35 : svClamp(1-savingsRate/0.2,0,1)*20;
    pres += housingRatio>0.3 ? svClamp((housingRatio-0.3)/0.3,0,1)*25 : 0;
    pres += dtiM>0.10 ? svClamp((dtiM-0.10)/0.30,0,1)*22 : 0;
    pres += svClamp(1-runway/3,0,1)*23;
    const pressure = svRound(svClamp(pres));

    /* ---- risk exposure score (higher = worse) ---- */
    let risk=0;
    risk += ind.automation*0.16;
    risk += ind.recession*0.16;
    risk += (1-empS)*22;
    risk += svClamp(deps/4,0,1)*12;
    risk += svClamp(1-runway/6,0,1)*18;
    risk += svClamp(dtiTotal,0,1)*16;
    const riskExp = svRound(svClamp(risk));

    /* ---- net-worth projection: current vs action path ---- */
    const project = direct=>{
      let inv=invest, em=emerg, sv=savings, db=debt;
      const out=[svRound(inv+em+sv-db)];
      for(let m=1;m<=120;m++){
        let cash=Math.max(0,surplus)*direct;
        db*=(1+dRate/12);
        if(db>0){ const pay=Math.min(db,cash); db-=pay; cash-=pay; }
        inv = inv*(1+expReturn/12) + cash;
        em*=(1+0.01/12); sv*=(1+0.01/12);
        if(m%12===0) out.push(svRound(inv+em+sv-db));
      }
      return out;
    };
    const projCurrent = project(0.30);     // low discipline
    const projAction  = project(0.95);     // surplus deployed deliberately
    const nw10 = projAction[projAction.length-1];

    this.R = {
      ind, empS, riskTol, age, deps,
      income, housing, other, ins, trans, food, subs, debt, dRate, savings, investBal:invest, emerg,
      minDebt, essential, totalOut, surplus, savingsRate, dtiM, dtiTotal, housingRatio,
      liquid, runway, netWorth, expReturn,
      stability, pressure, riskExp, projCurrent, projAction, nw10,
    };
    // dependent engines (read this.R) — ordering matters: reco reads decisions/career/investGate
    this.R.scenarios   = this.scenarioEngine();
    this.R.decisions   = this.decisionEngine();
    this.R.career      = this.careerEngine();
    this.R.education   = this.educationEngine();
    this.R.housingOpts = this.housingEngine();
    this.R.savingsOpts = this.homeSavingsEngine();
    this.R.investGate  = this.investingGatekeeper();   // distinct from investBal (numeric balance)
    this.R.reco        = this.recommendationEngine();
    this.R.warnings    = this.warnings();
    return this.R;
  },

  /* ========== SCENARIO / STRESS-TEST ENGINE ========== */
  scenarioEngine(){
    const R=this.R;
    // recession & industry-decline hits scale with the user's OWN industry + job security
    const recMult = svClamp(1 - (0.06 + R.ind.recession/100*0.18) * (1.2 - R.empS*0.5), 0.5, 1);
    const decMult = svClamp(1 - R.ind.recession/100*0.12 - R.ind.automation/100*0.05, 0.6, 1);
    const emShock = Math.max(2000, R.essential*1.5);
    const defs=[
      {id:"normal",   label:"Normal economy",        inc:1,        exp:1,    one:0},
      {id:"inflation",label:"High inflation (+8%)",   inc:1,        exp:1.08, one:0},
      {id:"rent",     label:"Rent / housing +15%",    inc:1,        exp:1,    addH:0.15},
      {id:"mortgage", label:"Interest rates +2%",     inc:1,        exp:1,    rate:0.02},
      {id:"jobloss",  label:"Job loss",               inc:0,        exp:1,    one:0},
      {id:"hours",    label:"Hours cut −30%",         inc:0.70,     exp:1,    one:0},
      {id:"recession",label:"Recession (your sector)",inc:recMult,  exp:1.03, one:0},
      {id:"emergency",label:"Emergency expense",      inc:1,        exp:1,    one:emShock},
      {id:"growth",   label:"Income growth +10%",     inc:1.10,     exp:1,    one:0},
      {id:"decline",  label:"Industry decline",       inc:decMult,  exp:1.01, one:0},
      {id:"storm",    label:"Perfect storm (combined)",inc:recMult*0.85, exp:1.04, rate:0.02, one:emShock},
    ];
    return defs.map(d=>{
      const inc=R.income*d.inc;
      let exp=R.essential*d.exp;
      if(d.addH) exp += R.housing*d.addH;
      if(d.rate) exp += R.debt*d.rate/12;
      const cf = inc-exp;                                   // monthly cash flow
      const one=d.one||0;
      const liquidAfter=Math.max(0,R.liquid-one);
      const extraDebt=Math.max(0,one-R.liquid);            // shortfall you'd have to borrow
      const survival = cf>=0 ? 999 : (Math.abs(cf)>0 ? liquidAfter/Math.abs(cf) : 999);
      // 12-mo net-worth swing: cash flow − one-off − a year's interest on anything borrowed
      const nwChange = cf*12 - one - extraDebt*R.dRate;
      const debtDanger = (cf<0 || extraDebt>0) && (R.debt>0 || extraDebt>0);
      // failure risk from runway (continuous across cf=0: cf>=0 ⇒ survival 999 ⇒ 0 base),
      // plus a smooth penalty for deficit depth and any forced borrowing
      let fail = survival>=12 ? 0 : (1 - survival/12)*100;
      if(cf<0) fail += Math.min(20, Math.abs(cf)/(inc||1)*40);
      if(extraDebt>0) fail += 20;
      fail = svClamp(fail,0,100);
      return {...d, inc:svRound(inc), exp:svRound(exp), cf:svRound(cf),
              survival:survival>=999?Infinity:+survival.toFixed(1),
              nwChange:svRound(nwChange), debtDanger, fail:svRound(fail)};
    });
  },

  /* ========== DECISION LIBRARY + MULTI-FACTOR SCORING ========== */
  decisionEngine(){
    const R=this.R;
    // contextual signals derived from the user's reality (0–1)
    const sig={
      lowRun:  svClamp(1-R.runway/3,0,1),
      needStab:R.pressure/100,
      highDTI: svClamp((R.dtiM-0.10)/0.30,0,1),
      highInt: R.dRate>=0.10?1:svClamp(R.dRate/0.10,0,1),
      hasSurp: R.surplus>0?1:0,
      surpStr: svClamp(R.savingsRate/0.2,0,1),
      housePain:svClamp((R.housingRatio-0.3)/0.3,0,1),
      young:   svClamp((48-R.age)/28,0,1),
      riskTol: R.riskTol,
      jobRisk: (R.ind.automation+R.ind.recession)/200,
      gate:    R.runway>=3 && R.surplus>0 && !(R.dRate>=0.08 && R.debt>0),
      debt:    R.debt>0?1:0,
    };
    const W_POS={wealth:.20, income:.16, stability:.16, skill:.10, downside:.12, flex:.10, confidence:.16};
    const score = (pos,pen)=>{
      const posScore = Object.keys(W_POS).reduce((a,k)=>a+svClamp(pos[k])*W_POS[k],0);
      const pens=[pen.risk,pen.stress,pen.debt,pen.time,pen.cashflow,pen.regret].map(x=>svClamp(x));
      const penScore = pens.reduce((a,b)=>a+b,0)/pens.length;
      return svRound(svClamp(posScore - penScore*0.45));
    };
    // each decision: scores 0–100, tuned by sig so output tracks the user's data
    const L=[

        pos:{wealth:30+30*sig.highInt,income:5,stability:40+30*sig.highDTI,skill:5,downside:45,flex:40,confidence:55},
        pen:{risk:25,stress:25,debt:15,time:35,cashflow:10,regret:25},

      {id:"transport", label:"Cut transport costs", icon:"roadmap", rev:"reversible",
        pos:{wealth:25,income:5,stability:35+20*sig.needStab,skill:5,downside:35,flex:60,confidence:70},

      {id:"sideincome", label:"Start a side income", icon:"flame", rev:"reversible",

      {id:"upskill", label:"Upgrade your skills", icon:"education", rev:"partial",

      {id:"delay", label:"Delay a major purchase", icon:"budget", rev:"reversible",

    return L.map(d=>{
      const s=score(d.pos,d.pen);
      const penAvg=([d.pen.risk,d.pen.stress,d.pen.debt,d.pen.time,d.pen.cashflow,d.pen.regret]
                    .reduce((a,b)=>a+svClamp(b),0)/6);
      // regret-minimisation read-out
      const worstLoss = d.id==="invest"||d.id==="buyproperty"||d.id==="changeind"||d.id==="study"
