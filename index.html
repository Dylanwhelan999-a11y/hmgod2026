};
Views.debt=function(id){
  const s=State.d.settings;
  const sim=Calc.simulateDebts(s.strategy,s.extraPayment);
  const simZero=Calc.simulateDebts(s.strategy,0);
  const alt=Calc.simulateDebts(s.strategy==='avalanche'?'snowball':'avalanche',s.extraPayment);
  const freeDate=monthsAhead(sim.months);
  const ordered=State.d.debts.filter(d=>d.balance>0).slice().sort((a,b)=>s.strategy==='snowball'?a.balance-b.balance:b.rate-a.rate);
  const ut=Calc.utilisation();
  return head(id,{title:'Debt Manager',sub:'Every liability, the smartest payoff order, and exactly when you&#39;ll be free — recalculated live as you adjust the plan.',
    actions:'<button class="btn primary" onclick="DebtView.add()">'+ic('plus')+'Add debt</button>'})+
  '<div class="grid g-kpi mb16">'+
    kpi('Total debt',money(Calc.debtTotal()),ordered.length+' active liabilities','color:var(--red)')+
    kpi('Debt-free date','<span style="font-size:22px">'+freeDate.toLocaleDateString('en-AU',{month:'short',year:'numeric'})+'</span>',sim.months+' months on the current plan')+
    kpi('Interest to pay',money(sim.interestPaid),(s.extraPayment>0?'saves '+money(simZero.interestPaid-sim.interestPaid)+' vs minimums':'on minimum payments'),'color:var(--amber)')+
    kpi('Card utilisation',Math.round(ut)+'%','healthy is under 30%','color:'+(ut>50?'var(--red)':ut>30?'var(--amber)':'var(--emerald)'))+
  '</div>'+
  '<div class="grid g-wide" style="align-items:start">'+
  '<div class="card"><div class="card-h"><h3>Payoff order</h3><span class="sub">'+(s.strategy==='avalanche'?'highest rate first':'smallest balance first')+'</span>'+
    '<div class="r"><div class="seg"><button class="'+(s.strategy==='avalanche'?'on':'')+'" onclick="DebtView.setStrategy(\'avalanche\')">Avalanche</button><button class="'+(s.strategy==='snowball'?'on':'')+'" onclick="DebtView.setStrategy(\'snowball\')">Snowball</button></div></div></div>'+
    '<div class="feed">'+ordered.map((d,i)=>{
      const paidMonth=sim.payoff[d.id];
      const pd=monthsAhead(paidMonth||sim.months);
      return '<div class="fi"><div class="fd" style="'+tintPair(i===0?'r':'n')+';font-weight:800;font-size:13px">'+(i+1)+'</div>'+
      '<div class="fb"><div class="ft"><b>'+esc(d.name)+'</b> <span class="badge n" style="margin-left:4px">'+esc(d.type)+'</span></div>'+
      '<div class="fm">'+pct(d.rate)+' p.a. · min '+money(d.min)+'/mo'+(d.limit?' · '+Math.round(d.balance/d.limit*100)+'% of limit':'')+' · gone by <b>'+pd.toLocaleDateString('en-AU',{month:'short',year:'numeric'})+'</b></div></div>'+
      '<div class="fv neg">'+money(d.balance)+'</div>'+
      '<button class="ibtn" onclick="DebtView.edit(\''+d.id+'\')" title="Edit" aria-label="Edit '+esc(d.name)+'">'+ic('edit')+'</button>'+
      '<button class="ibtn" onclick="DebtView.del(\''+d.id+'\')" title="Delete" aria-label="Delete '+esc(d.name)+'">'+ic('trash')+'</button></div>';
    }).join('')+'</div></div>'+
  '<div><div class="card"><div class="card-h"><h3>Extra payment power</h3></div>'+
    '<div class="field"><label>Extra per month — <b>'+money(s.extraPayment)+'</b></label><input type="range" class="inp" min="0" max="1500" step="25" value="'+s.extraPayment+'" oninput="DebtView.setExtra(this.value)"></div>'+
    '<div class="dl"><span class="k">Debt-free</span><span class="v">'+sim.months+' months</span></div>'+
    '<div class="dl"><span class="k">vs minimums only</span><span class="v muted">'+simZero.months+' months</span></div>'+
    '<div class="dl"><span class="k">Interest saved</span><span class="v pos">'+money(simZero.interestPaid-sim.interestPaid)+'</span></div>'+
    '<div class="tiny muted mt12">'+(s.strategy==='avalanche'?'Avalanche':'Snowball')+' vs '+(s.strategy==='avalanche'?'snowball':'avalanche')+' with the same extra: <b>'+alt.months+' months / '+money(alt.interestPaid)+' interest</b>. '+(sim.interestPaid<=alt.interestPaid?'Your current strategy is the cheaper one.':'Switching would save '+money(sim.interestPaid-alt.interestPaid)+'.')+'</div></div>'+
  '<div class="card mt16"><div class="card-h"><h3>Balance projection</h3></div>'+Chart.line(sim.timeline.filter((_,i)=>i%Math.max(1,Math.floor(sim.timeline.length/24))===0),{color:'#B3271E',h:120})+'<div class="tiny muted mt8">Total debt from today to $0 in '+sim.months+' months.</div></div></div></div>';
};

Views.investments=function(id){
  const v=Calc.portfolioValue(),c=Calc.portfolioCost();
  const gain=v-c;
  const byType={};State.d.holdings.forEach(h=>{byType[h.type]=(byType[h.type]||0)+h.units*h.price});
  const types=Object.entries(byType).sort((a,b)=>b[1]-a[1]);
  const superBal=State.d.accounts.filter(a=>a.type==='super').reduce((s,a)=>s+a.balance,0);
  return head(id,{title:'Investments',sub:'Holdings, allocation and unrealised performance. Update prices whenever you like — everything recalculates instantly.',
    actions:'<button class="btn primary" onclick="InvView.add()">'+ic('plus')+'Add holding</button>'})+
  '<div class="grid g-kpi mb16">'+
    kpi('Portfolio value',money(v),State.d.holdings.length+' holdings')+
    kpi('Unrealised gain',(gain>=0?'+':'')+money(gain),pct(c?gain/c*100:0)+' on '+money(c)+' invested','color:'+(gain>=0?'var(--emerald)':'var(--red)'))+
    kpi('Superannuation',money(superBal),'long-term retirement asset')+
    kpi('Asset classes',types.length,'diversification counts toward health')+
  '</div>'+
  '<div class="grid g-side" style="align-items:start">'+
  '<div><div class="t-wrap"><table class="tbl"><thead><tr><th>Holding</th><th class="num">Units</th><th class="num">Price</th><th class="num">Value</th><th class="num">Gain</th><th></th></tr></thead><tbody>'+
    State.d.holdings.map(h=>{
      const val=h.units*h.price,g=(h.price-h.cost)*h.units;
      return '<tr><td data-l="Holding"><span class="t-main">'+esc(h.symbol)+'</span><div class="t-sub">'+esc(h.name)+' · '+esc(h.type)+'</div></td>'+
      '<td data-l="Units" class="num">'+h.units+'</td><td data-l="Price" class="num">'+money2(h.price)+'</td>'+
      '<td data-l="Value" class="num">'+money(val)+'</td>'+
      '<td data-l="Gain" class="num"><span class="'+(g>=0?'pos':'neg')+'">'+(g>=0?'+':'')+money(g)+'</span></td>'+
      '<td data-l="Actions" class="num" style="white-space:nowrap"><button class="ibtn" onclick="InvView.edit(\''+h.id+'\')" title="Edit" aria-label="Edit holding">'+ic('edit')+'</button><button class="ibtn" onclick="InvView.del(\''+h.id+'\')" title="Delete" aria-label="Delete holding">'+ic('trash')+'</button></td></tr>';
    }).join('')+'</tbody></table></div></div>'+
  '<div><div class="card"><div class="card-h"><h3>Allocation</h3></div><div style="display:flex;justify-content:center">'+
    Chart.donut(types.map((t,i)=>({label:t[0],value:t[1],color:PALETTE[i%PALETTE.length]})),150)+'</div>'+
    types.map((t,i)=>'<div class="dl"><span class="k" style="display:inline-flex;align-items:center;gap:7px"><span style="width:10px;height:10px;border-radius:3px;background:'+PALETTE[i%PALETTE.length]+'"></span>'+esc(t[0])+'</span><span class="v">'+money(t[1])+' · '+Math.round(t[1]/Math.max(1,v)*100)+'%</span></div>').join('')+'</div>'+
  '<div class="card mt16"><div class="card-h"><h3>Coach note</h3><span class="badge b dot">AI</span></div><div class="muted" style="font-size:12.5px;line-height:1.6">'+
    (Calc.debtTotal()>0&&State.d.debts.some(d=>d.rate>10)?'You hold debt charging more than 10% — paying that down is a guaranteed return no portfolio can promise. Keep investing small and automatic while the expensive debt shrinks.':'With no expensive debt, regular automatic investing into diversified ETFs is the simplest wealth engine. Time in the market beats timing the market.')+'</div></div></div></div>';
};

  const snaps=State.d.snapshots.slice(-14);
  const parts=[['Cash & savings',cash,'#2CD5C4'],['Investments',inv,'#0A7A43'],['Superannuation',sup,'#2f6fed'],['Physical assets',phys,'#B87503']];

    actions:'<button class="btn teal" onclick="NwView.snapshot()">'+ic('plus')+'Record snapshot</button><button class="btn" onclick="NwView.addAsset()">'+ic('plus')+'Add asset</button>'})+
  '<div class="grid g3 mb16">'+
    kpi('Net worth',money(nw),'assets minus liabilities, right now',nw>=0?'':'color:var(--red)')+
    kpi('Total assets',money(Calc.assetsTotal()),'cash, investments, super, property','color:var(--emerald)')+
    kpi('Total liabilities',money(Calc.debtTotal()),'every debt counted','color:var(--red)')+
  '</div>'+
  '<div class="grid g2 mb16" style="align-items:start">'+
  '<div class="card"><div class="card-h"><h3>Asset mix</h3></div>'+
    Chart.hbars(parts.map(p=>({label:p[0],value:p[1],color:p[2]})))+

const CoachView={
  ask(q){
    const box=$('#coachChat');if(!box)return;
    const inp=$('#coachInput');
    const question=q||(inp?inp.value.trim():'');
    if(!question)return;
    if(inp)inp.value='';
    box.innerHTML+='<div style="text-align:right;margin-top:12px"><span style="display:inline-block;background:var(--sky-soft);color:var(--navy);font-size:13px;font-weight:600;padding:9px 14px;border-radius:14px 14px 4px 14px;max-width:85%;text-align:left">'+esc(question)+'</span></div>';
    const a=this.answer(question.toLowerCase());
    box.innerHTML+='<div style="display:flex;gap:9px;margin-top:12px"><div style="width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;'+tintPair('t')+'">'+ic('coach')+'</div><div style="background:var(--surface2);border:1px solid var(--line);border-radius:4px 14px 14px 14px;padding:10px 14px;max-width:85%;font-size:13px;line-height:1.55">'+a+'</div></div>';
    box.scrollTop=box.scrollHeight;
  },
  answer(q){
    const s=State.d.settings;
    if(q.includes('debt')||q.includes('pay off')||q.includes('loan')||q.includes('card')){
      const sim=Calc.simulateDebts(s.strategy,s.extraPayment);
      const top=State.d.debts.filter(d=>d.balance>0).sort((a,b)=>b.rate-a.rate)[0];
      return 'You owe <b>'+money(Calc.debtTotal())+'</b>. On the current plan ('+s.strategy+', '+money(s.extraPayment)+' extra/month) you are debt-free in <b>'+sim.months+' months</b>, paying '+money(sim.interestPaid)+' interest. Priority target: <b>'+esc(top.name)+'</b> at '+pct(top.rate)+'. Nudge the extra-payment slider in the Debt Manager to see how much faster you could be.';
    }
    if(q.includes('safe')||q.includes('spend')||q.includes('afford')){
      return 'Your safe-to-spend figure is <b>'+money(Calc.safeToSpend())+'</b> for the rest of this month. That already protects rent, bills, minimum repayments, the '+money(s.extraPayment)+' extra debt payment and your planned savings transfers.';
    }
    if(q.includes('save')||q.includes('emergency')||q.includes('goal')){
      return 'You hold <b>'+money(Calc.savingsTotal())+'</b> in savings ('+Calc.runwayMonths().toFixed(1)+' months of runway). Savings rate this month is '+pct(Calc.savingsRate())+'. The Emergency Fund target of '+money(Calc.essentialMonthly()*s.emergencyMonths)+' equals '+s.emergencyMonths+' months of essentials — automatic transfers are the only strategy that reliably works.';
    }
    if(q.includes('invest')||q.includes('share')||q.includes('etf')||q.includes('super')){
      const g=Calc.portfolioValue()-Calc.portfolioCost();
      return 'Portfolio is worth <b>'+money(Calc.portfolioValue())+'</b> ('+(g>=0?'+':'')+money(g)+' unrealised). '+(State.d.debts.some(d=>d.rate>10)?'But you still carry debt above 10% — paying that down is a guaranteed return, so keep investing minimal until the expensive debt is gone.':'With no expensive debt, steady automatic ETF investing is your simplest wealth engine.');
    }
    if(q.includes('health')||q.includes('score')){
      const hs=Calc.healthScore();
      return 'Your health score is <b>'+hs.total+'/100 ('+hs.band+')</b>. Weakest pillar: '+esc(hs.pillars.slice().sort((a,b)=>a.score-b.score)[0].key)+'. Open the Financial Health module for the ranked fix list.';
    }
    if(q.includes('budget')){
      const over=State.d.budgets.filter(b=>b.group!=='savings'&&(Calc.spendByCat(0)[b.category]||0)>b.limit);
      return over.length?'You are over budget in <b>'+over.map(b=>b.category).join(', ')+'</b> this month. The Budgets module shows exactly by how much.':'All budget categories are inside their limits this month — '+Math.round(Calc.budgetAdherence())+'% adherence. Nice discipline.';
    }
    if(q.includes('net worth')||q.includes('worth')){
      return 'Net worth is <b>'+money(Calc.netWorth())+'</b> — '+money(Calc.assetsTotal())+' of assets against '+money(Calc.debtTotal())+' of debt. Record a snapshot each payday in the Net Worth module and the trend chart builds itself.';
    }
    return 'I work from your live data. Try asking about: <b>debt</b>, <b>safe to spend</b>, <b>savings</b>, <b>investing</b>, <b>budget</b>, <b>net worth</b> or your <b>health score</b> — or tap a suggestion below.';
  }
};

  if(!fbUser){
    if(Session.user&&String(Session.user.uid).indexOf('demo:')===0) return; /* keep demo session */
    Session.user=null; try{renderChrome()}catch(e){}
    if(!OPEN_VIEWS.includes(current)) go('signin');
    return;
  }
  if(!fbUser.emailVerified){ Session.pending={email:fbUser.email}; if(current!=='verify') go('verify'); return; }
  const name=fbUser.displayName||(fbUser.email?fbUser.email.split('@')[0]:'Member');
  Session.user={uid:fbUser.uid,name,email:fbUser.email||'',initials:initialsFrom(name),provider:(fbUser.providerData[0]&&fbUser.providerData[0].providerId)||'password'};
  /* only adopt the auth display name when no local name exists — an
     established profile name must never be clobbered by sign-in */
  if(!State.d.profile.name){State.d.profile.name=name.split(' ')[0];State.d.profile.initial=(name[0]||'U').toUpperCase();State.save();}
  if(OPEN_VIEWS.includes(current)) go('home'); else renderRoute();
};

function fbErr(e){
  const m=String((e&&e.message)||e||'').toLowerCase();
  if(m.includes('already registered')||m.includes('already been registered')||m.includes('already exists')) return 'That email already has an account — try signing in instead.';
  if(m.includes('invalid login')||m.includes('invalid credentials')) return 'Email or password is incorrect.';
  if(m.includes('email not confirmed')) return 'Please confirm your email first — check your inbox (and spam) for the link.';
  if(m.includes('password')&&(m.includes('at least')||m.includes('should be')||m.includes('weak'))) return 'Password is too weak — use at least 8 characters.';
  if(m.includes('valid email')||m.includes('invalid email')) return 'That doesn&#39;t look like a valid email address.';
  if(m.includes('rate limit')||m.includes('too many')||m.includes('over_email')) return 'Too many attempts — please wait a moment and try again.';
  if(m.includes('popup')||m.includes('cancel')) return 'Sign-in was cancelled.';
  if(m.includes('provider is not enabled')||m.includes('not enabled')) return 'That sign-in method isn&#39;t switched on yet (Supabase → Authentication → Providers).';
  if(m.includes('redirect')||m.includes('not allowed')||m.includes('requested path')) return 'This web address isn&#39;t allowed yet (Supabase → Authentication → URL Configuration).';
  return (e&&e.message)?e.message:'Something went wrong. Please try again.';
}
function showAuthErr(id,msg){const e=$('#'+id);if(e){e.style.display='block';e.style.background='var(--red-soft)';e.style.color='var(--red)';e.textContent=msg}}

async function signUpEmail(){
  const name=($('#suName')?$('#suName').value:'').trim();
  const email=($('#suEmail')?$('#suEmail').value:'').trim();
  const pass=($('#suPass')?$('#suPass').value:''),pass2=($('#suPass2')?$('#suPass2').value:'');
  const err=$('#suErr');if(err)err.style.display='none';
  if(!firebaseReady())return showAuthErr('suErr','Add your Supabase keys (script at the foot of this file) to create real accounts.');
  if(!name)return showAuthErr('suErr','Please enter your name.');
  if(!email)return showAuthErr('suErr','Please enter your email.');
  if(pass.length<8)return showAuthErr('suErr','Use a password of at least 8 characters.');
  if(pass!==pass2)return showAuthErr('suErr','Those passwords don&#39;t match.');
  const btn=$('#suBtn');if(btn){btn.disabled=true;btn.textContent='Creating account…';}
  try{const u=await window.authEmailSignUp(name,email,pass);
    if(u&&u.emailVerified){/* confirmation off — onAuthStateChange routes in */}
    else{Session.pending={email};go('verify');}}
  catch(e){showAuthErr('suErr',fbErr(e));if(btn){btn.disabled=false;btn.textContent='Create account & verify email';}}
}
async function signInEmail(){
  const email=($('#siEmail')?$('#siEmail').value:'').trim(),pass=($('#siPass')?$('#siPass').value:'');
  if($('#siErr'))$('#siErr').style.display='none';
  if(!firebaseReady())return showAuthErr('siErr','Add your Supabase keys (script at the foot of this file) to sign in.');
  if(!email||!pass)return showAuthErr('siErr','Enter your email and password.');
  const btn=$('#siBtn');if(btn){btn.disabled=true;btn.textContent='Signing in…';}
  try{const cred=await window.authEmailSignIn(email,pass);
    if(cred.user&&!cred.user.emailVerified){Session.pending={email};go('verify');return;}}
  catch(e){showAuthErr('siErr',fbErr(e));if(btn){btn.disabled=false;btn.textContent='Sign in';}}
}
async function signInProvider(provider){
  const errId=(current==='signup')?'suErr':'siErr';if($('#'+errId))$('#'+errId).style.display='none';
  if(!firebaseReady())return showAuthErr(errId,'Add your Supabase keys (script at the foot of this file) to use Google / Apple sign-in.');
  try{if(provider==='google')await window.authGoogle();else await window.authApple();}
  catch(e){showAuthErr(errId,fbErr(e));}
}
async function forgotPassword(){
  const email=($('#siEmail')?$('#siEmail').value:'').trim();
  if(!firebaseReady())return showAuthErr('siErr','Add your Supabase keys to reset passwords.');
  if(!email)return showAuthErr('siErr','Enter your email above first, then tap reset.');
  try{await window.authReset(email);const e=$('#siErr');if(e){e.style.display='block';e.style.background='var(--emerald-soft)';e.style.color='var(--emerald)';e.textContent='Password reset email sent to '+email+'.';}}
  catch(e){showAuthErr('siErr',fbErr(e));}
}
async function resendVerification(){
  const n=$('#vMsg');
  try{await window.authResendVerification();if(n){n.style.display='block';n.style.background='var(--emerald-soft)';n.style.color='var(--emerald)';n.textContent='Verification email re-sent — check your inbox and spam.';}}
  catch(e){if(n){n.style.display='block';n.style.background='var(--red-soft)';n.style.color='var(--red)';n.textContent=fbErr(e);}}
}
async function checkVerified(){
  const n=$('#vMsg');
  try{const u=await window.authReload();
    if(u&&u.emailVerified){window.onFirebaseUser(u);}
    else if(n){n.style.display='block';n.style.background='var(--amber-soft)';n.style.color='var(--amber)';n.textContent='Not verified yet — click the link in your email, then try again.';}}
  catch(e){if(n){n.style.display='block';n.textContent=fbErr(e);}}
}

/* ============================================================
   COMMAND PALETTE (Ctrl K)
   ============================================================ */
const Cmd={
  sel:0,list:[],
  items(){
    const out=[];
    NAV.forEach(g=>g.items.forEach(m=>out.push({k:m.label,g:g.grp+' · module',icon:m.icon,go:()=>go(m.id)})));
    out.push({k:'Start screen',g:'module',icon:'home',go:()=>go('home')});
    out.push({k:'Front page',g:'module',icon:'home',go:()=>go('welcome')});
    out.push({k:'Sign out',g:'account',icon:'x',go:()=>signOut()});
    State.d.accounts.forEach(a=>out.push({k:a.name,g:'Account · '+money(a.balance),icon:'bank',go:()=>go('accounts')}));
    State.d.goals.forEach(gl=>out.push({k:gl.name,g:'Goal · '+money(gl.saved)+' of '+money(gl.target),icon:'goal',go:()=>go('savings')}));
    State.d.debts.forEach(d=>out.push({k:d.name,g:'Debt · '+money(d.balance),icon:'debt',go:()=>go('debt')}));
    State.d.documents.forEach(d=>out.push({k:d.name,g:'Document · '+d.type,icon:'doc',go:()=>go('documents')}));
    State.d.transactions.slice(0,150).forEach(t=>out.push({k:t.desc,g:fmtDate(t.date)+' · '+money2(t.amount),icon:'list',go:()=>go('transactions')}));
    return out;
  },
  open(){const c=$('#cmdk');clearTimeout(this._clr);c.classList.add('on');c.setAttribute('aria-hidden','false');const inp=$('#cmdInput');inp.value='';this.render('');inp.focus()},
  close(){
    const c=$('#cmdk');
    try{if(c.contains(document.activeElement))document.activeElement.blur()}catch(e){}
    c.classList.remove('on');c.setAttribute('aria-hidden','true');
    clearTimeout(this._clr);
    this._clr=setTimeout(()=>{if(!c.classList.contains('on'))$('#cmdList').innerHTML=''},180);
  },
  render(q){
    q=(q||'').toLowerCase();this.sel=0;
    this.list=this.items().filter(i=>!q||(i.k+' '+i.g).toLowerCase().includes(q)).slice(0,12);
    $('#cmdList').innerHTML=this.list.length?this.list.map((i,n)=>'<div class="ci'+(n===this.sel?' on':'')+'" data-n="'+n+'"><span class="cic">'+ic(i.icon)+'</span><span style="font-weight:700">'+esc(i.k)+'</span><span class="cg">'+esc(i.g)+'</span></div>').join(''):'<div class="empty" style="padding:24px"><p style="margin:0">No matches</p></div>';
    [...$('#cmdList').querySelectorAll('.ci')].forEach((el,n)=>{el.onclick=()=>{this.list[n].go();this.close()}});
  },
  move(d){
    if(!this.list.length)return;
    this.sel=(this.sel+d+this.list.length)%this.list.length;
    [...$('#cmdList').querySelectorAll('.ci')].forEach((el,n)=>el.classList.toggle('on',n===this.sel));
  }
};

document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();Cmd.open()}
  if(e.key==='Escape'){Cmd.close();Modal.close()}
  if($('#cmdk').classList.contains('on')){
    if(e.key==='ArrowDown'){e.preventDefault();Cmd.move(1)}
    if(e.key==='ArrowUp'){e.preventDefault();Cmd.move(-1)}
    if(e.key==='Enter'){const s=Cmd.list[Cmd.sel];if(s){s.go();Cmd.close()}}
  }
});
$('#cmdInput').addEventListener('input',e=>Cmd.render(e.target.value));
$('#cmdk').addEventListener('click',e=>{if(e.target.id==='cmdk')Cmd.close()});
$('#scrim').addEventListener('click',e=>{if(e.target.id==='scrim')Modal.close()});
window.addEventListener('hashchange',renderRoute);

State.load();
Recur.runAndNotify(); /* Phase 2: post due recurring items before first paint — visible via toast + Alerts */
restoreSession();
if(!location.hash)location.hash='welcome';
renderRoute();
mountCookieBar();

  if (configured) {
   try {
    const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm");
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });
    window.sb = sb;

    window.authEmailSignUp = async (name, email, password) => {
      const { data, error } = await sb.auth.signUp({
        email, password,
        options: { data: { full_name: name }, emailRedirectTo: window.location.origin }
      });
      if (error) throw error;
      return adaptUser(data.user);
    };
    window.authEmailSignIn = async (email, password) => {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      return { user: adaptUser(data.user) };
    };
    window.authGoogle = async () => {
      const { error } = await sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo: window.location.origin } });
      if (error) throw error;
    };
    window.authApple = async () => {
      const { error } = await sb.auth.signInWithOAuth({ provider: "apple", options: { redirectTo: window.location.origin } });
      if (error) throw error;
    };
    window.authResendVerification = async () => {
      const email = (window.Session && Session.pending && Session.pending.email) || "";
      if (!email) throw new Error("Not signed in");
      const { error } = await sb.auth.resend({ type: "signup", email });
      if (error) throw error;
    };
    window.authReload = async () => {
      const { data } = await sb.auth.getUser();
      return adaptUser(data && data.user);
    };
    window.authReset = async (email) => {
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin });
      if (error) throw error;
    };
    window.authSignOut = () => sb.auth.signOut();

    window.SUPABASE_READY = true;
    sb.auth.onAuthStateChange((_event, session) => {
      if (window.onFirebaseUser) window.onFirebaseUser(adaptUser(session && session.user));
    });
    try { const { data } = await sb.auth.getSession(); if (data && data.session && window.onFirebaseUser) window.onFirebaseUser(adaptUser(data.session.user)); } catch (e) {}
   } catch (e) { window.SUPABASE_READY = false; console.warn("Supabase unavailable — using local/demo mode.", e); }
  }
  if (window.onFirebaseInit) window.onFirebaseInit(window.SUPABASE_READY);
</script>
</body>
</html>
