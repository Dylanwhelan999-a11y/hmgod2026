  /* ========== CAREER PATH ENGINE ========== */
  careerEngine(){
    const R=this.R; const ann=R.income*12;
    const gr = 0.01 + (R.ind.wageGrowth/100)*0.04;                  // 1%–5% annual growth proxy
    const paths=[
      {id:"current",  label:"Stay in current role",   bump:0.00, cost:0,     dur:0,  lost:0,   gmul:1.0, emp:0.95, transfer:60, burnout:35, ceil:R.ind.wageGrowth},
      {id:"promotion",label:"Promotion (same employer)",bump:0.12,cost:0,     dur:6,  lost:0,   gmul:1.1, emp:0.55, transfer:65, burnout:50, ceil:R.ind.wageGrowth+10},
      {id:"switch",   label:"Switch employer",         bump:0.10, cost:0,     dur:2,  lost:0.5, gmul:1.05,emp:0.65, transfer:70, burnout:45, ceil:R.ind.wageGrowth+8},
      {id:"cert",     label:"Certificate",             bump:0.10, cost:3000,  dur:6,  lost:0.1, gmul:1.1, emp:0.70, transfer:75, burnout:30, ceil:R.ind.wageGrowth+12},
      {id:"diploma",  label:"Diploma",                 bump:0.18, cost:9000,  dur:18, lost:0.2, gmul:1.15,emp:0.72, transfer:75, burnout:40, ceil:R.ind.wageGrowth+18},
      {id:"appr",     label:"Apprenticeship / trade",  bump:0.22, cost:2000,  dur:36, lost:0.35,gmul:1.2, emp:0.85, transfer:80, burnout:35, ceil:R.ind.wageGrowth+20},
      {id:"degree",   label:"University degree",        bump:0.35, cost:35000, dur:48, lost:0.6, gmul:1.25,emp:0.74, transfer:70, burnout:55, ceil:R.ind.wageGrowth+30},
      {id:"online",   label:"Online course",           bump:0.07, cost:600,   dur:3,  lost:0.05,gmul:1.05,emp:0.55, transfer:65, burnout:25, ceil:R.ind.wageGrowth+6},
      {id:"side",     label:"Side business",           bump:0.15, cost:1500,  dur:12, lost:0,   gmul:1.3, emp:0.50, transfer:60, burnout:60, ceil:R.ind.wageGrowth+25},
    ];
    return paths.map(p=>{
      const after = ann*(1+p.bump);
      const lostIncome = svRound(ann*(p.dur/12)*p.lost);
      // year 1: months still training earn (1-lost) of current; the rest earn the new (post-bump) rate
      const studyFrac = Math.min(1, p.dur/12);
      const y1 = svRound( ann*studyFrac*(1-p.lost) + ann*(1-studyFrac)*(1+p.bump) );
      const y5 = svRound(after*Math.pow(1+gr*p.gmul,5));
      const y10= svRound(after*Math.pow(1+gr*p.gmul,10));
      const upliftM = (after-ann)/12;
      const payback = (p.cost+lostIncome)>0 && upliftM>0 ? Math.ceil((p.cost+lostIncome)/upliftM) : (p.cost+lostIncome>0?999:0);
      return {...p, after:svRound(after), y1, y5, y10, lostIncome, payback};
    }).sort((a,b)=>b.y10-a.y10);
  },

  /* ========== EDUCATION QUALITY ENGINE ========== */
  educationEngine(){
    const R=this.R; const ann=R.income*12;
    const yearsLeft=Math.max(0, 65-R.age);                          // 0 at/after retirement age
    const eduRank=({"High school":0,"Certificate":1,"Diploma":2,"Bachelor":3,"Postgraduate":4})[this.profile.education] ?? 0;
    const courses=[
      {name:"Short online course", lvl:0, cost:600,  dur:3,  completion:0.85, emp:0.55, uplift:0.06, commute:0,    online:true,  accredit:55, practical:60},
      {name:"Industry certificate",lvl:1, cost:3000, dur:6,  completion:0.80, emp:0.72, uplift:0.10, commute:600,  online:true,  accredit:75, practical:78},
      {name:"Diploma (TAFE/college)",lvl:2,cost:9000,dur:18, completion:0.70, emp:0.74, uplift:0.18, commute:1800, online:false, accredit:82, practical:80},
      {name:"Apprenticeship",      lvl:1, cost:2000, dur:36, completion:0.78, emp:0.85, uplift:0.22, commute:1500, online:false, accredit:88, practical:92},
      {name:"University degree",   lvl:3, cost:35000,dur:48, completion:0.68, emp:0.76, uplift:0.35, commute:3600, online:false, accredit:90, practical:55},
    ];
    const scored = courses.map(c=>{
      const demand = R.ind.demand;
      const attained = c.lvl>0 && c.lvl<=eduRank;                   // you already hold this level — diminished value
      const lostIncome = ann*(c.dur/12)*0.25;                       // assume 25% income forgone while studying
      const annualUplift = ann*c.uplift*(attained?0.3:1);
      const ltv = svRound(annualUplift*yearsLeft*c.completion*c.emp - c.cost - lostIncome - c.commute);
      const payback = annualUplift*c.completion>0 ? +(((c.cost+lostIncome)/(annualUplift*c.completion))).toFixed(1) : 99;
      const quality = svRound(svClamp(c.completion*30 + c.emp*30 + (demand/100)*15 + (c.practical/100)*15 + (c.accredit/100)*10));
      return {...c, attained, ltv, payback, quality, lostIncome:svRound(lostIncome)};
    }).sort((a,b)=>b.ltv-a.ltv);
    const fresh=scored.filter(c=>!c.attained);
    return {courses:scored, best:(fresh[0]||scored[0]), worst:scored[scored.length-1], yearsLeft, eduRank};
  },

  /* ========== HOME / HOUSING OPTIMISATION ========== */
  housingEngine(){
    const R=this.R;
    const opt=(label,save,effort,speed,conf,note)=>{
      const m=svRound(R.housing*save);
      return {label, monthly:m, annual:m*12, tenYr:svRound(this.fv(m,R.expReturn,10)), effort, speed, conf, note};
    };
    if(R.housing<=0) return [];
    return [
      opt("Negotiate rent / refinance mortgage",0.08,"Low","Medium",70,"One conversation or rate review can lock in ongoing savings."),
      opt("Take in a flatmate / use a room",0.25,"Medium","Fast",60,"Largest single lever if your situation allows it."),
      opt("Move to a cheaper place",0.20,"High","Slow",55,"Big, durable saving — but moving has real cost & disruption."),
      opt("Refinance to a lower rate",0.06,"Low","Medium",75,"Especially worthwhile while your housing ratio is high."),
    ];
  },

  /* ========== HOME SAVINGS ENGINE (per category) ========== */
  homeSavingsEngine(){
    const R=this.R;
    const rows=[
      {label:"Groceries",        amt:R.food,  save:0.12, effort:"Medium", diff:"Medium", speed:"Fast",   conf:75},
      {label:"Utilities / power", amt:R.other*0.5, save:0.10, effort:"Low", diff:"Easy", speed:"Medium", conf:70},
      {label:"Phone & internet", amt:R.other*0.2, save:0.18, effort:"Low", diff:"Easy",  speed:"Fast",   conf:80},
      {label:"Insurance",        amt:R.ins,   save:0.18, effort:"Low",    diff:"Easy",   speed:"Medium", conf:78},
      {label:"Subscriptions",    amt:R.subs,  save:0.40, effort:"Low",    diff:"Easy",   speed:"Fast",   conf:88},
      {label:"Fuel / transport", amt:R.trans, save:0.12, effort:"Medium", diff:"Medium", speed:"Medium", conf:68},
      {label:"Housing",          amt:R.housing,save:0.08, effort:"High",  diff:"Hard",   speed:"Slow",   conf:60},
    ];
    return rows.filter(r=>r.amt>0).map(r=>{
      const m=svRound(r.amt*r.save);
      return {...r, monthly:m, annual:m*12, tenYr:svRound(this.fv(m,R.expReturn,10))};
    }).sort((a,b)=>b.tenYr-a.tenYr);
  },

  /* ========== INVESTING GATEKEEPER ========== */
  investingGatekeeper(){
    const R=this.R; const blockers=[];
    if(R.runway<3) blockers.push(`Emergency runway is only ${R.runway.toFixed(1)} months (need 3+).`);
    if(R.debt>0 && R.dRate>=0.08) blockers.push(`High-interest debt at ${svRound(R.dRate*100)}% — clear it for a guaranteed return first.`);
    if(R.surplus<0) blockers.push(`You're spending $${Math.abs(svRound(R.surplus))}/mo more than you earn.`);
    if(R.housingRatio>0.40) blockers.push(`Housing is ${svRound(R.housingRatio*100)}% of income (over 40% is fragile).`);
    if(R.empS<0.5) blockers.push(`Income is unstable (${this.profile.employment.toLowerCase()}) — keep more in cash.`);
    const safe = blockers.length===0;
    const options = [
      {name:"High-interest savings", ret:"~4–5%", risk:"None",   note:"Where your emergency fund belongs.", ok:true},
      {name:"Extra debt repayment",  ret:`~${svRound(R.dRate*100)||0}%`, risk:"None", note:"Guaranteed return = your interest rate.", ok:R.debt>0},
      {name:"Superannuation",        ret:"~6–8%", risk:"Low–Med",note:"Tax-advantaged, locked till retirement.", ok:safe},
      {name:"ETFs (index funds)",    ret:"~7%",   risk:"Medium", note:"Diversified long-term growth.", ok:safe},
      {name:"Property",              ret:"~5–7%", risk:"Med–High",note:"Large, illiquid — only with a strong base.", ok:safe&&R.surplus>500},
      {name:"Business / education",  ret:"Variable",risk:"High", note:"Highest potential, highest variance.", ok:safe},
    ].filter(o=>o.ok);
    return {safe, blockers, options};
  },

  /* ========== RECOMMENDATION ENGINE ========== */
  recommendationEngine(){
    const R=this.R; const D=R.decisions;
    const safeOnly = D.filter(d=>d.riskPenalty<45);
    const best = (safeOnly[0]||D[0]);
    const second = (safeOnly.find(d=>d.id!==best.id)||D[1]);
    // headline "do this" slots must never promote an action the gatekeeper is blocking
    const blockedIds = R.investGate.safe ? [] : ["invest","buyproperty"];
    const pool = D.filter(d=>!blockedIds.includes(d.id));
    // fastest win should add value, not just echo the best move
    const fastestStability = ([...pool].sort((a,b)=>b.stability-a.stability).find(d=>d.id!==best.id)) || best;
    const strongestWealth   = [...pool].sort((a,b)=>b.wealth-a.wealth)[0];
    const biggestRisk       = [...D].sort((a,b)=>b.riskPenalty-a.riskPenalty)[0];
    const doNotYet = !R.investGate.safe
        ? {label:"Investing in markets / buying property", why:"Your base isn't secure yet — stabilise first."}
        : {label:biggestRisk.label, why:"Highest risk-to-reward for your situation right now."};
    // staged plans, generated from the user's reality
    const p30=[], p90=[], p365=[];
    if(R.surplus<0){ p30.push("Find $"+Math.abs(svRound(R.surplus))+"/mo of cuts to stop the monthly shortfall."); }
    else { p30.push("Automate $"+svRound(Math.max(50,R.surplus*0.5))+"/mo into your top priority below."); }
    p30.push("Cancel or downgrade subscriptions (review every recurring charge).");
    if(R.runway<3) p30.push("Open a separate high-interest account for your emergency buffer.");
    if(R.dRate>=0.10 && R.debt>0) p30.push("List debts by interest rate and target the highest first.");
    if(R.runway<3) p90.push("Reach 1 month of expenses in cash ($"+svRound(R.essential)+").");
    else p90.push("Top emergency fund up toward 3 months ($"+svRound(R.essential*3)+").");
    if(R.debt>0) p90.push("Knock the highest-rate debt balance down with every spare dollar.");
    p90.push("Negotiate one big bill (insurance, energy or rent).");
    const incomeMove = D.find(d=>["sideincome","upskill","promotion"].includes(d.id));
    if(R.income>0 && incomeMove) p90.push("Start the strongest income move: "+incomeMove.label+".");
    p365.push(R.investGate.safe ? "Begin investing your surplus into low-cost ETFs / super." : "Reach a 3-month emergency fund and clear high-interest debt.");
    p365.push("Lift your income ceiling: "+(R.career[0]?R.career[0].label:"upgrade skills")+".");
    p365.push("Re-run this solver each quarter and rebalance toward the highest-scoring move.");
    return {best, second, fastestStability, strongestWealth, biggestRisk, doNotYet, p30, p90, p365};
  },

  /* ========== DATA VALIDATION / WARNINGS ========== */
  warnings(){
    const R=this.R; const w=[];
    if(R.income<=0) w.push({t:"No income entered",d:"Most results need a monthly income to be meaningful."});
    if(R.surplus<0) w.push({t:"You're cash-flow negative",d:"Spending exceeds income by $"+Math.abs(svRound(R.surplus))+"/mo — fixing this is priority #1."});
    if(R.runway<1)  w.push({t:"Almost no safety net",d:"Less than one month of expenses in cash. One surprise could mean new debt."});
    if(R.housingRatio>0.45) w.push({t:"Housing stress",d:"Housing is "+svRound(R.housingRatio*100)+"% of income — well above the 30% comfort zone."});
    if(R.dtiM>0.4)  w.push({t:"Heavy debt load",d:"Debt repayments are a large share of income, squeezing every other goal."});
    return w;
  },

  /* small helpers */
  fv(monthly,rate,years){ const r=rate/12,n=years*12; return r>0 ? monthly*((Math.pow(1+r,n)-1)/r) : monthly*n; },

  /* =========================================================
     RENDER  —  rebuilt from Solver.R on every change
     ========================================================= */
  /* STEP-BY-STEP PROFILE WIZARD — the questions, paged, editable any time */
  STEPS:[
    {title:"About you", note:"The basics we’ll use to tailor everything to you.",
     fields:[["name","Name","text"],["age","Age","num"],["occupation","Occupation","text"],["industry","Industry","sel:industry"],["location","Location","text"]]},
    {title:"Work & goals", note:"Where you are now, and where you’re heading.",
     fields:[["employment","Employment type","sel:emp"],["deps","Dependants","num"],["education","Education level","sel:edu"],["skills","Key skills","text"],["goal","Career goal","text"],["risk","Risk tolerance","sel:risk"]]},
    {title:"Income & housing", note:"Your monthly take-home pay and what your home costs.",
     fields:[["income","Monthly income (take-home $)","num"],["housing","Rent / mortgage ($/mo)","num"]]},
    {title:"Debt & savings", note:"What you owe, and what you’ve already set aside.",
     fields:[["debt","Total debt ($)","num"],["debtRate","Debt interest rate (%)","num"],["savings","Savings balance ($)","num"],["emerg","Emergency fund ($)","num"],["invest","Investments balance ($)","num"]]},
    {title:"Monthly living costs", note:"Roughly what you spend each month.",
     fields:[["food","Food / groceries ($/mo)","num"],["transport","Transport ($/mo)","num"],["insurance","Insurance ($/mo)","num"],["subs","Subscriptions ($/mo)","num"],["expenses","Other living expenses ($/mo)","num"]]},
    {title:"Growth plan", note:"A couple of assumptions for your projection — tweak any time.",
     fields:[["invRate","Expected investment return (%)","num"],["extra","Extra toward debt/savings each month ($)","num"]]},
  ],
  isComplete(){ return !!this.profile._complete; },
  /* live-pull income, debts, savings and living costs from My Finances so the
     questionnaire always reflects the user's real numbers */
  syncFinances(){
    try{
      const p=this.profile;
      p.income = monthlyIncome();
      const cat = n => { const c=((DB.budget&&DB.budget.categories)||[]).find(x=>x.name===n); return c?(+c.spent||0):0; };
      p.housing   = cat("Housing & Rent");
      p.food      = cat("Groceries");
      p.transport = cat("Transport");
      p.subs      = cat("Subscriptions");
      const totalExp = monthlyExpenses();
      const mapped = (+p.housing||0)+(+p.food||0)+(+p.transport||0)+(+p.insurance||0)+(+p.subs||0);
      p.expenses = Math.max(0, totalExp - mapped);   // everything-else bucket so the total = My Finances expenses
      const bal = sum(DB.debts,d=>+d.balance||0);
      p.debt = bal;
      p.debtRate = bal>0 ? svRound(sum(DB.debts,d=>(+d.balance||0)*(+d.rate||0))/bal) : 0;
      const eg=(typeof emergencyGoal==="function")?emergencyGoal():null;
      p.emerg = eg?(+eg.saved||0):((DB.summary&&DB.summary.emergencyFund)||0);
      p.savings = Math.max(0, sum(DB.goals,g=>+g.saved||0) - (p.emerg||0));
      if(DB.user&&DB.user.name&&!p.name) p.name=DB.user.name;
    }catch(e){}
  },

  mount(){
    this.seed();
    this.syncFinances();
    if(typeof this.wizStep!=="number") this.wizStep=0;
    if(this.inWizard==null) this.inWizard=!this.isComplete();
    if(this.inWizard) this.renderWizard(); else this.mountResults();
  },

  renderWizard(){
    const wrap=$("#solverWrap"); if(!wrap) return;
    const S=this.STEPS, i=Math.max(0,Math.min(S.length-1,this.wizStep)), step=S[i], last=(i===S.length-1);
    const done=this.isComplete();
    const dots=S.map((s,n)=>`<button class="wiz-dot ${n===i?'on':''} ${(n<i||done)?'done':''}" onclick="Solver.wizGo(${n})" title="${s.title}"><span>${n+1}</span><em>${s.title}</em></button>`).join("");
    wrap.innerHTML=`
      <div class="wiz">
        <div class="wiz-rail">${dots}</div>
        <div class="wiz-prog"><i style="width:${Math.round(i/(S.length-1)*100)}%"></i></div>
        <div class="card pad-lg">
          <div class="wiz-stepno">Step ${i+1} of ${S.length}</div>
          <h2 class="wiz-title">${step.title} ${last?helpDot("projGrowth"):""}</h2>
          <p class="wiz-note">${step.note}</p>
          <div class="wiz-fields">${this.fields(step.fields)}</div>
          <div class="wiz-actions">
            <button class="btn btn-ghost btn-sm" ${i===0?'disabled':''} onclick="Solver.wizBack()">${svg(ICON.arrow,13)} Back</button>
            <div class="flex gap center">
              ${done?`<button class="btn btn-ghost btn-sm" onclick="Solver.wizDone()">Skip to results</button>`:''}
              <button class="btn btn-primary" onclick="Solver.${last?'wizFinish':'wizNext'}()">${last?'See my results':'Next'} ${svg(ICON.arrow,13)}</button>
            </div>
          </div>
        </div>
      </div>`;
    wrap.querySelectorAll("[data-sv]").forEach(inp=>inp.addEventListener("input",e=>{
      const k=e.target.dataset.sv, v=e.target.value;
      this.profile[k]= e.target.dataset.t==="num" ? (+v||0) : v;
      this.save();
    }));
    try{ window.scrollTo(0,0); }catch(e){}
  },
  wizNext(){ if(this.wizStep<this.STEPS.length-1){ this.wizStep++; this.renderWizard(); } },
  wizBack(){ if(this.wizStep>0){ this.wizStep--; this.renderWizard(); } },
  wizGo(n){ this.wizStep=n; this.renderWizard(); },
  wizFinish(){ this.profile._complete=true; this.save(); this.inWizard=false; this.mountResults(); },
  wizDone(){ this.inWizard=false; this.mountResults(); },
  editProfile(){ this.inWizard=true; this.wizStep=0; this.renderWizard(); },

  mountResults(){
    const wrap=$("#solverWrap"); if(!wrap) return;
    const nm=this.profile.name?(this.profile.name+"’s"):"Your";
    wrap.innerHTML=`
      <div class="flex between center wrap" style="gap:12px;margin-bottom:18px">
        <div><h2 style="font-size:21px;margin:0">${nm} financial plan</h2>
          <p class="muted small" style="margin:3px 0 0">Built from the profile you filled in. Change any answer any time.</p></div>
        <button class="btn btn-ghost btn-sm" onclick="Solver.editProfile()"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" style="vertical-align:-2px"><path d="M4 13.5 13 4.5l2.5 2.5L6.5 16H4v-2.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg> Edit profile</button>
      </div>
      <div class="card pad-lg" style="margin-bottom:18px">
        <div class="card-head"><h3>Your future — current path vs taking action</h3><span class="pill up">20-yr</span></div>
        <div id="projOut"></div>
      </div>

    syncProjFromProfile(); if(typeof renderProjection==="function") renderProjection();
    this.render();
  },

  fields(list){

        return `<div class="field"><label>${label}</label><select data-sv="${k}" data-t="str">${
          opts.map(o=>`<option ${this.profile[k]===o?"selected":""}>${o}</option>`).join("")}</select></div>`;
      }
      const t=type==="num"?"number":"text";
      return `<div class="field"><label>${label}</label><input type="${t}" data-sv="${k}" data-t="${type==="num"?"num":"str"}" value="${this.profile[k]??""}"></div>`;
    }).join("");

          <th style="padding:8px 6px">Decision</th><th>Fit</th><th>Wealth</th><th>Stability</th><th>Income</th><th>Risk</th><th>Worst case</th><th>Reversible</th></tr></thead>

  /* ---- RISK REPORT (scenario engine) ---- */
  tab_risk(){
    const R=this.R, S=R.scenarios;
    const cell=v=>v.cf>=0?'pos':'neg';
    return `<div class="card pad-lg" style="margin-bottom:18px"><div class="card-head"><h3>Stress test — 10 scenarios</h3>
        <span class="muted small">applied to your real cash flow</span></div>
      <table style="width:100%;border-collapse:collapse;font-size:12.5px">
        <thead><tr style="text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase">
          <th style="padding:8px 6px">Scenario</th><th>Income</th><th>Essential spend</th><th>Monthly cash flow</th><th>Survival</th><th>12-mo net worth</th><th>Failure risk</th></tr></thead>
        <tbody>${S.map(s=>`<tr style="border-top:1px solid var(--line)">
          <td style="padding:9px 6px"><b>${s.label}</b>${s.debtDanger?' <span class="pill down">debt danger</span>':''}</td>
          <td>${money(s.inc)}</td><td>${money(s.exp)}</td>
          <td class="${cell(s)} bold">${money(s.cf)}</td>
          <td>${s.survival===Infinity?'∞':s.survival+' mo'}</td>
          <td class="${s.nwChange>=0?'pos':'neg'}">${money(s.nwChange)}</td>
          <td>${this.miniBar(s.fail)}</td></tr>`).join("")}</tbody></table></div>
      ${this.scenarioModels()}`;
  },
  scenarioModels(){
    const R=this.R, S=R.scenarios;
    const get=id=>S.find(s=>s.id===id)||{};
    const worst=[...S].sort((a,b)=>b.fail-a.fail)[0];      // highest failure risk
    const best =[...S].sort((a,b)=>a.fail-b.fail)[0];      // lowest failure risk (dynamic, not always "growth")
    const avg=get("normal");                               // baseline = your actual data, not a statistical mean
    const model=(title,s,col,conf)=>`<div class="card pad-lg" style="border-color:${col}">
        <div class="muted small bold" style="text-transform:uppercase">${title}</div>
        <div style="font-size:17px;font-weight:800;margin:5px 0">${s.label||'—'}</div>
        <div class="small">Cash flow <b class="${s.cf>=0?'pos':'neg'}">${money(s.cf)}/mo</b></div>
        <div class="small">Survival ${s.survival===Infinity?'∞':s.survival+' mo'} · 12-mo Δ ${money(s.nwChange)}</div>
        <div class="bar" style="margin-top:8px"><i style="width:${conf}%;background:${col}"></i></div>
        <div class="muted small" style="margin-top:4px">Model confidence ${conf}%</div></div>`;
    // confidence is driven by how complete the user's inputs are (not fixed magic numbers)
    const filled=[R.income,R.housing,R.food,R.trans,R.emerg,R.savings].filter(v=>v>0).length;
    const dataConf=svRound(svClamp(45+filled/6*40,45,90));
    return `<div class="grid" style="grid-template-columns:repeat(3,1fr)">
      ${model("Best case",best,'var(--emerald)',svRound(svClamp(dataConf-20,30,80)))}
      ${model("Baseline (your data)",avg,'var(--teal)',dataConf)}
      ${model("Worst case",worst,'var(--red)',svRound(svClamp(dataConf-30,25,70)))}</div>`;
  },

  /* ---- ACTION PLAN ---- */
  tab_plan(){
    const R=this.R, reco=R.reco;
    const phase=(title,sub,items,col)=>`<div class="card pad-lg">
        <div class="flex center gap-sm" style="margin-bottom:4px"><span style="width:10px;height:10px;border-radius:3px;background:${col}"></span><b>${title}</b></div>
        <div class="muted small" style="margin-bottom:10px">${sub}</div>
        ${items.map(it=>`<div class="flex gap-sm" style="padding:6px 0;font-size:13px;border-top:1px solid var(--line)">
          <span style="color:${col};flex:none">${svg(ICON.arrow,15)}</span><span>${it}</span></div>`).join("")}</div>`;
    return `<div class="card pad-lg" style="margin-bottom:18px;background:var(--navy);color:#fff;border:none">
        <div class="small" style="color:var(--teal);font-weight:700;letter-spacing:1px">THE SAFEST HIGH-RETURN NEXT MOVE</div>
        <h3 style="color:#fff;font-size:20px;margin:8px 0 4px">${reco.best.label}</h3>
        <p style="color:#aebbcc;font-size:13.5px">${reco.best.why} It scores <b style="color:#fff">${reco.best.score}/100</b> for your situation — the best balance of return and safety. Second-best: <b style="color:#fff">${reco.second.label}</b>.</p>
      </div>
      <div class="grid" style="grid-template-columns:repeat(3,1fr)">
        ${phase("Next 30 days","Stabilise & quick wins",reco.p30,'var(--emerald)')}
        ${phase("Next 90 days","Build the base",reco.p90,'var(--teal)')}
        ${phase("Next 12 months","Grow with confidence",reco.p365,'var(--navy-600)')}
      </div>
      <div class="card pad-lg" style="margin-top:18px"><div class="card-head"><h3>Why this, in plain English</h3></div>
        <p style="font-size:13.5px;line-height:1.65">${this.plainEnglish()}</p></div>`;
  },
  plainEnglish(){
    const R=this.R, reco=R.reco; const p=this.profile;
    const name=(p.name&&p.name.trim())?p.name.trim().split(/\s+/)[0]:"You";
    const bits=[];
    bits.push(`${name}, your stability sits at <b>${R.stability}/100 (${scoreLabel(R.stability)})</b> with ${isFinite(R.runway)?R.runway.toFixed(1):'∞'} months of runway.`);
    if(R.surplus<0) bits.push(`The first problem is cash flow — you're <b class="neg">${money(Math.abs(R.surplus))}/mo short</b>, so before anything else, close that gap with the Home Savings and Housing tabs.`);
    else bits.push(`You have <b class="pos">${money(R.surplus)}/mo</b> of surplus to direct — that's your lever.`);
    if(R.debt>0 && R.dRate>=0.08) bits.push(`Your debt at <b>${svRound(R.dRate*100)}%</b> is expensive, so paying it down is effectively a guaranteed ${svRound(R.dRate*100)}% return — safer than investing right now.`);
    if(R.runway<3) bits.push(`Because your runway is under 3 months, the engine is holding you back from market risk until you've got a real buffer.`);
    bits.push(`The single best next move is <b>${reco.best.label.toLowerCase()}</b> (${reco.best.score}/100). The one to <b>avoid for now</b> is ${reco.doNotYet.label.toLowerCase()} — ${reco.doNotYet.why.toLowerCase()}`);
    return bits.join(" ");
  },
};

    // 2: a "muted small bold" label (dashboard cards, edu best/worst, scenario models)
    const msb = card.querySelector(".muted.small.bold");
    if(msb) return norm(msb.textContent);
    // 3: a leading bold (investing banner, overview warnings)
    const b = card.querySelector(".bold");
    if(b) return norm(b.textContent);
    // 4: a leading <b> (action-plan phases)
    const bb = card.querySelector("b");
    if(bb) return norm(bb.textContent);
    return "";
  }
  function keyFor(card){
    const t = tileTitle(card);
    if(t==="__planhero__") return "planHero";
    for(let i=0;i<MAP.length;i++){ if(t.indexOf(MAP[i][0])===0) return MAP[i][1]; }
    return null;
  }

  /* ---- one-time CSS ---- */
  function injectCSS(){
    if(document.getElementById("sv-help-css")) return;
    const css = document.createElement("style");
    css.id = "sv-help-css";
    css.textContent = `
      #solverWrap .card{position:relative}

      .svh-b b{color:var(--ink)}

    document.head.appendChild(css);
  }

  /* ---- modal ---- */
  let overlay=null;
  function ensureOverlay(){
    if(overlay) return overlay;
    overlay=document.createElement("div");
    overlay.className="svh-overlay";
    overlay.innerHTML=`<div class="svh-panel" role="dialog" aria-modal="true">
      <div class="svh-hd"><div><span class="svh-tag">Understanding this tile</span><h3></h3></div>
      <button class="svh-x" aria-label="Close">&times;</button></div>
      <div class="svh-body"></div></div>`;
    overlay.addEventListener("click",e=>{ if(e.target===overlay) hide(); });
    overlay.querySelector(".svh-x").addEventListener("click",hide);
    document.addEventListener("keydown",e=>{ if(e.key==="Escape") hide(); });
    document.body.appendChild(overlay);
    return overlay;
  }
  function show(key){
    const entry=HELP[key]; if(!entry) return;
    const SV=(typeof Solver!=="undefined")?Solver:null;
    const R=(SV&&SV.R)||{}, p=(SV&&SV.profile)||{};
    let html=""; try{ html=entry.fn(R,p); }catch(e){ html="<div class='svh-sec'><div class='svh-b'>Details unavailable.</div></div>"; }
    const o=ensureOverlay();
    o.querySelector(".svh-hd h3").innerHTML=entry.title;
    o.querySelector(".svh-body").innerHTML=html;
    o.style.display="flex";
    requestAnimationFrame(()=>o.classList.add("show"));
  }
  function hide(){
    if(!overlay) return;
    overlay.classList.remove("show");
    setTimeout(()=>{ if(overlay) overlay.style.display="none"; },150);
  }

  /* ---- inject "?" buttons into every tile ---- */
  function inject(){
    injectCSS();
    const wrap=document.getElementById("solverWrap"); if(!wrap) return;
    wrap.querySelectorAll(".card").forEach(card=>{
      if(card.querySelector(":scope > .svh-btn")) return;   // already has one
      const key=keyFor(card);
      if(!key || !HELP[key]) return;
      const btn=document.createElement("button");
      btn.className="svh-btn"; btn.type="button";
      btn.textContent="?"; btn.title="What is this tile?";
      btn.setAttribute("aria-label","Explain this tile");
      btn.addEventListener("click",ev=>{ ev.stopPropagation(); show(key); });
      card.appendChild(btn);
    });
  }

  /* ---- hook Solver.paint without editing it ---- */
  function wire(){
    if(typeof Solver==="undefined" || typeof Solver.paint!=="function"){ setTimeout(wire,150); return; }
    if(Solver.__helpWired) return; Solver.__helpWired=true;
    const orig=Solver.paint.bind(Solver);
    Solver.paint=function(){ orig(); setTimeout(inject,0); };
    // also patch mount so the input-side cards (About you / Your money) get buttons
    if(typeof Solver.mount==="function"){
      const om=Solver.mount.bind(Solver);
      Solver.mount=function(){ om(); setTimeout(inject,0); };
    }
    // expose for debugging
    window.SolverHelp={show,hide,inject};
  }
  wire();
})();

function hubRepay(P,ratePct,years){ const r=ratePct/100/12, n=years*12; return r>0? P*r/(1-Math.pow(1+r,-n)) : (n>0?P/n:0); }
function hubLight(level){ // 'ok'|'warn'|'bad'

}

  housingCalc(){
    const price=HubNum("h_price"), dep=HubNum("h_deposit"), income=HubNum("h_income"),
          rate=HubNum("h_rate"), term=HubNum("h_term")||30, rentWk=HubNum("h_rent"), otherMo=HubNum("h_expenses");
    const loan=Math.max(0,price-dep);
    const repayMo=hubRepay(loan,rate,term);
    const incomeMo=income/12;
    const validPrice= price>0;
    const depPct= validPrice? dep/price*100 : 0;
    const lmiLikely= validPrice && depPct<20;
    const stress= incomeMo>0? (repayMo+otherMo)/incomeMo : 1;            // total housing+debt / income
    const borrowPower= Math.max(0, (incomeMo*0.35 - otherMo) ); const maxLoan= hubRepayInverse(borrowPower,rate,term);
    const rentMo=rentWk*52/12;
    const rentVsBuy= repayMo-rentMo;
    const afford= incomeMo*0.30;                                          // comfortable housing budget
    // housing stability score (0-100)
    let score=0;
    score += svClamp((depPct/20),0,1)*30;
    score += stress<=0.3?35: svClamp(1-(stress-0.3)/0.3,0,1)*35;
    score += rate<=6?20: svClamp(1-(rate-6)/4,0,1)*20;
    score += svClamp(1-otherMo/(incomeMo||1)/0.2,0,1)*15;
    score=svRound(svClamp(score));
    const sLight= stress<=0.3?'ok':stress<=0.4?'warn':'bad';
    const L=hubLight(sLight);
    const stat=(l,v,sub,c)=>`<div style="border:1px solid var(--line);border-radius:10px;padding:12px"><div class="muted small">${l}</div><div class="bold" style="font-size:17px;margin-top:2px;${c?'color:'+c:''}">${v}</div><div class="muted small">${sub}</div></div>`;
    HubOut("housingOut", `<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))">
      ${stat("Loan needed",money(loan),validPrice?(depPct.toFixed(0)+"% deposit"+(lmiLikely?" · LMI likely":" · no LMI")):"enter a property price",lmiLikely?'var(--amber)':'var(--emerald)')}
      ${stat("Repayments",money(repayMo)+"/mo",rate+"% over "+term+" yrs")}
      ${stat("Mortgage stress",svRound(stress*100)+"%","<span style='color:"+L.c+"'>"+L.l+"</span> · housing+debt ÷ income",L.c)}
      ${stat("Est. borrowing power",money(maxLoan),"at ~35% of income")}
      ${stat("Rent vs buy",(rentVsBuy>=0?"+":"")+money(rentVsBuy)+"/mo",rentVsBuy>=0?"buying costs more now":"buying costs less now")}
      ${stat("Comfortable budget",money(afford)+"/mo","30% of income on housing")}
      ${stat("Housing stability",score+"/100",scoreLabel(score),scoreColour(score))}
    </div>`);
  },

    let s="";
    if(t==="hardship"){
      s=`Dear ${cred},\n\nRe: Account ${ref} — Application for financial hardship assistance\n\nI am writing to formally request hardship assistance on the above account (balance ${amtT}). Due to ${reason}, I am currently unable to meet my usual repayments.\n\nI want to keep this account in good standing and resolve it responsibly. I am asking you to consider:\n  • a temporary reduction or pause of repayments, and/or\n  • a longer-term affordable arrangement of ${offerT} per fortnight.\n\nPlease confirm in writing the options available, and pause any default listing, fees or enforcement while this request is assessed. I understand you are required to consider genuine hardship applications.\n\nI can provide details of my income and expenses on request. Please contact me to discuss.\n\nYours sincerely,\n${name}`;
    } else if(t==="payment"){
      s=`Dear ${cred},\n\nRe: Account ${ref} — Proposed payment arrangement\n\nI acknowledge the amount owing of ${amtT}. I am committed to repaying this in full and would like to propose a realistic plan.\n\nI can pay ${offerT} per fortnight, starting on [date], until the balance is cleared. This is the most I can sustainably manage right now without falling further behind.\n\nPlease confirm acceptance in writing, and that you will hold further fees, interest increases and enforcement action while I keep to this plan.\n\nThank you for working with me on this.\n\nYours sincerely,\n${name}`;
    } else if(t==="contact"){
      s=`Phone script — calling ${cred} about account ${ref}\n\n"Hi, my name is ${name}. I'm calling about account ${ref}. I'm experiencing financial hardship due to ${reason}, and I want to sort out a workable arrangement rather than fall behind.\n\nCan I please speak to your hardship team?\n\nI can realistically afford about ${offerT} per fortnight. Can we set up an arrangement at that level, and can you pause fees, interest increases and any default listing while we do?\n\nPlease send me written confirmation of whatever we agree. Can I have a reference number for this call, and your name?"\n\nNotes:\n  • Date/time of call: ________   • Spoke with: ________   • Ref #: ________\n  • Outcome agreed: ____________________________________`;
    } else {
      s=`DEBT PRIORITISATION PLAN — ${name}\n\nPay in this order (protect the essentials first):\n\n1. SURVIVAL: rent/mortgage, utilities, food, transport, insurance — these keep a roof over your head and you safe.\n2. SECURED & legal: mortgage arrears, car loan (if you need the car), court fines, child support.\n3. HIGH-INTEREST: credit cards, payday/BNPL, personal loans — highest interest rate first.\n4. EVERYTHING ELSE: lower-interest or interest-free debts, minimums only for now.\n\nFor each debt, request hardship and an affordable arrangement (use the templates here).\nBalance to organise: ${amtT}.\nFree help: National Debt Helpline 1800 007 007.\n\nReview this plan monthly and move money from cleared debts onto the next one.`;
    }
    const e=$("#lt_out"); if(e) e.value=s;
  },
  copyLetter(btn){ const e=$("#lt_out"); if(!e) return; e.select(); try{ document.execCommand("copy"); }catch(x){} if(navigator.clipboard){ try{ navigator.clipboard.writeText(e.value); }catch(x){} } const o=btn.textContent; btn.textContent="Copied ✓"; setTimeout(()=>btn.textContent=o,1500); },
  calcStress(){
    const income=HubNum("fs_income"), housing=HubNum("fs_housing"), debt=HubNum("fs_debt"), util=HubNum("fs_util");
    const r=x=>income>0?x/income:1;
    const rows=[
      ["Housing stress", r(housing), 0.30,0.40],
      ["Debt stress", r(debt), 0.10,0.20],
      ["Utility stress", r(util), 0.06,0.10],
      ["Income stress", r(housing+debt+util), 0.60,0.80],
    ];
    const overallRatio=r(housing+debt+util);
    const oLevel= overallRatio<=0.6?'ok':overallRatio<=0.85?'warn':'bad';
    const line=(label,ratio,a,b)=>{ const lvl= ratio<=a?'ok':ratio<=b?'warn':'bad'; const L=hubLight(lvl);
      return `<div class="flex between center" style="padding:8px 0;border-top:1px solid var(--line)"><span class="small">${label}</span>
        <span class="flex center gap-sm"><b class="small">${svRound(ratio*100)}%</b><span class="pill ${L.p}">${L.l}</span></span></div>`; };
    const O=hubLight(oLevel);
    HubOut("stressOut", `<div style="border:1px solid var(--line);border-radius:12px;padding:8px 14px;margin-top:6px">
      ${rows.map(x=>line(...x)).join("")}
      <div class="flex between center" style="padding:11px 0 4px;border-top:2px solid var(--line);margin-top:4px">
        <b>Overall financial pressure</b><span class="pill ${O.p}" style="font-size:12.5px">${svRound(overallRatio*100)}% · ${O.l}</span></div>
    </div>${oLevel!=='ok'?`<p class="small" style="margin-top:8px;color:${O.c}"><b>Act now:</b> request hardship on your biggest pressure above and call 1800 007 007 for free help.</p>`:`<p class="small pos" style="margin-top:8px">You're in a healthy range — keep building your buffer.</p>`}`);
  },

  /* ===================== 7. FINES & DEBT ===================== */
  sec_fines(){
    const types=[["Traffic fines","Speeding, parking, red-light and similar infringements."],
      ["Toll fines","Unpaid toll notices that escalate with admin fees if ignored."],
      ["Court fines","Penalties imposed by a court — ignoring them has serious consequences."],
      ["Infringement notices","On-the-spot penalties from agencies (transport, council, etc.)."],
      ["Local council fines","Parking, animal, waste and by-law penalties from your council."]];
    const help=[["Payment plans","Most agencies let you pay by instalments — ask before the due date."],
      ["Hardship arrangements","Reduced payments or pauses if you're on a low income or in crisis."],
      ["Time-to-pay options","Extra time to pay without escalation if you make contact early."],
      ["Community work / WDO","In some states, work & development orders clear fines through approved activities/treatment."],
      ["Fine review / appeal","You can ask for a review if you believe a fine was wrongly issued."],
      ["Enforcement actions","Unpaid fines can lead to extra fees, licence/rego suspension or property actions — act early to avoid this."],
      ["State-specific bodies","Revenue NSW, Fines Victoria, SPER (QLD), etc. manage enforcement in each state."]];
    return `<div class="grid cols-2" style="margin-bottom:18px">
        <div class="card pad-lg"><div class="card-head"><h3>Fine types</h3></div>${types.map(([t,d])=>`<div style="padding:8px 0;border-top:1px solid var(--line)"><b class="small">${t}</b><div class="muted small">${d}</div></div>`).join("")}</div>
        <div class="card pad-lg"><div class="card-head"><h3>Your options</h3></div>${help.map(([t,d])=>`<div style="padding:8px 0;border-top:1px solid var(--line)"><b class="small">${t}</b><div class="muted small">${d}</div></div>`).join("")}</div>
      </div>
      <div class="card pad-lg"><div class="card-head"><h3>Fine Management Tool</h3><span class="muted small">prioritise &amp; plan repayments</span></div>
        <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;align-items:end">
          <div class="field" style="margin:0"><label>Fine</label><input id="fn_label" type="text" placeholder="e.g. Parking fine"></div>
          <div class="field" style="margin:0"><label>Amount ($)</label><input id="fn_amt" type="number" min="0" placeholder="0"></div>
          <div class="field" style="margin:0"><label>Due date</label><input id="fn_due" type="date"></div>
          <button class="btn btn-sm btn-emerald" style="height:42px" onclick="Hub.addFine()">Add</button>
        </div>
        <div id="fn_msg" class="small neg" style="margin-top:6px"></div>
        <div class="field" style="max-width:240px;margin:14px 0 0"><label>Pay off over (weeks)</label><input id="fn_weeks" type="number" value="12" oninput="Hub.renderFines()"></div>
        <div id="finesOut" style="margin-top:14px"></div>
      </div>
      ${this.disclaimer("Always contact the issuing authority directly to set up an official plan — this tool helps you organise, it doesn't lodge anything. Never ignore a fine; that's when fees and enforcement start.")}`;
  },
  addFine(){ const label=HubVal("fn_label")||"Fine", amt=HubNum("fn_amt"), due=HubVal("fn_due");
    if(amt>0){ this.fines.push({label,amount:amt,due:due||""}); const a=$("#fn_label"),b=$("#fn_amt"),c=$("#fn_due"); if(a)a.value="";if(b)b.value="";if(c)c.value=""; HubOut("fn_msg",""); this.renderFines(); }
    else { HubOut("fn_msg","Enter an amount greater than $0 to add a fine."); } },
  removeFine(i){ this.fines.splice(i,1); this.renderFines(); },
  renderFines(){
    const weeks=Math.max(1,HubNum("fn_weeks")||12);
    const total=sum(this.fines,f=>f.amount);
    const today=new Date(); today.setHours(0,0,0,0);
    const sorted=this.fines.map((f,i)=>({...f,i})).sort((a,b)=>{ const da=a.due?new Date(a.due):new Date(8e15), db=b.due?new Date(b.due):new Date(8e15); return da-db; });
    const perWeek= total/weeks;
    if(!this.fines.length){ HubOut("finesOut",`<div class="card pad-lg muted">No fines added yet — add one above to build a plan.</div>`); return; }
    HubOut("finesOut", `<table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase">
        <th style="padding:8px 6px">Priority</th><th>Fine</th><th>Amount</th><th>Due</th><th>Status</th><th></th></tr></thead>
      <tbody>${sorted.map((f,rank)=>{
        let status='<span class="pill">scheduled</span>', overdue=false;
        if(f.due){ const d=new Date(f.due); d.setHours(0,0,0,0); const days=Math.round((d-today)/864e5);
          if(isNaN(days)){ status='<span class="pill">scheduled</span>'; }
          else if(days<0){ overdue=true; status='<span class="pill down">overdue — act now</span>'; }
          else if(days<=14) status='<span class="pill warn">due in '+days+'d</span>';
          else status='<span class="pill up">'+days+'d away</span>'; }
        return `<tr style="border-top:1px solid var(--line);${overdue?'background:var(--urgent-soft)':''}">
          <td style="padding:9px 6px"><b>${rank+1}</b></td><td>${f.label}</td><td class="bold">${money(f.amount)}</td>
          <td>${f.due||'—'}</td><td>${status}</td>
          <td><button class="btn btn-sm btn-ghost" onclick="Hub.removeFine(${f.i})">Remove</button></td></tr>`;
      }).join("")}</tbody></table>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(170px,1fr));margin-top:14px">
        <div style="border:1px solid var(--line);border-radius:10px;padding:12px"><div class="muted small">Total owing</div><div class="bold" style="font-size:18px">${money(total)}</div></div>
        <div style="border:1px solid var(--line);border-radius:10px;padding:12px"><div class="muted small">Pay over</div><div class="bold" style="font-size:18px">${weeks} weeks</div></div>
        <div style="border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--healthy-soft)"><div class="muted small">Set aside each week</div><div class="bold pos" style="font-size:18px">${money(perWeek)}</div></div>
      </div>
      <p class="muted small" style="margin-top:10px">Tackle the top row first (closest due / overdue). Ask each authority to confirm this plan officially so enforcement is paused.</p>`);
  },

    add("Utility assistance","Hardship programs and emergency grants for energy & water bills.","Your provider's hardship team","warn");

    add("Gambling support","Free, confidential help if gambling is part of the pressure.","Gambling Help 1800 858 858","ok");

  sec_decide(){

  decResult(items,verdict,vColor){ return `<div style="border:1px solid var(--line);border-radius:10px;padding:12px">
    ${items.map(([l,v])=>`<div class="flex between" style="padding:3px 0"><span class="muted small">${l}</span><b class="small">${v}</b></div>`).join("")}
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line);color:${vColor};font-weight:700;font-size:13px">${verdict}</div></div>`; },
  decStudy(){ const cost=HubNum("ds_cost"), m=HubNum("ds_months"), raise=HubNum("ds_raise"), income=HubNum("ds_income"), demand=HubVal("ds_demand")||"Medium";
    const lostIncome= income*(m/12)*0.5;                 // assume ~50% income forgone while studying
    const totalCost= cost+lostIncome;
    const paybackYrs= raise>0? totalCost/raise : null;   // true payback in years incl. opportunity cost
    const demandScore={High:85,Medium:65,Low:45}[demand];
    const good= raise>0 && paybackYrs!==null && paybackYrs<=4 && demandScore>=60;
    HubOut("dcStudyOut", this.decResult([
      ["Course cost",money(cost)],["Duration",m+" months"],
      ["Income forgone while studying",money(lostIncome)],
      ["Income impact","+"+money(raise)+"/yr"],
      ["Payback (incl. lost income)", paybackYrs!==null?paybackYrs.toFixed(1)+" yrs":"—"],
      ["Field demand",demandScore+"/100"]
    ], good?"Likely worth it — pays back reasonably fast with solid demand.":(raise<=0?"Add an expected pay rise to assess.":"Marginal — slow payback once lost income is counted, or weak demand.") , good?'var(--emerald)':'var(--amber)')); },
  decHouse(){ const price=HubNum("dh_price"), dep=HubNum("dh_dep"), income=HubNum("dh_income"), rate=HubNum("dh_rate");
    const loan=Math.max(0,price-dep), repay=hubRepay(loan,rate,30), stress= income>0?repay*12/income:1, depPct= price>0?dep/price*100:0;
    const lvl= stress<=0.3?'ok':stress<=0.4?'warn':'bad'; const L=hubLight(lvl);
    HubOut("dcHouseOut", this.decResult([
      ["Deposit",money(dep)+" ("+depPct.toFixed(0)+"%)"],["Loan needed",money(loan)],
      ["Repayments",money(repay)+"/mo"],["Mortgage stress",svRound(stress*100)+"% ("+L.l+")"],
      ["LMI", depPct<20?"likely payable":"avoided"]
    ], lvl==='ok'?"Affordable on these numbers — long-term equity upside.":lvl==='warn'?"Tight — build a bigger deposit or buffer first.":"High stress — risky at this price/income. Reconsider.", L.c)); },
  decCareer(){ const now=HubNum("dca_now"), target=HubNum("dca_target"), m=HubNum("dca_months"), outlook=HubVal("dca_outlook")||"Stable";
    const lift=target-now, lostIncome= now*(m/12)*0.3, payback= lift>0? (lostIncome/lift) :0;
    const demand={Growing:"strong & rising",Stable:"steady",Declining:"shrinking — caution"}[outlook];
    const good= lift>0 && outlook!=="Declining" && payback<=3;
    HubOut("dcCareerOut", this.decResult([
      ["Income change",(lift>=0?"+":"")+money(lift)+"/yr"],["Industry outlook",demand],
      ["Est. income lost retraining",money(lostIncome)],["Payback", lift>0?payback.toFixed(1)+" yrs":"—"]
    ], good?"Promising — meaningful raise into a healthy field.":(outlook==="Declining"?"Caution — moving into a shrinking field.":"Modest gain — make sure the move is worth the disruption."), good?'var(--emerald)':'var(--amber)')); },
  decBiz(){ const cap=HubNum("db_cap"), fixed=HubNum("db_fixed"), rev=HubNum("db_rev"), margin=HubNum("db_margin")/100;
    const grossProfit=rev*margin, net=grossProfit-fixed;
    const noRunway= net<0 && cap<=0;                                   // losing money with no capital = no runway
    const runway= net>=0? Infinity : (cap>0? cap/Math.abs(net) : 0);
    const prob= svRound(svClamp(35 + margin*40 + (net>0?20:0) + (cap>=fixed*6?5:0),5,90));
    const good= net>0 && prob>=60;
    const runwayTxt= net>=0? "self-sustaining" : (noRunway? "none — loses money from day one" : runway.toFixed(1)+" months");
    HubOut("dcBizOut", this.decResult([
      ["Capital required",money(cap)],["Monthly profit", (net>=0?"+":"")+money(net)],
      ["Cash flow", net>=0?"positive":"negative ("+money(Math.abs(net))+"/mo)"],
      ["Runway on capital", runwayTxt],
      ["Rough success odds",prob+"%"]
    ], good?"Viable on paper — protect cash flow and keep a buffer.": noRunway?"Don't start yet — it loses money with no capital to absorb it.": net<0?"Risky — it loses money monthly; you'd burn through capital.":"Marginal — thin margins; validate demand before committing.", good?'var(--emerald)': (noRunway?'var(--red)':'var(--amber)'))); },
  decDebtInvest(){ const dRate=HubNum("di_rate"), ret=HubNum("di_ret"), risk=HubVal("di_risk")||"Medium", amt=HubNum("di_amt");
    const edge=dRate-ret; const payWins= edge>=0; const noDebt= dRate<=0;
    const verdict= noDebt ? "No high-interest debt to clear — investing your "+money(amt)+"/mo is reasonable, sized to your risk tolerance." :
      (dRate>=8 && payWins ? "Pay the debt — a guaranteed "+dRate+"% beats a risky "+ret+"%." :
      (!payWins && risk!=="Low" ? "Investing may edge ahead — but only with a secure base & no high-interest debt." :
      "Close call — clear high-interest debt first, then invest. Splitting is reasonable."));
    const vColor= noDebt?'var(--teal)': payWins?'var(--emerald)': risk==="Low"?'var(--amber)':'var(--teal)';
    HubOut("dcDIOut", this.decResult([
      ["Debt return (guaranteed)",dRate+"%"],["Investment return (risky)",ret+"%"],
      ["Advantage",(edge>=0?"debt by "+edge.toFixed(1):"investing by "+Math.abs(edge).toFixed(1))+"%"],
      ["Stability impact", payWins?"reduces risk":"adds market risk"],["Amount",money(amt)+"/mo"]
    ], verdict, vColor)); },
};
/* helper used by housing borrowing-power estimate */
function hubRepayInverse(monthly,ratePct,years){ const r=ratePct/100/12, n=years*12; return r>0? monthly*(1-Math.pow(1+r,-n))/r : monthly*n; }
</script>

  add(){
    if(!State.d.accounts.length){
      Modal.open('Add an account first','<p class="muted" style="font-size:13px;margin:0;line-height:1.6">Every transaction is recorded against an account. Add your first bank account, card or wallet, then come back to log spending and income.</p>',
        '<button class="btn" onclick="Modal.close()">Not now</button><button class="btn primary" onclick="Modal.close();go(\'accounts\')">Go to Accounts</button>');
      return;
    }
    this.edit(null);
  },
  edit(id){
    const t=State.d.transactions.find(x=>x.id===id)||{};
    Modal.form(id?'Edit transaction':'Add transaction',[
      {k:'date',label:'Date',type:'date',value:t.date||today()},
      {k:'desc',label:'Description',value:t.desc||''},
      {k:'merchant',label:'Merchant',value:t.merchant||''},
      {k:'category',label:'Category',type:'select',value:t.category||'Other',options:CATS},
      {k:'amount',label:'Amount (negative = spend, positive = income)',type:'number',step:'0.01',value:t.amount==null?'':t.amount},
      {k:'accountId',label:'Account',type:'select',value:t.accountId||(State.d.accounts[0]?State.d.accounts[0].id:''),options:State.d.accounts.map(a=>[a.id,a.name])},
      {k:'makeRecurring',label:'Make recurring — set up an automatic schedule after saving',type:'checkbox',value:false}
    ],v=>{
      const mk=v.makeRecurring;delete v.makeRecurring;
      if(!v.desc)return toast('Description required');
      /* 'applied' marks transactions whose amount has been folded into the
         account balance, so edits and deletes can reverse it symmetrically.
         Seeded/imported transactions lack the flag and never touch balances. */
      const findAcc=aid=>State.d.accounts.find(a=>a.id===aid);
      if(id){
        if(t.applied){
          const oldAcc=findAcc(t.accountId);if(oldAcc)oldAcc.balance=r2(Number(oldAcc.balance)-Number(t.amount));
          const newAcc=findAcc(v.accountId);if(newAcc)newAcc.balance=r2(Number(newAcc.balance)+Number(v.amount));
        }
        Object.assign(t,v);
        State.d.transactions.sort((a,b)=>b.date.localeCompare(a.date));
      }else{
        postTransaction(v); /* shared create path — applies the amount to the account (2dp) */
      }
      State.save();renderRoute();toast('Transaction saved');
      if(mk)RecurView.fromValues(v); /* pre-fills a recurrence from this transaction */
    });
  },
  del(id){Modal.confirm('Delete this transaction?',()=>{
    const t=State.d.transactions.find(x=>x.id===id);
    if(t&&t.applied){const acc=State.d.accounts.find(a=>a.id===t.accountId);if(acc)acc.balance=r2(Number(acc.balance)-Number(t.amount));}
    State.d.transactions=State.d.transactions.filter(x=>x.id!==id);State.save();renderRoute();toast('Deleted')})},
  setF(k,v){this.filter[k]=v;renderRoute();if(k==='q'){const el=$('#txQ');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}}}
};
/* Recurring transaction templates (Phase 2) — the schedule lives here; the
   actual posting happens in Recur.run() on boot / once per render-day. */
const RecurView={
  _prefill:null,
  add(){
    if(!State.d.accounts.length){
      Modal.open('Add an account first','<p class="muted" style="font-size:13px;margin:0;line-height:1.6">Recurring transactions post against an account. Add your first bank account, card or wallet, then set up the schedule.</p>',
        '<button class="btn" onclick="Modal.close()">Not now</button><button class="btn primary" onclick="Modal.close();go(\'accounts\')">Go to Accounts</button>');
      return;
    }
    this.edit(null);
  },
  fromValues(t){
    this._prefill={desc:t.desc,merchant:t.merchant,category:t.category,amount:t.amount,accountId:t.accountId,freq:'monthly',nextDate:addFreq(t.date||today(),'monthly'),active:true};
    this.edit(null);
  },
  edit(id){
    const r=State.d.recurrences.find(x=>x.id===id)||this._prefill||{};
    this._prefill=null;
    Modal.form(id?'Edit recurring transaction':'New recurring transaction',[
      {k:'desc',label:'Description',value:r.desc||''},
      {k:'merchant',label:'Merchant',value:r.merchant||''},
      {k:'category',label:'Category',type:'select',value:r.category||'Other',options:CATS},
      {k:'amount',label:'Amount per occurrence (negative = spend, positive = income)',type:'number',step:'0.01',value:r.amount==null?'':r.amount},
      {k:'accountId',label:'Account',type:'select',value:r.accountId||(State.d.accounts[0]?State.d.accounts[0].id:''),options:State.d.accounts.map(a=>[a.id,a.name])},
      {k:'freq',label:'Frequency',type:'select',value:r.freq||'monthly',options:[['weekly','Weekly'],['fortnightly','Fortnightly'],['monthly','Monthly'],['quarterly','Quarterly'],['yearly','Yearly']]},
      {k:'nextDate',label:'Next posting date',type:'date',value:r.nextDate||today()},
      {k:'active',label:'Active — posts automatically on schedule',type:'checkbox',value:r.active!==false}
    ],v=>{
      if(!v.desc)return toast('Description required');
      if(!Number(v.amount))return toast('Amount must not be zero');
      if(!v.nextDate)v.nextDate=today();
      v.amount=r2(v.amount);
      if(id){const x=State.d.recurrences.find(y=>y.id===id);Object.assign(x,v)}else{State.d.recurrences.push({id:uid(),...v})}
      State.save();
      Recur.runAndNotify(); /* a back-dated nextDate catches up immediately — always visibly */
      renderRoute();toast('Recurring transaction saved');
    });
  },
  toggle(id){const r=State.d.recurrences.find(x=>x.id===id);if(!r)return;r.active=!r.active;State.save();renderRoute();
    toast(r.active?'Recurring transaction resumed':'Paused — nothing more will post until resumed')},
  del(id){Modal.confirm('Delete this recurring schedule? Transactions it already posted stay in your history.',()=>{
    State.d.recurrences=State.d.recurrences.filter(x=>x.id!==id);State.save();renderRoute();toast('Recurring schedule deleted — posted history kept')})}
};
Views.transactions=function(id){
  const f=TxView.filter;
  let list=State.d.transactions;
  if(f.q){const q=f.q.toLowerCase();list=list.filter(t=>(t.desc+' '+t.merchant+' '+t.category).toLowerCase().includes(q))}
  if(f.cat)list=list.filter(t=>t.category===f.cat);
  if(f.month)list=list.filter(t=>monthKey(t.date)===f.month);
  const months=[...new Set(State.d.transactions.map(t=>monthKey(t.date)))].sort().reverse();
  const subs=Calc.subscriptions();
  const shown=list.slice(0,80);
  return head(id,{title:'Transactions',sub:'Every movement of money, categorised and searchable — with recurring subscriptions detected automatically.',
    actions:'<button class="btn primary" onclick="TxView.add()">'+ic('plus')+'Add transaction</button>'})+
  '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">'+
    '<input id="txQ" class="inp" style="max-width:220px" placeholder="Search transactions…" value="'+esc(f.q)+'" oninput="TxView.setF(\'q\',this.value)">'+
    '<select class="inp" style="max-width:180px" onchange="TxView.setF(\'cat\',this.value)"><option value="">All categories</option>'+CATS.map(c=>'<option'+(f.cat===c?' selected':'')+'>'+c+'</option>').join('')+'</select>'+
    '<select class="inp" style="max-width:190px" onchange="TxView.setF(\'month\',this.value)"><option value="">All months</option>'+months.map(m=>'<option value="'+m+'"'+(f.month===m?' selected':'')+'>'+new Date(m+'-02').toLocaleDateString('en-AU',{month:'long',year:'numeric'})+'</option>').join('')+'</select>'+
  '</div>'+
  '<div class="grid g-side" style="align-items:start">'+
  '<div><div class="t-wrap"><table class="tbl"><thead><tr><th>Date</th><th>Description</th><th>Category</th><th class="num">Amount</th><th></th></tr></thead><tbody>'+
    shown.map(t=>'<tr><td data-l="Date">'+fmtDate(t.date)+'</td>'+
      '<td data-l="Description"><span class="t-main">'+esc(t.desc)+'</span><div class="t-sub">'+esc(t.merchant||'')+(t.recurring?' · recurring':'')+' · '+esc(acctName(t.accountId))+'</div></td>'+
      '<td data-l="Category"><span class="badge n">'+esc(t.category)+'</span></td>'+
      '<td data-l="Amount" class="num"><span class="'+(t.amount>=0?'pos':'')+'">'+(t.amount>=0?'+':'')+money2(t.amount)+'</span></td>'+
      '<td data-l="Actions" class="num" style="white-space:nowrap"><button class="ibtn" onclick="TxView.edit(\''+t.id+'\')" title="Edit" aria-label="Edit transaction">'+ic('edit')+'</button><button class="ibtn" onclick="TxView.del(\''+t.id+'\')" title="Delete" aria-label="Delete transaction">'+ic('trash')+'</button></td></tr>').join('')+
  '</tbody></table></div>'+(list.length>80?'<div class="tiny muted mt8">Showing 80 of '+list.length+' — refine the filters to see more.</div>':'')+'</div>'+
  '<div><div class="card"><div class="card-h"><h3>Subscription radar</h3><div class="r"><b>'+money(subs.reduce((s,x)=>s+x.amount,0),0)+'/mo</b></div></div><div class="feed">'+
    subs.map(s=>frow('t','repeat','<b>'+esc(s.merchant)+'</b>','last charged '+fmtDate(s.last),money2(s.amount))).join('')+'</div>'+
    '<div class="tiny muted mt12">Detected automatically from recurring merchant charges — '+money(subs.reduce((s,x)=>s+x.amount,0)*12,0)+' a year.</div></div>'+
  '<div class="card mt16"><div class="card-h"><h3>Recurring</h3><div class="r"><button class="btn primary sm" onclick="RecurView.add()">'+ic('plus')+'Add</button></div></div>'+
    '<div class="feed">'+(State.d.recurrences.length?State.d.recurrences.slice().sort((a,b)=>String(a.nextDate).localeCompare(String(b.nextDate))).map(r=>
      '<div class="fi"><div class="fd" style="'+tintPair(r.active?'t':'n')+'">'+ic('repeat')+'</div>'+
      '<div class="fb"><div class="ft"><b>'+esc(r.desc)+'</b> <span class="badge '+(r.active?'g':'n')+' dot" style="margin-left:4px">'+(r.active?'active':'paused')+'</span></div>'+
      '<div class="fm">'+esc(r.freq)+' · next '+fmtDate(r.nextDate)+' · '+esc(acctName(r.accountId))+'</div></div>'+
      '<div class="fv"><span class="'+(r.amount>=0?'pos':'')+'">'+(r.amount>=0?'+':'')+money2(r.amount)+'</span></div>'+
      '<button class="btn ghost sm" onclick="RecurView.toggle(\''+r.id+'\')">'+(r.active?'Pause':'Resume')+'</button>'+
      '<button class="ibtn" onclick="RecurView.edit(\''+r.id+'\')" title="Edit" aria-label="Edit '+esc(r.desc)+' schedule">'+ic('edit')+'</button>'+
      '<button class="ibtn" onclick="RecurView.del(\''+r.id+'\')" title="Delete" aria-label="Delete '+esc(r.desc)+' schedule">'+ic('trash')+'</button></div>').join(''):
      '<div class="empty"><div class="e-ic">'+ic('repeat')+'</div><h4>No recurring transactions</h4><p>Schedule rent, salary or subscriptions once — they post themselves on time, always with a visible alert.</p><button class="btn primary" onclick="RecurView.add()">'+ic('plus')+'Set up the first one</button></div>')+'</div>'+
    (State.d.recurrences.length?'<div class="tiny muted mt12">Due items post automatically when the app opens (up to 24 catch-up postings each). Pausing stops future postings; deleting never removes what was already posted.</div>':'')+'</div>'+
  '<div class="card mt16"><div class="card-h"><h3>This month by category</h3></div>'+
    Chart.hbars(Object.entries(Calc.spendByCat(0)).sort((a,b)=>b[1]-a[1]).slice(0,7).map((e,i)=>({label:e[0],value:e[1],color:PALETTE[i%PALETTE.length]})))+'</div></div></div>';
};

/* ============================================================
   BUDGETS (Volume 8)
   ============================================================ */
const BudView={
  edit(id){
    const b=State.d.budgets.find(x=>x.id===id)||{};
    Modal.form(id?'Edit budget':'Add budget category',[
      {k:'category',label:'Category',type:'select',value:b.category||'Other',options:CATS.filter(c=>c!=='Income')},
      {k:'group',label:'Group (50/30/20)',type:'select',value:b.group||'needs',options:[['needs','Needs'],['wants','Wants'],['savings','Savings & debt']]},
      {k:'limit',label:'Monthly limit',type:'number',value:b.limit==null?'':b.limit}
    ],v=>{
      if(id){Object.assign(b,v)}else{State.d.budgets.push({id:uid(),...v})}
      State.save();renderRoute();toast('Budget saved');
    });
  },
  del(id){State.d.budgets=State.d.budgets.filter(x=>x.id!==id);State.save();renderRoute()},
  setSystem(s){State.d.settings.budgetSystem=s;State.save();renderRoute()}
};
Views.budgets=function(id){
  const spend=Calc.spendByCat(0);
  const income=Calc.avgMonthlyIncome();
  const sys=State.d.settings.budgetSystem;
  const groups=[['needs','Needs',.5],['wants','Wants',.3],['savings','Savings & debt',.2]];
  const groupSpend=g=>State.d.budgets.filter(b=>b.group===g).reduce((s,b)=>s+(g==='savings'?b.limit:(spend[b.category]||0)),0);
  const health=Math.round(Calc.budgetAdherence());
  return head(id,{title:'Budgets',sub:'Category limits with live tracking — switch between 50/30/20, zero-based and envelope systems.',
    actions:'<div class="seg">'+['50/30/20','Zero-based','Envelope'].map(s=>'<button class="'+(sys===s?'on':'')+'" onclick="BudView.setSystem(\''+s+'\')">'+s+'</button>').join('')+'</div>'+
      '<button class="btn primary" onclick="BudView.edit(null)">'+ic('plus')+'Add category</button>'})+
  '<div class="grid g3 mb16">'+
    groups.map(([g,label,frac])=>{
      const target=income*frac,actual=groupSpend(g);
      const p=Math.round(actual/Math.max(1,target)*100);
      return '<div class="kpi"><div class="k-lab">'+label+' · target '+Math.round(frac*100)+'%</div><div class="k-val">'+money(actual)+'</div>'+
      '<div class="k-sub">of '+money(target)+' ('+p+'%)</div><div class="meter mt8"><span class="'+(p>100?'r':p>85?'a':'')+'" style="width:'+clamp(p,2,100)+'%"></span></div></div>';
    }).join('')+'</div>'+
  '<div class="grid g-side" style="align-items:start">'+
  '<div class="card"><div class="card-h"><h3>Category budgets — '+new Date().toLocaleDateString('en-AU',{month:'long'})+'</h3><div class="r"><span class="badge '+(health>=80?'g':health>=60?'a':'r')+' dot">'+health+'% on track</span></div></div>'+
    State.d.budgets.map(b=>{
      const s=b.group==='savings'?b.limit:(spend[b.category]||0);
      const p=Math.round(s/Math.max(1,b.limit)*100);
      return '<div class="mt12"><div class="spread" style="font-size:13px"><span style="font-weight:700">'+esc(b.category)+' <span class="badge n" style="margin-left:4px">'+b.group+'</span></span>'+
      '<span style="display:inline-flex;align-items:center;gap:2px"><span class="muted">'+money(s)+' / '+money(b.limit)+'</span>'+
      '<button class="ibtn" onclick="BudView.edit(\''+b.id+'\')" title="Edit" aria-label="Edit '+esc(b.category)+' budget">'+ic('edit')+'</button>'+
      '<button class="ibtn" onclick="BudView.del(\''+b.id+'\')" title="Delete" aria-label="Delete '+esc(b.category)+' budget">'+ic('trash')+'</button></span></div>'+
      '<div class="meter" style="margin-top:5px"><span class="'+(p>100?'r':p>85?'a':'')+'" style="width:'+clamp(p,2,100)+'%"></span></div>'+
      (p>100?'<div class="tiny" style="color:var(--red);margin-top:3px">Over by '+money(s-b.limit)+'</div>':'')+'</div>';
    }).join('')+'</div>'+
  '<div><div class="card"><div class="card-h"><h3>Budget maths</h3></div>'+
    '<div class="dl"><span class="k">Monthly income</span><span class="v pos">'+money(income)+'</span></div>'+
    '<div class="dl"><span class="k">Budgeted spending</span><span class="v">'+money(State.d.budgets.filter(b=>b.group!=='savings').reduce((s,b)=>s+b.limit,0))+'</span></div>'+
    '<div class="dl"><span class="k">Debt + savings plan</span><span class="v">'+money(State.d.budgets.filter(b=>b.group==='savings').reduce((s,b)=>s+b.limit,0))+'</span></div>'+
    '<div class="dl"><span class="k">Unallocated</span><span class="v '+(income-State.d.budgets.reduce((s,b)=>s+b.limit,0)>=0?'pos':'neg')+'">'+money(income-State.d.budgets.reduce((s,b)=>s+b.limit,0))+'</span></div></div>'+
  '<div class="card mt16"><div class="card-h"><h3>System notes</h3><span class="badge b dot">'+esc(sys)+'</span></div><div class="muted" style="font-size:12.5px;line-height:1.6">'+
    (sys==='50/30/20'?'Needs should stay near 50% of income, wants near 30%, and savings plus debt payoff near 20%. The group badge on each category shows where it counts.':
     sys==='Zero-based'?'Give every dollar a job: adjust category limits until Unallocated reads $0. Anything left over gets assigned to debt or a goal.':
     'Treat each category as a cash envelope: when the bar hits 100% the envelope is empty — stop spending or move budget from another envelope.')+
  '</div></div></div></div>';
};
</script>
<script>
/* ============================================================
   CASH FLOW (Volume 9)
   ============================================================ */
const FlowView={
  scenario:{income:0,expenses:0,oneOff:0,oneOffMonth:3},
  setS(k,v){this.scenario[k]=Number(v)||0;renderRoute()}
};
/* Bills manager — drives Calc.monthlyBills(), Calc.upcomingBills() and the
   dashboard "Upcoming bills" card */
const BillView={
  add(){this.edit(null)},
  edit(id){
    const b=State.d.bills.find(x=>x.id===id)||{};
    Modal.form(id?'Edit bill':'Add bill',[
      {k:'name',label:'Bill name',value:b.name||''},
      {k:'amount',label:'Amount per payment',type:'number',step:'0.01',value:b.amount==null?'':b.amount},
      {k:'freq',label:'Frequency',type:'select',value:b.freq||'monthly',options:[['weekly','Weekly'],['fortnightly','Fortnightly'],['monthly','Monthly'],['quarterly','Quarterly'],['yearly','Yearly']]},
      {k:'nextDue',label:'Next due date',type:'date',value:b.nextDue||today()},
      {k:'autopay',label:'Paid automatically (autopay / direct debit)',type:'checkbox',value:!!b.autopay}
    ],v=>{
      if(!v.name)return toast('Name is required');
      if(!(v.amount>0))return toast('Amount must be greater than zero');
      if(!v.nextDue)v.nextDue=today();
      if(id){Object.assign(b,v)}else{State.d.bills.push({id:uid(),...v})}
      State.save();renderRoute();toast('Bill saved');
    });
  },
  del(id){Modal.confirm('Delete this bill? It disappears from upcoming bills and committed spending.',()=>{State.d.bills=State.d.bills.filter(x=>x.id!==id);State.save();renderRoute();toast('Bill deleted')})},
  /* Mark paid — posts a real negative transaction via the shared create path
     and advances nextDue one period. The account and category chosen are
     remembered per bill for next time. */
  pay(id){
    const b=State.d.bills.find(x=>x.id===id);if(!b)return;
    if(!State.d.accounts.length){
      Modal.open('Add an account first','<p class="muted" style="font-size:13px;margin:0;line-height:1.6">Marking a bill paid records a real transaction against an account. Add your first bank account, card or wallet, then come back.</p>',
        '<button class="btn" onclick="Modal.close()">Not now</button><button class="btn primary" onclick="Modal.close();go(\'accounts\')">Go to Accounts</button>');
      return;
    }
    Modal.form('Mark "'+b.name+'" as paid',[
      {k:'date',label:'Payment date',type:'date',value:today()},
      {k:'amount',label:'Amount paid',type:'number',step:'0.01',value:b.amount},
      {k:'category',label:'Category',type:'select',value:b.lastCategory||'Utilities',options:CATS.filter(c=>c!=='Income')},
      {k:'accountId',label:'Paid from account',type:'select',value:b.lastAccountId||(State.d.accounts[0]?State.d.accounts[0].id:''),options:State.d.accounts.map(a=>[a.id,a.name])}
    ],v=>{
      if(!(v.amount>0))return toast('Amount must be greater than zero');
      postTransaction({date:v.date||today(),desc:b.name,merchant:b.name,category:v.category,amount:-r2(Math.abs(v.amount)),accountId:v.accountId,recurring:true});
      b.lastAccountId=v.accountId;b.lastCategory=v.category;
      b.nextDue=addFreq(b.nextDue||today(),b.freq);
      State.save();renderRoute();toast(b.name+' paid — next due '+fmtDate(b.nextDue));
    });
  }
};
Views.cashflow=function(id){
  const inc=Calc.avgMonthlyIncome(),exp=Calc.avgMonthlyExpenses();
  const base=Calc.forecast();
  const sc=FlowView.scenario;
  const hasScenario=sc.income||sc.expenses||sc.oneOff;
  const scen=hasScenario?Calc.forecast(sc):null;
  const months=[...Array(6)].map((_,i)=>5-i);
  const histIn=months.map(m=>Calc.monthIncome(m));
  const histOut=months.map(m=>Calc.monthSpend(m));
  const runway=Calc.runwayMonths();
  return head(id,{title:'Cash Flow',sub:'Where the money goes, how long it lasts, and what the next 12 months look like — with a live scenario simulator.'})+
  '<div class="grid g-kpi mb16">'+
    kpi('Avg monthly income',money(inc),'based on recent months','color:var(--emerald)')+
    kpi('Avg monthly spending',money(exp),'excludes savings transfers')+
    kpi('Safe to spend',money(Calc.safeToSpend()),'left for discretionary this month')+
    kpi('Cash runway',runway.toFixed(1)+' mo','if all income stopped today','color:'+(runway>=3?'var(--emerald)':runway>=1.5?'var(--amber)':'var(--red)'))+
  '</div>'+
  '<div class="grid g2 mb16" style="align-items:start">'+
    '<div class="card"><div class="card-h"><h3>12-month projection</h3>'+(hasScenario?'<span class="badge a dot">scenario active</span>':'<span class="badge g dot">baseline</span>')+'</div>'+
      Chart.line(scen||base,{color:hasScenario?'#B87503':'#2CD5C4',h:170})+
      '<div class="dl mt8"><span class="k">Now</span><span class="v">'+money((scen||base)[0])+'</span></div>'+
      '<div class="dl"><span class="k">Month 12</span><span class="v '+((scen||base)[12]>=0?'pos':'neg')+'">'+money((scen||base)[12])+'</span></div>'+
      (hasScenario?'<div class="dl"><span class="k">vs baseline</span><span class="v '+((scen[12]-base[12])>=0?'pos':'neg')+'">'+money(scen[12]-base[12])+'</span></div>':'')+'</div>'+
    '<div class="card"><div class="card-h"><h3>Scenario simulator</h3><div class="r"><button class="btn ghost sm" onclick="FlowView.scenario={income:0,expenses:0,oneOff:0,oneOffMonth:3};renderRoute()">Reset</button></div></div>'+
      '<div class="field"><label>Income change per month — <b>'+money(sc.income)+'</b></label><input type="range" class="inp" min="-1500" max="1500" step="50" value="'+sc.income+'" oninput="FlowView.setS(\'income\',this.value)"></div>'+
      '<div class="field"><label>Spending change per month — <b>'+money(sc.expenses)+'</b></label><input type="range" class="inp" min="-1500" max="1500" step="50" value="'+sc.expenses+'" oninput="FlowView.setS(\'expenses\',this.value)"></div>'+

      '<button class="ibtn" aria-label="Edit '+esc(b.name)+'" title="Edit" onclick="BillView.edit(\''+b.id+'\')">'+ic('edit')+'</button>'+

      '<div class="empty"><div class="e-ic">'+ic('cal')+'</div><h4>No bills yet</h4><p>Add recurring bills — rent, power, insurance, subscriptions — to power the upcoming-bills radar and committed-spending maths.</p><button class="btn primary" onclick="BillView.add()">'+ic('plus')+'Add your first bill</button></div>')+
    '</div>'+(State.d.bills.length?'<div class="tiny muted mt12">The tick marks a bill paid: it records the transaction and rolls the due date forward. Autopay bills roll forward by themselves once the date passes — your bank makes that payment, so no transaction is added here.</div>':'')+'</div>'+

    [['Income stops',0,'How long cash lasts with zero income'],['Income halves',inc/2,'Runway if you lose half your income'],['Spending +20%',null,'Buffer if costs jump 20%']].map(([t,newInc,cap],i)=>{
      const e=i===2?Calc.essentialMonthly()*1.2:Calc.essentialMonthly();
      const net=i===2?inc-e:(newInc-e);

const SavView={
  addGoal(){this.editGoal(null)},
  editGoal(id){
    const g=State.d.goals.find(x=>x.id===id)||{};
    Modal.form(id?'Edit goal':'New savings goal',[
      {k:'name',label:'Goal name',value:g.name||''},
      {k:'category',label:'Category',type:'select',value:g.category||'Lifestyle',options:['Security','Lifestyle','Major Purchase','Family','Education','Other']},
      {k:'target',label:'Target amount',type:'number',value:g.target==null?'':g.target},
      {k:'saved',label:'Saved so far',type:'number',value:g.saved==null?0:g.saved},
      {k:'deadline',label:'Deadline',type:'date',value:g.deadline||''},
      {k:'priority',label:'Priority (1 = highest)',type:'number',value:g.priority||3},
      {k:'note',label:'Why it matters',type:'textarea',value:g.note||''}
    ],v=>{
      if(!v.name||!v.target)return toast('Name and target required');
      if(id){Object.assign(g,v)}else{State.d.goals.push({id:uid(),...v})}
      State.save();renderRoute();toast('Goal saved');

      g.saved=Math.max(0,(g.saved||0)+v.amt);State.save();renderRoute();toast(money(v.amt)+' added to '+g.name);

  }
};
Views.savings=function(id){
  const goals=State.d.goals.filter(g=>!g.linked).sort((a,b)=>a.priority-b.priority);
  const efTarget=Calc.essentialMonthly()*State.d.settings.emergencyMonths;
  const efPct=Math.round(Calc.savingsTotal()/Math.max(1,efTarget)*100);
  return head(id,{title:'Savings & Goals',sub:'Savings rate this month: <b>'+pct(Calc.savingsRate())+'</b> · planned transfers <b>'+money(Calc.plannedSavings())+'/month</b>. Each goal forecasts its own arrival date.',
    actions:'<button class="btn primary" onclick="SavView.addGoal()">'+ic('plus')+'New goal</button>'})+
  '<div class="card mb16"><div class="card-h"><h3>Emergency fund</h3><div class="r"><span class="badge '+(efPct>=100?'g':efPct>=50?'a':'r')+' dot">'+efPct+'% funded</span></div></div>'+
    '<div class="spread" style="font-size:13px;flex-wrap:wrap"><span>You hold <b>'+money(Calc.savingsTotal())+'</b> in savings accounts.</span><span class="muted">'+State.d.settings.emergencyMonths+'-month target: <b>'+money(efTarget)+'</b></span></div>'+
    '<div class="meter mt8"><span style="width:'+clamp(efPct,2,100)+'%"></span></div>'+
    '<div class="tiny muted mt8">The target is '+State.d.settings.emergencyMonths+' months of essential costs (bills, groceries, minimum repayments = '+money(Calc.essentialMonthly())+'/month). Change the months in Settings.</div></div>'+
  (goals.length?'':'<div class="card"><div class="empty"><div class="e-ic">'+ic('goal')+'</div><h4>No goals yet</h4><p>Set a target — an emergency fund, a holiday, a deposit — and the app forecasts when you&#39;ll get there.</p><button class="btn primary" onclick="SavView.addGoal()">'+ic('plus')+'Create your first goal</button></div></div>')+
  '<div class="grid g2">'+goals.map(g=>{
    const p=clamp(g.saved/g.target*100,0,100);
    const f=Calc.goalForecast(g);
    return '<div class="card"><div class="card-h"><h3>'+esc(g.name)+'</h3><div class="r"><span class="badge n">P'+(g.priority||3)+' · '+esc(g.category)+'</span></div></div>'+
    '<div style="font-size:22px;font-weight:800;letter-spacing:-.5px">'+money(g.saved)+' <span class="muted" style="font-size:13px;font-weight:600">of '+money(g.target)+'</span></div>'+
    '<div class="meter mt8"><span style="width:'+clamp(p,2,100)+'%"></span></div>'+
    '<div class="tiny muted mt8">'+(f.done?'Fully funded — well done.':'At ~'+money(f.monthly,0)+'/month this lands around <b>'+fmtDate(f.eta)+'</b>'+(g.deadline?' (deadline '+fmtDate(g.deadline)+') — '+(f.onTrack?'<b class="pos">on track</b>':'<b class="neg">behind</b>'):''))+'</div>'+
    (g.note?'<div class="muted mt8" style="font-size:12.5px">'+esc(g.note)+'</div>':'')+
    '<div class="mt12" style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn teal sm" onclick="SavView.contribute(\''+g.id+'\')">'+ic('plus')+'Contribute</button>'+
    '<button class="btn sm" onclick="SavView.editGoal(\''+g.id+'\')">Edit</button>'+
    '<button class="btn ghost sm" onclick="SavView.delGoal(\''+g.id+'\')">Delete</button></div></div>';
  }).join('')+'</div>';
};

const DebtView={
