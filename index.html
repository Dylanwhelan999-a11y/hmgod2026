<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Finance OS — Personal Financial Operating System</title>
<meta name="theme-color" content="#071B4D">
<meta name="description" content="Finance OS — run your whole money life from one calm, enterprise-grade operating system.">
<style>
/* ============================================================
   FINANCE OS — visual design system shared with BOSS
   Trust · Clarity · Precision · Calm · Professionalism
   ============================================================ */
:root{
  /* Brand */
  --navy:#071B4D; --navy2:#0D2C73; --navy3:#0A1F45;
  --teal:#2CD5C4; --emerald:#0A7A43; --emerald-soft:#e6f5ee;
  --amber:#B87503; --amber-soft:#fdf3dd;
  --red:#B3271E; --red-soft:#fbe7e5;
  --violet:#5b63d3; --sky:#2f6fed; --sky-soft:#e9f0fe;
  /* Neutrals */
  --ink:#141a24; --ink2:#28324a; --muted:#5b6576; --faint:#8a9bb5;
  --line:#e9edf3; --line2:#eef1f6; --bg:#f6f8fb; --surface:#ffffff; --surface2:#fbfcfe;
  /* Radii */
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px; --r-pill:999px;
  /* Elevation */
  --sh-1:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.05);
  --sh-2:0 1px 2px rgba(7,27,77,.04),0 8px 20px -12px rgba(7,27,77,.16);
  --sh-3:0 1px 2px rgba(7,27,77,.05),0 18px 44px -22px rgba(7,27,77,.32);
  --sh-pop:0 12px 32px -8px rgba(7,27,77,.28),0 2px 8px rgba(7,27,77,.12);
  /* Motion */
  --ease:cubic-bezier(.2,.6,.2,1); --dur:.18s;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;
  line-height:1.5;font-size:14px;overflow:hidden;
}
*{-webkit-tap-highlight-color:transparent}
::selection{background:rgba(44,213,196,.28);color:var(--navy)}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cdd5e0;border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#b3bfd0}

/* ---------- App frame: sidebar (the whole OS in one rail) + topbar ---------- */
.app{height:100vh;height:100dvh;display:flex}
.main{display:flex;flex-direction:column;overflow:hidden;min-width:0;height:100%;flex:1}
/* Sidebar — the original module rail, BOSS-toned */
.sidebar{width:252px;background:var(--navy3);color:#EAF1FF;display:flex;flex-direction:column;flex:none;height:100%;z-index:60}
.brand{display:flex;align-items:center;gap:11px;padding:18px 18px 15px;border-bottom:1px solid rgba(255,255,255,.08);cursor:pointer}
.brand-mark{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,var(--teal),#0A7A43);display:grid;place-items:center;flex:none;color:#052047}
.brand-mark .icn{width:19px;height:19px}
.brand-name{font-weight:800;font-size:16px;letter-spacing:-.02em;color:#fff;line-height:1.2}
.brand-sub{font-size:10px;color:#8fa3c8;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.snav{flex:1;overflow-y:auto;padding:10px 10px 20px}
.snav::-webkit-scrollbar{width:4px}
.snav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border:none}
.snav .grp{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#8fa3c8;padding:14px 10px 6px}
.snav a{display:flex;align-items:center;gap:11px;padding:9px 10px;color:#b9c6dc;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;transition:background var(--dur),color var(--dur)}
.snav a .icn{width:17px;height:17px}
.snav a:hover{background:rgba(255,255,255,.06);color:#fff}
.snav a.on{background:rgba(255,255,255,.09);color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.1)}
.snav a.on .icn{color:var(--teal)}
.snav .nbadge{margin-left:auto;background:#e0492f;color:#fff;font-size:10px;font-weight:800;border-radius:999px;padding:1px 7px;min-width:18px;text-align:center}
.sb-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#8fa3c8;line-height:1.5}
.sb-out{display:flex;align-items:center;gap:9px;padding:8px 10px;margin:0 -10px;border-radius:10px;color:#b9c6dc;font-size:13px;font-weight:700;cursor:pointer;transition:background var(--dur),color var(--dur)}
.sb-out .icn{width:15px;height:15px;transform:rotate(180deg)}
.sb-out:hover{background:rgba(255,255,255,.08);color:#fff}
.launcher-mode .sidebar{display:none}
.burger{display:none;width:38px;height:38px;border-radius:10px;border:none;background:transparent;color:var(--muted);cursor:pointer;place-items:center;flex:none}
.burger:hover{background:var(--line2);color:var(--ink)}
.burger .icn{width:18px;height:18px}
.sb-scrim{position:fixed;inset:0;background:rgba(7,20,45,.45);z-index:55;display:none}
@media(max-width:820px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .25s var(--ease);box-shadow:var(--sh-pop)}
  .sidebar.open{transform:none}
  .sb-scrim.show{display:block}
  .burger{display:grid}
  .launcher-mode .burger{display:none}
}
.topbar{height:60px;background:rgba(255,255,255,.82);backdrop-filter:saturate(1.4) blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 22px;flex:none;z-index:20}
.crumbs{font-size:12.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px;min-width:0}
.crumbs b{color:var(--ink);font-weight:800}
.crumbs .sep{color:var(--faint)}
.search{margin-left:auto;display:flex;align-items:center;gap:9px;background:#f1f4f8;border:1px solid transparent;border-radius:999px;padding:8px 15px;width:280px;cursor:text;transition:border var(--dur),background var(--dur)}
.search:hover{border-color:#dfe6ee;background:#eef2f7}
.search .mag{color:var(--faint);display:flex}
.search .mag .icn{width:15px;height:15px}
.search .ph{color:var(--faint);font-size:13px;flex:1}
.search .kbd{font-size:10.5px;font-weight:700;color:var(--muted);background:#fff;border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:1px 6px}
.tico{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--muted);cursor:pointer;position:relative;transition:background var(--dur),color var(--dur);flex:none}
.tico:hover{background:var(--line2);color:var(--ink)}
.tico .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid #fff}
.tico .icn{width:18px;height:18px}
.tuser{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--navy2),var(--navy));color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px;cursor:pointer;flex:none}
/* Category tab strip */
.modtabs{display:flex;gap:2px;align-items:center;padding:0 22px;background:rgba(255,255,255,.85);backdrop-filter:saturate(1.4) blur(10px);border-bottom:1px solid var(--line);overflow-x:auto;flex:none;min-height:46px;scrollbar-width:none}
.modtabs::-webkit-scrollbar{display:none}
.modtabs:empty{display:none}
.modtabs .grplab{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);font-weight:800;margin-right:14px;white-space:nowrap;flex:none}
.modtabs a{display:inline-flex;align-items:center;gap:7px;padding:0 14px;height:46px;font-size:13px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color var(--dur)}
.modtabs a:hover{color:var(--ink)}
.modtabs a.on{color:var(--navy);border-bottom-color:var(--teal)}
.modtabs .cnt{font-size:10.5px;background:var(--line2);color:var(--muted);padding:1px 7px;border-radius:999px;font-weight:800}
.modtabs a.on .cnt{background:rgba(44,213,196,.16);color:var(--navy)}
.content{flex:1;overflow-y:auto;padding:30px 36px 70px}
.content>.inner{max-width:1180px;margin:0 auto;width:100%}

/* ---------- Reusable components ---------- */
.page-head{display:flex;align-items:flex-end;gap:16px;margin-bottom:26px;flex-wrap:wrap}
.page-head h1{font-size:25px;font-weight:800;letter-spacing:-.5px;margin:2px 0 0}
.page-head .sub{color:var(--muted);font-size:13.5px;margin-top:5px;max-width:640px;line-height:1.55}
.page-head .ph-actions{margin-left:auto;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:var(--teal)}

.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--surface);color:var(--ink2);font-size:13px;font-weight:700;padding:9px 15px;border-radius:10px;cursor:pointer;transition:all var(--dur);white-space:nowrap;line-height:1}
.btn .icn{width:14px;height:14px}
.btn:hover{border-color:#d0d9e6;background:var(--surface2);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}
.btn.primary:hover{background:#0a2564;box-shadow:0 8px 20px -8px rgba(7,27,77,.5)}
.btn.teal{background:var(--teal);border-color:var(--teal);color:var(--navy)}
.btn.teal:hover{filter:brightness(1.03)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{background:var(--line2);color:var(--ink)}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:8px}
.btn.danger{color:var(--red);border-color:#f0d6d3}
.btn.danger:hover{background:var(--red-soft)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ibtn{width:30px;height:30px;border-radius:8px;border:none;background:transparent;color:var(--faint);cursor:pointer;display:inline-grid;place-items:center;transition:background var(--dur),color var(--dur);vertical-align:middle}
.ibtn:hover{background:var(--line2);color:var(--ink)}
.ibtn .icn{width:15px;height:15px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh-1);padding:22px}
.card.pad0{padding:0;overflow:hidden}
.card-h{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.card-h h3{font-size:14.5px;font-weight:800;margin:0}
.card-h .sub{font-size:12px;color:var(--muted)}
.card-h .r{margin-left:auto;display:flex;gap:6px;align-items:center}

.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.g-kpi{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
.g-wide{grid-template-columns:1.6fr 1fr}
.g-side{grid-template-columns:2fr 1fr}

/* KPI stat — calm: label / value / caption, no chrome */
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px 22px;box-shadow:var(--sh-1)}
.kpi .k-lab{font-size:11px;font-weight:800;letter-spacing:1.1px;text-transform:uppercase;color:var(--faint);margin-bottom:10px}
.kpi .k-val{font-size:28px;font-weight:800;letter-spacing:-.7px;line-height:1;color:var(--ink)}
.kpi .k-sub{font-size:12px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.trend{font-size:12px;font-weight:700;display:inline-flex;gap:3px;align-items:center}
.trend.g{color:var(--emerald)}
.trend.r{color:var(--red)}
.icn{width:16px;height:16px;flex:none;display:block}
.pos{color:var(--emerald)}.neg{color:var(--red)}.warn{color:var(--amber)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;letter-spacing:.2px}
.badge.g{color:var(--emerald);background:var(--emerald-soft)}
.badge.a{color:var(--amber);background:var(--amber-soft)}
.badge.r{color:var(--red);background:var(--red-soft)}
.badge.b{color:var(--sky);background:var(--sky-soft)}
.badge.n{color:var(--muted);background:var(--line2)}
.badge.dot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--faint);font-weight:800;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--surface2);position:sticky;top:0}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--line2);vertical-align:middle}
.tbl tbody tr{transition:background var(--dur)}
.tbl tbody tr:hover{background:var(--surface2)}
.tbl tr:last-child td{border-bottom:none}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
.t-wrap{overflow-x:auto;border-radius:var(--r-lg);border:1px solid var(--line);background:var(--surface)}
.t-main{font-weight:700;color:var(--ink)}
.t-sub{font-size:11.5px;color:var(--muted)}

/* Forms */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.inp,select.inp,textarea.inp{width:100%;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:10px 12px;font-size:13.5px;font-family:inherit;color:var(--ink);transition:border var(--dur),box-shadow var(--dur)}
.inp:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(44,213,196,.16)}
textarea.inp{resize:vertical;min-height:76px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
input[type=range].inp{padding:0;border:none;box-shadow:none;accent-color:var(--navy2);height:30px}

/* Progress / meters */
.meter{height:8px;border-radius:999px;background:var(--line2);overflow:hidden}
.meter>span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal),#18a08f)}
.meter>span.a{background:linear-gradient(90deg,#f0b040,var(--amber))}
.meter>span.r{background:linear-gradient(90deg,#e0492f,var(--red))}
.meter>span.navy{background:linear-gradient(90deg,var(--navy2),var(--navy))}

/* Empty state */
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty .e-ic{width:60px;height:60px;border-radius:16px;background:var(--line2);display:grid;place-items:center;margin:0 auto 14px;color:var(--faint)}
.empty .e-ic .icn{width:24px;height:24px}
.empty h4{font-size:15px;color:var(--ink);margin:0 0 5px;font-weight:800}
.empty p{font-size:13px;max-width:340px;margin:0 auto 16px}

/* Segmented */
.seg{display:inline-flex;background:var(--line2);border-radius:10px;padding:3px;gap:2px}
.seg button{border:none;background:transparent;font-size:12.5px;font-weight:700;color:var(--muted);padding:6px 13px;border-radius:8px;cursor:pointer;transition:all var(--dur)}
.seg button.on{background:var(--surface);color:var(--navy);box-shadow:var(--sh-1)}

/* Activity feed / list rows */
.feed{display:flex;flex-direction:column;gap:2px}
.feed .fi{display:flex;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line2);align-items:center}
.feed .fi:last-child{border:none}
.feed .fd{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:none}
.feed .fd .icn{width:15px;height:15px}
.feed .fb{flex:1;min-width:0}
.feed .ft{font-size:13px;font-weight:600}
.feed .ft b{font-weight:800}
.feed .fm{font-size:11.5px;color:var(--faint);margin-top:2px}
.feed .fv{font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;font-size:13px}
.dl{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line2);font-size:13px}
.dl:last-child{border:none}
.dl .k{color:var(--muted)}
.dl .v{font-weight:700;font-variant-numeric:tabular-nums}

/* Modal */
.scrim{position:fixed;inset:0;background:rgba(7,20,45,.44);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:200;opacity:0;pointer-events:none;transition:opacity var(--dur)}
.scrim.on{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:var(--r-xl);box-shadow:var(--sh-pop);width:100%;max-width:520px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(10px) scale(.98);transition:transform var(--dur) var(--ease)}
.scrim.on .modal{transform:none}
.modal-h{padding:20px 22px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.modal-h h3{font-size:16px;font-weight:800;margin:0}
.modal-h .x{margin-left:auto;width:32px;height:32px;border-radius:8px;border:none;background:var(--line2);color:var(--muted);cursor:pointer;display:grid;place-items:center}
.modal-h .x:hover{background:var(--line);color:var(--ink)}
.modal-h .x .icn{width:15px;height:15px}
.modal-b{padding:20px 22px;overflow-y:auto}
.modal-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--surface2)}

/* Command palette */
.cmdk{position:fixed;inset:0;background:rgba(7,20,45,.4);backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;padding-top:12vh;z-index:300;opacity:0;pointer-events:none;transition:opacity var(--dur)}
.cmdk.on{opacity:1;pointer-events:auto}
.cmdbox{background:var(--surface);width:100%;max-width:580px;border-radius:16px;box-shadow:var(--sh-pop);overflow:hidden;transform:translateY(-8px);transition:transform var(--dur)}
.cmdk.on .cmdbox{transform:none}
.cmdbox input{width:100%;border:none;padding:18px 20px;font-size:16px;font-family:inherit;outline:none;border-bottom:1px solid var(--line)}
.cmdlist{max-height:52vh;overflow-y:auto;padding:8px}
.cmdlist .ci{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;cursor:pointer;font-size:13.5px}
.cmdlist .ci:hover,.cmdlist .ci.on{background:var(--sky-soft)}
.cmdlist .ci .cic{width:30px;height:30px;border-radius:8px;background:var(--line2);display:grid;place-items:center;flex:none}
.cmdlist .ci .cic .icn{width:15px;height:15px;color:var(--muted)}
.cmdlist .ci .cg{margin-left:auto;font-size:11px;color:var(--faint);white-space:nowrap}

/* Toast */
.toasts{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:10px;z-index:400}
.toast{background:var(--navy);color:#fff;padding:13px 16px;border-radius:12px;box-shadow:var(--sh-pop);font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;max-width:340px;animation:slideup .3s var(--ease)}
.toast .ti{width:22px;height:22px;border-radius:6px;background:var(--teal);color:var(--navy);display:grid;place-items:center;flex:none}
.toast .ti .icn{width:13px;height:13px}
@keyframes slideup{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}

/* Bars mini chart */
.bars{display:flex;align-items:flex-end;gap:6px;height:120px}
.bars .bar{flex:1;background:linear-gradient(180deg,var(--teal),var(--navy2));border-radius:6px 6px 3px 3px;min-height:4px;position:relative;transition:opacity var(--dur)}
.bars .bar:hover{opacity:.8}
.bars .bar span{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:10px;color:var(--faint);font-weight:700}
.muted{color:var(--muted)}
.tiny{font-size:11.5px}
.hl{color:var(--navy);font-weight:800}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mb16{margin-bottom:16px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:10px}

/* Score ring */
.ring-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.ring{position:relative;width:110px;height:110px;flex:none}
.ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .num b{font-size:27px;font-weight:800;letter-spacing:-.7px}
.ring .num span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:800}

/* Launcher (home) — full-bleed landing, no OS chrome */
.launcher-mode .topbar,.launcher-mode .modtabs{display:none}
.launcher-mode .content{padding:0}
.lhero{background:linear-gradient(160deg,#0D2C73,#071B4D 70%);color:#fff;padding:64px 24px 132px;text-align:center;position:relative;overflow:hidden}
.lhero::after{content:"";position:absolute;left:-10%;right:-10%;bottom:-1px;height:92px;background:var(--bg);border-radius:60% 60% 0 0/100% 100% 0 0}
.lbadge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal);background:rgba(44,213,196,.12);padding:7px 16px;border-radius:999px}
.lhero h1{font-size:clamp(28px,5vw,38px);font-weight:800;letter-spacing:-.6px;margin:20px auto 10px;max-width:620px;line-height:1.15}
.lhero p{font-size:15.5px;color:#b9c6dc;max-width:520px;margin:0 auto;line-height:1.55}
.lwrap{max-width:980px;margin:-78px auto 0;padding:0 20px 60px;position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.lcard{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:var(--sh-3);display:flex;align-items:flex-start;gap:17px;cursor:pointer;transition:transform .2s var(--ease),box-shadow .2s var(--ease)}
.lcard:hover{transform:translateY(-3px)}
.lic{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;color:#fff;flex:none;box-shadow:var(--sh-2);margin-top:2px}
.lic .icn{width:25px;height:25px}
.lbody{flex:1;min-width:0}
.leyebrow{font-size:11px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:var(--teal)}
.lbody h3{font-size:18px;font-weight:800;margin:3px 0 5px;color:var(--navy)}
.lbody p{font-size:13px;color:var(--muted);margin:0;line-height:1.5}
.lgo{flex:none;background:var(--navy);color:#fff;padding:11px 17px;border-radius:12px;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer}
.lcard:hover .lgo{background:#0a2564}
.lchips{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.lchip{font-size:12px;font-weight:700;padding:5px 12px;border:1px solid var(--line);border-radius:999px;color:var(--ink2);background:var(--surface);cursor:pointer;transition:all var(--dur);white-space:nowrap}
.lchip:hover{border-color:var(--navy2);color:var(--navy);background:var(--sky-soft)}
.lfoot{max-width:720px;margin:0 auto;padding:0 24px 48px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6}
/* Launcher account chip — identity + sign-out on the full-bleed home */
.lacct{position:fixed;top:14px;right:16px;z-index:50;display:flex;align-items:center;gap:9px;background:rgba(7,27,77,.55);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(8px);border-radius:999px;padding:5px 6px;color:#fff}
.lacct-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--teal),#0D2C73);display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff;flex:none;letter-spacing:.5px}
.lacct-name{font-size:12.5px;font-weight:700;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lacct-out{border:none;background:rgba(255,255,255,.14);color:#fff;font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:999px;cursor:pointer;font-family:inherit;transition:background var(--dur)}
.lacct-out:hover{background:rgba(255,255,255,.26)}
@media(max-width:560px){.lacct-name{display:none}}
.lacct-id{display:flex;align-items:center;gap:9px;cursor:pointer;border-radius:999px}
.lacct-menu{position:fixed;top:58px;right:16px;z-index:60;width:250px;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 50px rgba(11,31,58,.22);padding:8px;display:none}
.lacct-menu.open{display:block}
@media(max-width:840px){.lwrap{grid-template-columns:1fr;max-width:620px}}
@media(max-width:560px){
  .lhero{padding:48px 20px 118px}
  .lcard{gap:13px;padding:18px}
  .lic{width:48px;height:48px;border-radius:14px}
  .lic .icn{width:21px;height:21px}
  .lbody h3{font-size:16px}
  .lbody p{font-size:12px}
  .lgo{padding:10px 13px;font-size:12px;border-radius:11px}
}

/* Responsive */
@media(max-width:960px){
  .search{width:auto;flex:1;max-width:none}
  .search .ph{display:none}
  .g-wide,.g-side{grid-template-columns:1fr}
}
@media(max-width:620px){
  .content{padding:18px 15px 60px}
  .g2,.g3,.g4{grid-template-columns:1fr}

  .modtabs{padding:0 14px}
  .page-head h1{font-size:21px}
  .kpi .k-val{font-size:23px}
  /* stacked-card tables (HMGOD mobile pattern) */
  .t-wrap{border:0;background:transparent;overflow:visible}
  .tbl,.tbl tbody,.tbl tr,.tbl td{display:block;width:100%}
  .tbl thead{display:none}
  .tbl tr{background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;padding:4px 2px;box-shadow:var(--sh-1)}
  .tbl td{border-bottom:1px solid var(--line2);padding:9px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px;text-align:right}

  .tbl td::before{content:attr(data-l);font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--faint);text-align:left;flex:none}
  .tbl tbody tr:hover{background:var(--surface)}
}
@media print{.topbar,.modtabs{display:none}}

/* ---------- HMGOD engine compatibility (Hub + Solver ports) ---------- */
:root{--ink-2:#28324a;--brand:#00C48C;--healthy:#0A7A43;--healthy-soft:#e6f5ee;--watch:#B87503;--watch-soft:#fdf3dd;--urgent:#B3271E;--urgent-soft:#fbe7e5;--navy-600:#0D2C73;--shadow-lg:0 18px 44px -22px rgba(7,27,77,.32);--line-strong:#d8e0ec}
.flex{display:flex}.between{justify-content:space-between}.center{align-items:center}.wrap{flex-wrap:wrap}.gap{gap:12px}.gap-sm{gap:8px}
.bold{font-weight:700}.small{font-size:12.5px}
.card.pad-lg{padding:28px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
.card-head h3{font-size:16.5px;font-weight:800;letter-spacing:-.3px;margin:0}
.card-head .sub{font-size:12px;color:var(--muted)}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px}
.pill.up{background:var(--emerald-soft);color:#0a7a43}
.pill.down{background:var(--red-soft);color:#b3271e}
.pill.warn{background:var(--amber-soft);color:#a76f08}
.pill.flat{background:var(--line2);color:var(--muted)}
.cols-2{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:repeat(3,1fr)}
.bar{height:8px;background:var(--line2);border-radius:20px;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--teal),#18a08f);transition:width .6s cubic-bezier(.4,0,.2,1)}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.3px}
.foodframe{display:block;width:100%;border:0;background:transparent;min-height:420px;overflow:hidden}
.hub-link{display:flex;flex-direction:column;gap:3px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:#fff;text-decoration:none;transition:border-color .15s,box-shadow .15s}
.hub-link:hover{border-color:var(--teal);box-shadow:0 4px 14px rgba(14,124,123,.12)}
.hub-link-t{font-weight:700;font-size:14px;color:var(--ink)}
.hub-link-d{font-size:12.5px;color:var(--muted);line-height:1.35}
.hub-link-u{font-size:11.5px;color:var(--teal);font-weight:600;margin-top:2px;word-break:break-all}
.field input:not(.inp),.field select:not(.inp),.field textarea:not(.inp){width:100%;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:10px 12px;font-size:13.5px;font-family:inherit;color:var(--ink)}
.field input:not(.inp):focus,.field select:not(.inp):focus,.field textarea:not(.inp):focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(44,213,196,.16)}
.field input[type=checkbox]:not(.inp),.field input[type=radio]:not(.inp){width:auto}
.btn.btn-sm{padding:6px 11px;font-size:12px;border-radius:8px}
.btn.btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.btn-ghost:hover{background:var(--line2);color:var(--ink)}
.btn.btn-emerald{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.btn-emerald:hover{filter:brightness(1.05)}
#solverWrap table,#hubWrap table{background:var(--surface)}
#solverWrap td,#hubWrap td{padding:8px 6px;border-bottom:1px solid var(--line2)}
#solverWrap th,#hubWrap th{text-align:left;color:var(--faint);font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:8px 6px;border-bottom:1px solid var(--line)}
/* Future Projection profile wizard */
.wiz{max-width:700px;margin:0 auto}
.wiz-rail{display:flex;gap:6px;margin-bottom:12px}
.wiz-dot{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;cursor:pointer;padding:0;min-width:0}
.wiz-dot span{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;border:2px solid var(--line);background:#fff;font-weight:800;font-size:13px;color:var(--muted);transition:.15s}
.wiz-dot em{font-style:normal;font-size:10.5px;font-weight:600;color:var(--muted);text-align:center;line-height:1.2;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.wiz-dot:hover span{border-color:var(--teal)}
.wiz-dot.done span{border-color:var(--brand);color:var(--brand)}
.wiz-dot.on span{border-color:var(--brand);background:var(--brand);color:#fff}
.wiz-dot.on em{color:var(--ink)}
.wiz-prog{height:6px;background:var(--line);border-radius:20px;overflow:hidden;margin-bottom:20px}
.wiz-prog i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--brand));border-radius:20px;transition:width .3s ease}
.wiz-stepno{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--teal)}
.wiz-title{font-size:23px;letter-spacing:-.02em;margin:5px 0 0;font-weight:800}
.wiz-note{color:var(--muted);font-size:13px;margin:6px 0 18px}
.wiz-fields{display:grid;grid-template-columns:1fr 1fr;gap:13px 18px}
.wiz-fields .field{margin:0}
.wiz-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:24px;padding-top:18px;border-top:1px solid var(--line)}
@media(max-width:720px){
  .cols-2,.cols-3{grid-template-columns:1fr}
  .wiz-fields{grid-template-columns:1fr}
  .wiz-dot em{display:none}
}

/* ---------- AUTH (login ported from HMGOD) ---------- */
.auth-page{min-height:100%;background:var(--bg);padding:36px 18px 60px;overflow-y:auto}
.auth-wrap{max-width:440px;margin:0 auto;padding:10px 0 40px}
.auth-brand{display:flex;align-items:center;justify-content:center;margin:6px 0 20px}
.auth-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px 26px;box-shadow:0 18px 50px rgba(11,31,58,.10)}
.auth-h{font-size:23px;letter-spacing:-.4px;margin:0 0 4px;font-weight:800}
.auth-sub{color:var(--muted);font-size:13.5px;margin:0 0 20px}
.prov-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 14px;border:1.5px solid var(--line-strong);border-radius:12px;background:#fff;font-weight:600;font-size:14px;color:var(--ink);cursor:pointer;margin-bottom:11px;transition:.15s;font-family:inherit}
.prov-btn:hover{border-color:var(--navy);background:#f7f9fb}
.auth-div{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:11.5px;margin:16px 0;text-transform:uppercase;letter-spacing:.5px}
.auth-div::before,.auth-div::after{content:"";height:1px;background:var(--line);flex:1}
.member-row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;margin-bottom:9px;transition:.15s;color:var(--ink);font-family:inherit}
.member-row:hover{border-color:var(--teal);background:#f3faf9}
.member-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--navy-600));color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;flex:none}
.auth-switch{text-align:center;font-size:13px;color:var(--muted);margin:16px 0 0}
.auth-switch a,.auth-foot a{color:#0d8a7d;font-weight:600;cursor:pointer}
.auth-foot{text-align:center;font-size:11.5px;color:var(--muted);margin:16px auto 0;max-width:360px}
.auth-err{background:var(--red-soft);color:var(--red);font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:9px;margin-bottom:10px}
.auth-note{background:var(--line2);color:var(--ink2);font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:9px;margin-bottom:10px}
.setup-note{background:var(--amber-soft);border:1px solid #f0dcb0;color:var(--ink2);font-size:12px;line-height:1.5;padding:10px 12px;border-radius:10px;margin-bottom:14px}
.txt-c{text-align:center}
.verify-ic{width:54px;height:54px;border-radius:16px;background:var(--emerald-soft);display:grid;place-items:center;margin:0 auto;color:var(--emerald)}
/* account menu */
.acct{position:relative}
.acct-menu{position:absolute;right:0;top:48px;width:236px;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 50px rgba(11,31,58,.18);padding:8px;display:none;z-index:120}
.acct-menu.open{display:block;animation:acctIn .16s ease}
@keyframes acctIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.acct-head{padding:10px 12px;border-bottom:1px solid var(--line);margin-bottom:6px}
.acct-item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:9px 12px;border-radius:9px;background:none;border:none;font:inherit;font-size:13.5px;color:var(--ink);cursor:pointer}

/* cookie bar */
.cookie-bar{position:fixed;left:16px;right:16px;bottom:16px;z-index:300;background:var(--navy);color:#e6eaf0;border-radius:16px;padding:15px 18px;display:flex;align-items:center;gap:16px;box-shadow:0 18px 50px rgba(0,0,0,.32);flex-wrap:wrap;transition:opacity .22s,transform .22s;max-width:780px;margin:0 auto}

.cookie-bar .ck-solid{background:var(--brand);color:#fff;border:none}

.fp-snap-big{font-size:30px;font-weight:800;letter-spacing:-.03em;color:#0B1F3A;line-height:1.1}
.fp-snap-lab{font-size:10.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#8a9bb5;margin-bottom:6px}

.fp-snap-row:last-child{border-bottom:none}
.fp-snap-row b{font-size:13px;color:#0B1F3A}
.fp-save-pill{background:#e7f6ee;color:#0F9D58;font-size:12.5px;font-weight:700;border-radius:10px;padding:8px 12px;text-align:center;margin:12px 0}
.fp-snap .meter{margin-top:6px}
.fp-links{display:flex;gap:30px;flex-wrap:wrap;justify-content:center;margin-top:26px}
.fp-link{display:inline-flex;align-items:center;gap:4px;font-size:17px;color:#5fd0c4;cursor:pointer;letter-spacing:-.01em}

@media(prefers-reduced-motion:reduce){.reveal{opacity:1!important;transform:none!important;transition:none}}

<style>
:root{
  --navy:#071B4D; --ink:#071B4D; --muted:#61708A; --faint:#9aa7ba;
  --line:#E8EDF5; --surface:#ffffff; --white:#FFFFFF;
  --best:#0E9F6E; --best-bg:#E7F7F0; --okay:#C7811B; --okay-bg:#FCF4E4;
  --bad:#DC2626; --bad-bg:#FCEBEB; --accent:#2CD5C4; --accent-bg:#E4F8F5;
  --shadow:0 1px 2px rgba(7,27,77,.04),0 14px 36px -16px rgba(7,27,77,.12);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0; background:transparent; color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif; font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{color:var(--ink); margin:0; font-weight:700; letter-spacing:-.01em}
.num{font-variant-numeric:tabular-nums}
.muted{color:var(--muted)} .faint{color:var(--faint)}
a{color:var(--accent); text-decoration:none}
button{font-family:inherit; cursor:pointer}

.topbar{background:var(--navy); color:#fff; padding:14px 0; position:sticky; top:0; z-index:30; box-shadow:0 2px 10px rgba(11,37,69,.18)}
.embedded .topbar{display:none}
.embedded .foot{display:none}
.wrap{max-width:none; margin:0; padding:0}
.brand{display:flex; align-items:center; gap:12px; flex-wrap:wrap}
.logo{width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.logo svg{width:22px;height:22px}
.brand h1{color:#fff; font-size:18px; line-height:1.1}
.brand .tag{color:#9FB3C9; font-size:12px}
.topbar .spacer{flex:1}
.budget-chip{background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); border-radius:9px; padding:6px 12px; color:#fff; font-size:12.5px; display:flex; gap:8px; align-items:center}
.budget-chip b{font-size:14px}

.subnav{background:#fff; border-bottom:1px solid var(--line); position:sticky; top:66px; z-index:20; overflow-x:auto}
.subnav .wrap{display:flex; gap:4px; padding-top:0;padding-bottom:0}
.subnav a{white-space:nowrap; color:var(--muted); font-size:12.5px; font-weight:600; padding:12px 12px; border-bottom:2px solid transparent}
.subnav a:hover{color:var(--navy)}
.subnav a.on{color:var(--navy); border-bottom-color:var(--best)}

main{padding:22px 0 60px}
.section{margin-bottom:26px; scroll-margin-top:120px}
.sec-head{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:12px; flex-wrap:wrap}
.sec-head h2{font-size:16px}
.eyebrow{font-size:11px; font-weight:700; letter-spacing:.10em; text-transform:uppercase; color:var(--best)}
.sec-head .sub{font-size:12.5px; color:var(--muted)}

.card{background:linear-gradient(180deg,#ffffff,#fbfcff); border:1px solid var(--line); border-radius:18px; box-shadow:0 1px 2px rgba(7,27,77,.04),0 18px 44px -16px rgba(7,27,77,.14); color:var(--ink)}
.pad{padding:18px}
.grid{display:grid; gap:14px}
.g-settings{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.g-stores{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.g-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.g-3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}

.field{display:flex; flex-direction:column; gap:5px}
.field label{font-size:11.5px; font-weight:600; color:var(--muted)}
.field .hint{font-size:10.5px; color:var(--faint)}
input,select{font-family:inherit; font-size:14px; color:var(--ink); background:#fff; border:1px solid var(--line-strong,#d8e0ec); border-radius:9px; padding:9px 10px; width:100%}
input:focus,select:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-bg)}
input[type=number]{font-variant-numeric:tabular-nums}

.seg{display:inline-flex; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:3px; gap:3px; flex-wrap:wrap}
.seg button{border:0; background:transparent; color:var(--muted); font-weight:600; font-size:12.5px; padding:7px 12px; border-radius:7px}
.seg button.on{background:#fff; color:var(--navy); box-shadow:var(--shadow)}

.hero{background:linear-gradient(135deg,#0B2545,#123a63); color:#fff; border:0}
.hero .pad{padding:22px}
.hero .lead{color:#9FB3C9; font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase}
.hero h2{color:#fff; font-size:26px; margin:6px 0 2px}
.hero .why{color:#CDE0F2; font-size:13.5px; max-width:760px}
.hero-stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-top:18px}
.hero-stat{background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14); border-radius:11px; padding:12px 14px}
.hero-stat .k{font-size:11px; color:#9FB3CF; font-weight:600}
.hero-stat .v{font-size:21px; font-weight:800; margin-top:2px}

.badge{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px}
.b-best{background:var(--best-bg); color:var(--best)}
.b-okay{background:var(--okay-bg); color:var(--okay)}
.b-bad{background:var(--bad-bg); color:var(--bad)}
.b-mute{background:#EEF2F7; color:var(--muted)}

.store{position:relative; overflow:hidden}
.store .bar{height:4px; width:100%}
.store.best .bar{background:var(--best)} .store.okay .bar{background:var(--okay)} .store.bad .bar{background:var(--bad)} .store.out .bar{background:var(--faint)}
.store .pad{padding:16px}
.store .row{display:flex; justify-content:space-between; align-items:baseline; gap:8px; padding:5px 0; font-size:13px}
.store .row .lab{color:var(--muted)}
.store .row .val{font-variant-numeric:tabular-nums; font-weight:600}
.store .real{border-top:1px dashed var(--line); margin-top:6px; padding-top:9px}
.store .real .val{font-size:19px; font-weight:800}
.scorebar{height:8px; background:#EEF2F7; border-radius:999px; overflow:hidden; margin-top:6px}
.scorebar i{display:block; height:100%; border-radius:999px}
.tiny{font-size:11px}

.li{display:grid; grid-template-columns:1fr 120px 96px 88px 34px; gap:10px; align-items:center; padding:9px 0; border-top:1px solid var(--line)}
.li:first-child{border-top:0}
.li .name{font-weight:600}
.li .name small{display:block; color:var(--muted); font-weight:400; font-size:11px}
.li .qty input,.li .unitsel select{padding:7px 8px; text-align:center}
.li .unit{font-size:11.5px; color:var(--muted); text-align:right; font-variant-numeric:tabular-nums}
.li .rm{border:1px solid var(--line); background:#fff; color:var(--muted); border-radius:8px; width:34px; height:34px; font-size:16px; line-height:1}
.li .rm:hover{border-color:var(--bad); color:var(--bad)}
.addrow{display:flex; gap:10px; margin-top:12px; flex-wrap:wrap}
.addrow input,.addrow select{flex:1; min-width:150px}
.btn{border:1px solid var(--navy); background:var(--navy); color:#fff; border-radius:9px; padding:9px 16px; font-weight:600; font-size:13px}
.btn:hover{background:#123a63}
.btn.ghost{background:#fff; color:var(--navy)}
.btn.sm{padding:7px 12px; font-size:12.5px}

table{width:100%; border-collapse:collapse}
th,td{text-align:left; padding:9px 8px; font-size:13px; border-top:1px solid var(--line)}
th{font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); border-top:0; font-weight:700}
td.r,th.r{text-align:right; font-variant-numeric:tabular-nums}
.price-grid input{padding:6px 7px; text-align:right; max-width:96px}

.note{display:flex; gap:10px; align-items:flex-start; border-radius:11px; padding:12px 14px; font-size:13px}
.note svg{flex:0 0 auto; margin-top:1px}
.note.good{background:var(--best-bg); color:#0a6e4d}
.note.warn{background:var(--okay-bg); color:#8a5a10}
.note.bad{background:var(--bad-bg); color:#a31616}
.note.info{background:var(--accent-bg); color:#0B4F4F}

.line{display:flex; justify-content:space-between; align-items:center; gap:12px; padding:11px 0; border-top:1px solid var(--line)}
.line:first-child{border-top:0}
.swap-arrow{color:var(--best); font-weight:800; margin:0 4px}
.pill{font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; background:#EEF2F7; color:var(--muted)}
.meal{border:1px solid var(--line); border-radius:12px; padding:14px}
.meal h4{font-size:14px; margin-bottom:8px}
.meal .mstat{display:flex; justify-content:space-between; font-size:12.5px; padding:3px 0; color:var(--muted)}
.meal .mstat b{color:var(--ink); font-variant-numeric:tabular-nums}
.cps{font-size:24px; font-weight:800; color:var(--navy); font-variant-numeric:tabular-nums}

.empty{padding:26px; text-align:center; color:var(--muted); font-size:13px}
.foot{color:var(--faint); font-size:11.5px; text-align:center; padding:24px 0 8px}

.src-badge{display:inline-block; font-size:9.5px; font-weight:800; letter-spacing:.04em; padding:1px 6px; border-radius:6px; vertical-align:middle; text-transform:uppercase}
.src-demo{background:#EEF2F7; color:#64748B}
.src-manual{background:var(--accent-bg); color:#1e3a8a}
.src-csv{background:#EDE9FE; color:#6D28D9}
.src-live{background:var(--best-bg); color:#0a6e4d}

code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; background:#EEF2F7; padding:1px 5px; border-radius:5px; font-size:12px; color:var(--navy)}
.map-toolbar{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:12px}
.map-canvas{width:100%; height:440px; border-radius:12px; border:1px solid var(--line); background:var(--surface); overflow:hidden}
.map-canvas img{max-width:none}
.map-empty{display:flex; align-items:center; justify-content:center; height:100%; min-height:240px; color:var(--muted); font-size:13px; text-align:center; padding:24px}
.map-results .line{align-items:flex-start}
.store-dist{font-variant-numeric:tabular-nums; font-weight:800; color:var(--navy); font-size:15px}
.store-meta{font-size:11.5px; color:var(--muted)}
.rating{color:var(--okay); font-weight:700}

.qbtn{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:11px;font-weight:800;line-height:1;margin-left:7px;vertical-align:middle;padding:0;flex:0 0 auto}
.qbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.hero .qbtn{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#cfe0f2}
.hero .qbtn:hover{background:rgba(255,255,255,.2);color:#fff}
.help-ov{position:fixed;inset:0;background:rgba(11,37,69,.55);display:flex;align-items:center;justify-content:center;padding:18px;z-index:60}
.help-modal{background:#fff;border-radius:16px;max-width:520px;width:100%;max-height:84vh;overflow:auto;box-shadow:0 20px 60px rgba(11,37,69,.35)}
.help-modal .hh{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:18px 20px 0}
.help-modal h3{font-size:17px}
.help-modal .hx{border:0;background:#EEF2F7;color:var(--muted);width:30px;height:30px;border-radius:9px;font-size:18px;line-height:1;flex:0 0 auto}
.help-modal .hb{padding:12px 20px 20px}
.help-modal .hb h4{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--best);margin:14px 0 4px}
.help-modal .hb p{margin:0;color:var(--ink);font-size:13.5px;line-height:1.55}
.help-modal .hb p.eg{color:var(--muted);font-size:12.5px}
.help-foot{padding:0 20px 18px;display:flex;justify-content:flex-end}
.data-status{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--muted)}
@media (max-width:560px){
  .li{grid-template-columns:1fr 84px 34px}
  .li .unitsel,.li .unit{display:none}
  .hero h2{font-size:21px}
  .map-canvas{height:320px}
}

.btn.ghost{background:#fff!important;color:var(--ink)!important;border-color:var(--line-strong,#d8e0ec)!important}

/* ============================================================
   DASHBOARD LAYOUT (Today + tabs) — reuses brand tokens
   ============================================================ */
.fb-head{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;
  box-shadow:0 1px 0 rgba(7,27,77,.03),0 10px 30px -22px rgba(7,27,77,.25)}
.fb-head-in{max-width:1080px;margin:0 auto;padding:16px max(16px,4vw) 8px;display:flex;align-items:center;gap:14px}
.fb-logo{width:42px;height:42px;border-radius:12px;background:var(--navy);display:grid;place-items:center;flex:none}
.fb-greet{flex:1;min-width:0}
.fb-greet h1{font-size:clamp(20px,2.6vw,26px);letter-spacing:-.02em}
.fb-greet p{margin:2px 0 0;color:var(--muted);font-size:13px}
.fb-head-actions{display:flex;gap:8px;flex:none;flex-wrap:wrap;justify-content:flex-end}
.fb-chip{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);
  border-radius:11px;padding:9px 13px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;transition:.15s}
.fb-chip:hover{border-color:var(--accent);color:var(--navy)}
.fb-chip svg{color:var(--best)}
.fb-tabs{margin:0 0 24px;padding:0;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--line)}
.fb-tabs::-webkit-scrollbar{display:none}
.fb-tab{white-space:nowrap;background:none;border:none;border-bottom:2.5px solid transparent;
  padding:11px 12px 12px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
.fb-tab:hover{color:var(--navy)}
.fb-tab.on{color:var(--navy);border-bottom-color:var(--best)}

.fb-panel{display:none;animation:fbfade .35s ease}
.fb-panel.on{display:block}
@keyframes fbfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.fb-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.05fr);gap:18px;margin-bottom:18px}
.fb-grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
@media(max-width:860px){.fb-grid,.fb-grid2{grid-template-columns:1fr}}

.fb-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;
  background:var(--best);color:#fff;border:none;border-radius:12px;padding:13px 16px;font-size:14px;
  font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
.fb-btn:hover{filter:brightness(1.05)}
.fb-btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.fb-btn.ghost:hover{border-color:var(--accent)}
.fb-btn.full{margin-top:12px}
.fb-link{color:var(--best);font-weight:600;font-size:12.5px;cursor:pointer}
.fb-link:hover{text-decoration:underline}
.fb-k{font-size:11.5px;font-weight:600;color:var(--muted);letter-spacing:.01em}
.fb-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.fb-pill.best{background:var(--best-bg);color:var(--best)}
.fb-count{font-size:13px;font-weight:600;color:var(--muted)}

/* setup bar */
.fb-setup{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:14px 18px;margin-bottom:18px}
.fb-setup-item{display:flex;align-items:center;gap:11px;padding-right:22px;margin-right:4px}
.fb-setup-item:not(:last-of-type){border-right:1px solid var(--line)}
.fb-ic{width:34px;height:34px;border-radius:10px;background:var(--best-bg);color:var(--best);display:grid;place-items:center;flex:none}
.fb-setup .fb-v{font-size:14px;font-weight:700;color:var(--ink)}
.fb-setup .fb-btn{width:auto;margin-left:auto;padding:9px 16px}

/* best store card */
.fb-best{padding:20px;border:1.5px solid #BFE8D6}
.fb-best-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.fb-best-head h3{font-size:15px}
.fb-best-main{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.fb-best-store{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.fb-store-dot{width:40px;height:40px;border-radius:50%;background:var(--best);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800;flex:none}
.fb-best-store b{font-size:20px;letter-spacing:-.01em}
.fb-best-total{font-size:12.5px;color:var(--muted);font-weight:600}
.fb-total-num{font-size:30px;font-weight:800;color:var(--ink);letter-spacing:-.02em;margin-top:2px}
.fb-save{margin-top:12px;background:var(--best-bg);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--best);font-weight:600}
.fb-save b{font-size:15px}
.fb-best-stats{display:flex;flex-direction:column;gap:11px;margin-bottom:14px}
.fb-best-stats>div{display:flex;align-items:center;justify-content:space-between;gap:10px}
.fb-best-stats .fb-v{font-size:14px;font-weight:700;color:var(--ink)}
.fb-score{margin-bottom:14px}
.fb-score-row{display:flex;justify-content:space-between;margin-bottom:6px}
.fb-score-row .fb-v{font-size:13px;font-weight:700}
.fb-bar{height:7px;background:var(--line);border-radius:20px;overflow:hidden}
.fb-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--best),var(--accent));border-radius:20px}

/* shopping list (Today right column) — restyle the existing #list rows */
[data-panel="today"] #list{margin-top:0}
[data-panel="today"] #list .sec-head{margin-bottom:12px}
#listBody{display:flex;flex-direction:column}
.li{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:12px;
  padding:12px 2px;border-bottom:1px solid var(--line)}
.li:last-child{border-bottom:none}
.li-info{min-width:0}
.li-name{font-size:14px;font-weight:700;color:var(--ink);line-height:1.2}
.li-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.li .qty{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.li .qty .step{width:30px;height:34px;border:none;background:#fff;color:var(--ink);font-size:17px;font-weight:600;cursor:pointer;line-height:1}
.li .qty .step:hover{background:var(--best-bg);color:var(--best)}
.li .qty input{width:38px;height:34px;border:none;border-left:1px solid var(--line);border-right:1px solid var(--line);
  text-align:center;font-size:14px;font-weight:600;color:var(--ink);background:#fff;-moz-appearance:textfield}
.li .qty input::-webkit-outer-spin-button,.li .qty input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.li-price{font-size:14px;font-weight:700;color:var(--ink);min-width:54px;text-align:right}
.li .rm{width:28px;height:28px;border-radius:8px;border:none;background:#fff;color:var(--faint);font-size:18px;cursor:pointer}
.li .rm:hover{background:var(--bad-bg);color:var(--bad)}

/* better swaps + waste cards */
.fb-card{padding:18px}
.fb-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.fb-card-head h3{font-size:15px}
.fb-empty{color:var(--muted);font-size:13px;padding:6px 0}
.fb-swap{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
.fb-swap-col{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}
.fb-swap-lbl{font-size:11px;color:var(--muted);font-weight:600}
.fb-swap-name{font-size:14px;font-weight:700;color:var(--ink);margin:3px 0}
.fb-swap-price{font-size:13px;font-weight:700;color:var(--ink)}
.fb-swap-arrow{width:30px;height:30px;border-radius:50%;background:var(--best);color:#fff;display:grid;place-items:center;font-size:15px;flex:none}
.fb-swap-save{background:var(--best-bg);border-radius:10px;padding:11px;text-align:center;font-size:13px;color:var(--best);font-weight:600;margin:12px 0}
.fb-swap-save b{font-size:15px}
.fb-swap-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fb-waste-row{display:flex;gap:12px;align-items:flex-start}
.fb-waste-list{flex:1;display:flex;flex-direction:column;gap:9px}
.fb-waste-item{display:flex;align-items:center;justify-content:space-between;gap:8px}
.fb-waste-item b{font-size:13.5px;font-weight:700}
.fb-risk{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
.fb-risk.high{background:var(--bad-bg);color:var(--bad)}
.fb-risk.med{background:var(--okay-bg);color:var(--okay)}
.fb-risk.low{background:var(--best-bg);color:var(--best)}
.fb-waste-est{background:var(--okay-bg);border:1px solid #F3E1B8;border-radius:12px;padding:11px 14px;text-align:center;flex:none}
.fb-est-num{font-size:18px;font-weight:800;color:var(--okay);margin-top:2px}

/* this week */
.fb-week-head{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
.fb-week-head h3{font-size:16px}
.fb-week-sub{color:var(--muted);font-size:13px}
.fb-week-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:760px){.fb-week-grid{grid-template-columns:1fr 1fr}}
.fb-stat{padding:15px}
.fb-stat-num{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.02em;margin:4px 0 2px}
.fb-stat-num.sm{font-size:17px}
.fb-stat-sub{font-size:11.5px;color:var(--muted)}

/* advanced */
.fb-adv{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;text-align:left;
  background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;cursor:pointer;font-family:inherit;margin-top:4px}
.fb-adv:hover{border-color:var(--accent)}
.fb-adv b{font-size:14px;color:var(--ink)}
.fb-adv .fb-k{margin-top:3px}
.fb-adv-arrow{font-size:22px;color:var(--faint)}

</style>
</head>
<body>

<nav class="fb-tabs" id="fbTabs">
    <button class="fb-tab on" data-tab="today" onclick="foodTab('today')">Today</button>
    <button class="fb-tab" data-tab="stores" onclick="foodTab('stores')">Stores</button>
    <button class="fb-tab" data-tab="nearby" onclick="foodTab('nearby')">Map</button>
    <button class="fb-tab" data-tab="swaps" onclick="foodTab('swaps')">Swaps &amp; meals</button>
    <button class="fb-tab" data-tab="waste" onclick="foodTab('waste')">Waste</button>
    <button class="fb-tab" data-tab="prices" onclick="foodTab('prices')">Prices &amp; report</button>
    <button class="fb-tab" data-tab="settings" onclick="foodTab('settings')">Settings</button>
  </nav>

<main class="wrap">

  <section class="fb-panel on" data-panel="today">
    <div id="fbSetup"></div>
    <div class="fb-grid">
      <div id="fbBest"></div>
      <section class="section" id="list">
    <div class="sec-head"><div><h2>Your shopping list <span id="listCount" class="fb-count"></span><button class="qbtn" data-help="list">?</button></h2></div>
      <div class="sub">Add, edit or remove items — every figure updates instantly.</div></div>
    <div class="card pad">
      <div id="listBody"></div>
      <div class="addrow">
        <input id="addName" type="text" list="prodList" placeholder="Type any item (e.g. cheese)…" aria-label="Add an item">

        <button class="btn" id="addBtn">Add item</button>
        <button class="btn ghost sm" id="resetBtn" title="Restore the sample list">Reset list</button>
      </div>
      <p class="tiny muted" id="matchNote" style="margin-top:8px"></p>
    </div>
  </section>
    </div>
    <div class="fb-grid2">
      <div id="fbSwaps"></div>
      <div id="fbWaste"></div>
    </div>
    <div id="fbWeek"></div>
    <div id="fbAdvanced"></div>
  </section>

  <section class="fb-panel" data-panel="stores"><section class="section" id="stores">

      <div class="sub" id="storesSub">Basket price plus fuel and time. Green is best value, red is expensive.</div></div>
    <div id="storesSrcNote"></div>
    <div class="grid g-stores" id="storeCards"></div>
  </section><section class="section" id="split">
    <div class="sec-head"><div><div class="eyebrow">Optimise</div><h2>Store split optimiser<button class="qbtn" data-help="split">?</button></h2></div>
      <div class="sub">Is chasing specials across stores actually worth the trip?</div></div>
    <div class="card pad" id="splitBody"></div>
  </section></section>
  <section class="fb-panel" data-panel="nearby"><section class="section" id="nearby">

      <div id="mapNote"></div>
      <div class="map-toolbar">
        <button class="btn" id="locateBtn">Locate me</button>
        <button class="btn ghost sm" id="searchHereBtn">Search this area</button>
        <span class="tiny muted" id="mapStatus"></span>
      </div>
      <div id="map" class="map-canvas"><div class="map-empty">Loading map…</div></div>
      <div class="map-results">
        <div class="sec-head" style="margin:16px 0 6px"><h3 style="font-size:14px">Supermarkets within 50 km</h3><div class="sub" id="resultCount"></div></div>
        <div id="storeList"><div class="empty">Tap “Locate me” or enter your postcode above to list nearby supermarkets.</div></div>
      </div>
    </div>
  </section></section>
  <section class="fb-panel" data-panel="swaps"><section class="section" id="swaps">
    <div class="sec-head"><div><div class="eyebrow">Swap &amp; save</div><h2>Food swap engine<button class="qbtn" data-help="swaps">?</button></h2></div>
      <div class="sub">Cheaper alternatives that keep the meal.</div></div>
    <div class="card pad" id="swapBody"></div>
  </section><section class="section" id="meals">
    <div class="sec-head"><div><div class="eyebrow">Value</div><h2>Meal cost engine<button class="qbtn" data-help="meals">?</button></h2></div>

      <div class="map-toolbar" style="margin-bottom:6px">

        <button class="btn ghost sm" id="clearPricesBtn">Clear my prices</button>
      </div>

      <div class="field" style="max-width:340px; margin-bottom:14px">

        <div class="seg" id="modeSeg" role="group" aria-label="Shopping mode">

      </div>

        <button class="btn ghost sm" id="locateBtn2">Use my location</button>
        <span class="tiny muted" id="locStatus"></span>
      </div>
    </div>
  </section></section>

  <div class="foot" id="footNote"></div>
  <b id="chipBudget" hidden></b>
</main>

<script>
/* ============================================================
   RESILIENT STORAGE (foodLS) — works in srcdoc iframe / file://
   ============================================================ */
var foodLS=(function(){
  function works(s){ try{ var t="__fls__"; s.setItem(t,"1"); s.removeItem(t); return true; }catch(e){ return false; } }
  try{ if(window.localStorage && works(window.localStorage)) return window.localStorage; }catch(e){}
  try{ if(window.parent && window.parent!==window && window.parent.localStorage && works(window.parent.localStorage)) return window.parent.localStorage; }catch(e){}
  var mem=Object.create(null);
  return { getItem:function(k){ return Object.prototype.hasOwnProperty.call(mem,k)?mem[k]:null; },
    setItem:function(k,v){ mem[k]=String(v); }, removeItem:function(k){ delete mem[k]; } };
})();

const AUD=new Intl.NumberFormat("en-AU",{style:"currency",currency:"AUD"});
function money(n){ n=Number(n); if(!isFinite(n)) n=0; return AUD.format(n); }
function n0(n){ n=Number(n); return isFinite(n)?n:0; }
function clamp(v,lo,hi){ v=n0(v); return Math.max(lo,Math.min(hi,v)); }
function safeDiv(a,b){ a=n0(a); b=n0(b); return b!==0?a/b:0; }
function pct(n){ return Math.round(n0(n))+"%"; }
